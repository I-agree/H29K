name: U-Boot 专项 Bug 诊断与自动化测试脚本

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: rk3528-hinlink-h29k.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai
  WORK_DIR: /mnt/workdir
  CCACHE_DIR: /mnt/ccache

jobs:
  diagnose:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      actions: write

    steps:
    - name: 检出源码
      uses: actions/checkout@v6.0.3

    - name: 准备大盘工作目录与物理 Swap
      run: |
        sudo mkdir -p $WORK_DIR $CCACHE_DIR /mnt/tmp
        sudo chown -R $USER:$USER $WORK_DIR $CCACHE_DIR /mnt/tmp
        sudo mount --bind /mnt/tmp /tmp
        sudo mount --bind /mnt/tmp /var/tmp
        sudo chmod 1777 /tmp
        sudo chmod 1777 /var/tmp
        
        echo "⚙️ 正在构建 8GB 专属全量 Swap 空间防死锁..."
        sudo swapoff -a || true
        sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=8192
        sudo chmod 600 /mnt/swapfile
        sudo mkswap /mnt/swapfile
        sudo swapon /mnt/swapfile
        sudo sysctl vm.swappiness=10
        
        echo "GIT_TERMINAL_PROMPT=0" >> $GITHUB_ENV
        echo "WORK_DIR=$WORK_DIR" >> $GITHUB_ENV
        echo "CCACHE_DIR=$CCACHE_DIR" >> $GITHUB_ENV
        echo "TMPDIR=/mnt/tmp" >> $GITHUB_ENV

    - name: 初始化构建环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev python3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf quilt python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd libyaml-dev zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: 克隆 OpenWrt 源码到大盘
      run: |
        cd $WORK_DIR
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf $WORK_DIR/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 加载并更新软件源
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF ${{ env.WORK_DIR }}/openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd ${{ env.WORK_DIR }}/openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 加载自定义配置文件
      run: |
        [ -e $CONFIG_FILE ] && cp -f $CONFIG_FILE ${{ env.WORK_DIR }}/openwrt/.config
        chmod +x $DIY_P2_SH
        cd ${{ env.WORK_DIR }}/openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
        make defconfig

    - name: 🛠️ 基础编译：交叉编译工具链
      run: |
        cd ${{ env.WORK_DIR }}/openwrt
        echo "🛠️ 正在全速轰炸编译工具链（U-Boot 前置强依赖）..."
        make tools/compile -j$(nproc)
        make toolchain/compile -j$(nproc)

    - name: 🎯 专项狙击：U-Boot 模块高强度诊断与排错
      id: uboot_check
      run: |
        cd ${{ env.WORK_DIR }}/openwrt
        
        echo "========================================================="
        echo "🚀 开始单独编译 U-Boot 模块，启用【单线程+详细输出模式 (V=s)】..."
        echo "========================================================="
        
        # 创建初始化诊断报告文件
        echo "=== U-Boot 编译诊断报告 ===" > $GITHUB_WORKSPACE/uboot_diagnostic.txt
        echo "检测时间: $(date)" >> $GITHUB_WORKSPACE/uboot_diagnostic.txt
        
        # 🛡️ 注入 15 分钟超时熔断机制，若发生类似 EOF 的交互弹窗死循环，强制终止并抓取现场
        set +e
        timeout 15m make package/boot/uboot-rockchip/compile -j1 V=s > $GITHUB_WORKSPACE/uboot_build.log 2>&1
        EXIT_CODE=$?
        set -e
        
        # 打印最后 150 行日志到控制台，方便在 GitHub Actions 界面直接肉眼直观查看
        echo -e "\n=== 编译尾部日志截取 ==="
        tail -n 150 $GITHUB_WORKSPACE/uboot_build.log
        echo "======================="
        
        # 🔍 核心审计：扫描日志中的致命 Bug 特征码
        echo -e "\n🔍 正在对 U-Boot 编译日志进行智能 Bug 扫描..."
        
        if [ $EXIT_CODE -eq 124 ]; then
            echo "❌ 【致命警报】编译遭遇 15 分钟超时强杀！极大概率陷入了 Kconfig 交互弹窗死循环！" >> $GITHUB_WORKSPACE/uboot_diagnostic.txt
        fi
        
        if grep -q "Error in reading or end of file" $GITHUB_WORKSPACE/uboot_build.log; then
            echo "❌ 【精准命中】发现 'Error in reading or end of file' 错误！Kconfig 正在后台疯狂索要键盘输入！" >> $GITHUB_WORKSPACE/uboot_diagnostic.txt
            echo "👉 原因分析：你的 package/boot/uboot-rockchip/configs/ 里的 defconfig 文件缺失了新版源码强依赖的宏开关！" >> $GITHUB_WORKSPACE/uboot_diagnostic.txt
        fi
        
        if grep -q "(NEW)" $GITHUB_WORKSPACE/uboot_build.log; then
            echo "⚠️ 【发现潜伏选项】日志中检测到未决断的 (NEW) 交互配置项，以下为受影响的宏：" >> $GITHUB_WORKSPACE/uboot_diagnostic.txt
            grep "(NEW)" $GITHUB_WORKSPACE/uboot_build.log >> $GITHUB_WORKSPACE/uboot_diagnostic.txt
        fi
        
        if grep -q -E "missing|No such file or directory" $GITHUB_WORKSPACE/uboot_build.log; then
            echo "❌ 【依赖缺失】检测到底层头文件或源文件丢失！以下为可能的缺失项：" >> $GITHUB_WORKSPACE/uboot_diagnostic.txt
            grep -E "missing|No such file or directory" $GITHUB_WORKSPACE/uboot_build.log | head -n 10 >> $GITHUB_WORKSPACE/uboot_diagnostic.txt
        fi
        
        # 判断最终状态
        if [ $EXIT_CODE -eq 0 ] && ! grep -q "Error in reading" $GITHUB_WORKSPACE/uboot_build.log; then
            echo "🎉 【大获全胜】U-Boot 模块在没有发生任何隐性交互和死循环的前提下，单线程顺利编译通过！" >> $GITHUB_WORKSPACE/uboot_diagnostic.txt
            echo "uboot_status=success" >> $GITHUB_OUTPUT
        else
            echo "💥 【编译失败】U-Boot 模块存在技术隐患，请下载右上方 Artifacts 中的报告进行比对修复！" >> $GITHUB_WORKSPACE/uboot_diagnostic.txt
            echo "uboot_status=failed" >> $GITHUB_OUTPUT
        fi
        
        cat $GITHUB_WORKSPACE/uboot_diagnostic.txt

    - name: 📤 上传 U-Boot 专项排错日志与诊断报告
      uses: actions/upload-artifact@v7.0.1
      if: always()
      with:
        name: Hinlink_H29K_U-Boot诊断数据包
        path: |
          ${{ github.workspace }}/uboot_build.log
          ${{ github.workspace }}/uboot_diagnostic.txt
          ${{ env.WORK_DIR }}/openwrt/.config
