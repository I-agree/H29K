name: BITS-48-openwrt-builder

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: rk3528-hinlink-h29k.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Fix VA_BITS for RK3528 (Linux 6.12.85 workaround)
      run: |
        cd openwrt
        echo "🔧 Ensuring CONFIG_ARM64_VA_BITS_48=y and removing all conflicting VA_BITS symbols..."
        # Remove ALL ARM64_VA_BITS_* lines (safe cleanup)
        sed -i '/^CONFIG_ARM64_VA_BITS/d' .config
        # Append golden 3-line config
        echo "CONFIG_SOC_RK3528=y" >> .config
        echo "CONFIG_ARM64_4K_PAGES=y" >> .config
        echo "CONFIG_ARM64_VA_BITS_48=y" >> .config
        # Verify
        if ! grep -q "^CONFIG_ARM64_VA_BITS_48=y$" .config; then
          echo "❌ ERROR: CONFIG_ARM64_VA_BITS_48=y not found in .config!"
          exit 1
        fi
        echo "✅ RK3528 VA_BITS fix applied successfully."

    - name: Download package
      id: package
      run: |
        cd openwrt
        echo "🔍 Validating .config before download..."
        if ! grep -q "^CONFIG_SOC_RK3528=y$" .config; then
          echo "❌ ERROR: CONFIG_SOC_RK3528=y missing in .config"
          exit 1
        fi
        if ! grep -q "^CONFIG_ARM64_VA_BITS_48=y$" .config; then
          echo "❌ ERROR: CONFIG_ARM64_VA_BITS_48=y missing"
          exit 1
        fi
        if grep -q "^CONFIG_ARM64_VA_BITS_39=" .config || grep -q "^CONFIG_ARM64_VA_BITS_52=" .config; then
          echo "❌ ERROR: Conflicting VA_BITS symbol found (e.g., _39= or _52=)"
          echo "Current VA_BITS lines:"
          grep "^CONFIG_ARM64_VA_BITS" .config
          exit 1
        fi
        echo "✅ .config validated: RK3528 + VA_BITS_48 confirmed."

        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo "⚙️  Final .config check before compilation..."
        if [ ! -f include/config/auto.conf ]; then
          echo "❌ ERROR: include/config/auto.conf not generated (Kconfig sync failed)"
          exit 1
        fi
        if ! grep -q "^CONFIG_ARM64_VA_BITS=48$" include/config/auto.conf; then
          echo "❌ ERROR: CONFIG_ARM64_VA_BITS=48 not found in auto.conf"
          echo "auto.conf contains:"
          grep "^CONFIG_ARM64_VA_BITS" include/config/auto.conf
          exit 1
        fi
        if ! grep -q "^CONFIG_ARM64_VA_BITS_48=y$" include/config/auto.conf; then
          echo "❌ ERROR: CONFIG_ARM64_VA_BITS_48=y not found in auto.conf"
          exit 1
        fi
        echo "✅ Kernel config verified: VA_BITS=48 confirmed in auto.conf."

        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        [ ${UPLOAD_GOFILE} = true && ${{ steps.gofile.outputs.url }} ] && echo "🔗 [GoFile](${{ steps.gofile.outputs.url }})" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@master
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 2

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@master
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
