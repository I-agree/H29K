# File: .github/workflows/BITS-48-openwrt-builder.yml — HINLINK H29K Production Build
# Description: Optimized for OpenWrt 25.12.3 + Linux 6.12.85 + RK3528 + CONFIG_ARM64_VA_BITS=48
# ✅ Verified on: 2026-05-09 (GitHub Actions ubuntu-22.04, 16GB RAM, 14GB SSD)
