name: Build GC9307 Firmware
run-name: Build sitronix,gc9307.bin
on:
  workflow_dispatch

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt install -y python3 python3-pip git

      - name: Clone official mipi-dbi tool
        run: |
          git clone --depth 1 https://github.com/notro/panel-mipi-dbi.git
          chmod +x ./panel-mipi-dbi/mipi-dbi-cmd

      - name: Check source firmware script
        run: |
          if [ ! -f "gc9307.in" ]; then
            echo "ERROR: gc9307.in missing in repo root!"
            exit 1
          fi
          ls -la gc9307.in

      - name: Compile MIPI DBI firmware binary
        run: |
          python3 ./panel-mipi-dbi/mipi-dbi-cmd sitronix,gc9307.bin gc9307.in -v
          ls -lh sitronix,gc9307.bin

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: gc9307-firmware
          path: sitronix,gc9307.bin
          retention-days: 14
