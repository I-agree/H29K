name: Build GC9307 Firmware

on:
  workflow_dispatch:

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 git

      - name: Download official mipi-dbi-cmd tool
        run: |
          git clone --depth 1 https://github.com/notro/panel-mipi-dbi.git
          chmod +x panel-mipi-dbi/mipi-dbi-cmd

      - name: Verify gc9307.txt exists
        run: |
          if [ ! -f "gc9307.txt" ]; then
            echo "Error: gc9307.txt not found in repository root!"
            exit 1
          fi
          ls -l gc9307.txt

      - name: Generate gc9307.bin
        run: |
          echo "Generating gc9307.bin..."
          python3 panel-mipi-dbi/mipi-dbi-cmd gc9307.bin gc9307.txt
          ls -lh gc9307.bin

      - name: Upload generated firmware
        uses: actions/upload-artifact@v7.0.1
        with:
          name: gc9307-firmware
          path: gc9307.bin
