name: OpenWrt Kconfig预校验+固件生成工作流

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: rk3528-hinlink-h29k.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  WORK_DIR: /workdir
  KERNEL_VERSION: 6.12.94

jobs:
  # ========== 新增：Kconfig配置有效性预校验任务（方案2一键校验脚本） ==========
  kconfig-check:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: 检出源码仓库
        uses: actions/checkout@v6.0.3

      - name: 系统基础环境初始化
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install build-essential bison flex git libncurses5-dev libelf-dev device-tree-compiler ccache
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p $WORK_DIR
          sudo chown -R $USER:$USER $WORK_DIR
          echo "WORK_DIR=$WORK_DIR" >> $GITHUB_ENV

      - name: 克隆OpenWrt源码
        run: |
          cd $WORK_DIR
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf $WORK_DIR/openwrt $GITHUB_WORKSPACE/openwrt

      - name: 加载自定义Feeds与配置脚本
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF $WORK_DIR/openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH $DIY_P2_SH
          cd $WORK_DIR/openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          [ -e $CONFIG_FILE ] && cp -f $CONFIG_FILE $WORK_DIR/openwrt/.config
          if [ -d files ]; then
            mkdir -p $WORK_DIR/openwrt/files
            cp -r files/* $WORK_DIR/openwrt/files/
          fi
          $GITHUB_WORKSPACE/$DIY_P2_SH
          make defconfig

      - name: 下载内核源码准备校验环境
        run: |
          cd $WORK_DIR/openwrt
          make target/linux/prepare V=s

      - name: 执行Kconfig一键依赖&NEW项校验
        id: kconfig_verify
        run: |
          set -o errexit
          set -o pipefail
          OPENWRT_ROOT=$WORK_DIR/openwrt
          GENERIC_CONF="$OPENWRT_ROOT/target/linux/generic/config-6.12"
          PLATFORM_CONF="$OPENWRT_ROOT/target/linux/rockchip/armv8/config-6.12"
          BUILD_KERNEL_DIR="$OPENWRT_ROOT/build_dir/target-aarch64_generic_musl/linux-rockchip_armv8/linux-${{ env.KERNEL_VERSION }}"
          TMP_CONF="$OPENWRT_ROOT/tmp/kernel_check.config"
          CHECK_LOG="$OPENWRT_ROOT/kconfig_check_result.log"

          echo "=====================================" >> $CHECK_LOG
          echo "【Kconfig预校验日志 开始】 $(date '+%Y-%m-%d %H:%M:%S')" >> $CHECK_LOG
          echo "=====================================" >> $CHECK_LOG

          # 1. 合并通用内核配置 + 平台内核配置
          $OPENWRT_ROOT/scripts/kconfig.pl + "$GENERIC_CONF" "$PLATFORM_CONF" > "$TMP_CONF"
          # 合并.config衍生的KERNEL_开头配置
          awk '/^(#[[:space:]]+)?CONFIG_KERNEL/{sub("CONFIG_KERNEL_","CONFIG_");print}' "$OPENWRT_ROOT/.config" >> "$TMP_CONF"

          # 过滤INITRAMFS并补充默认参数，对齐OpenWrt构建逻辑
          grep -v INITRAMFS "$TMP_CONF" > "${TMP_CONF}.tmp"
          mv "${TMP_CONF}.tmp" "$TMP_CONF"
          echo 'CONFIG_INITRAMFS_SOURCE=""' >> "$TMP_CONF"
          echo "# CONFIG_INITRAMFS_FORCE is not set" >> "$TMP_CONF"
          echo "# CONFIG_INITRAMFS_PRESERVE_MTIME is not set" >> "$TMP_CONF"

          # 备份原始待校验配置
          cp "$TMP_CONF" "${TMP_CONF}.origin"

          # 进入内核目录执行syncconfig非交互校验
          cd "$BUILD_KERNEL_DIR"
          cp "$TMP_CONF" .config
          echo "1. 正在执行syncconfig校验（捕获NEW交互项、依赖语法错误）" >> $CHECK_LOG
          make ARCH=arm64 syncconfig 2>> $CHECK_LOG

          # 对比配置变更，找出依赖不满足被自动禁用的配置
          echo -e "\n2. 依赖校验结果：以下配置因依赖缺失从=y被自动置为n" >> $CHECK_LOG
          diff -u "${TMP_CONF}.origin" .config | grep -E '^(\-CONFIG|\+# CONFIG)' | grep -v INITRAMFS >> $CHECK_LOG || echo "无配置因依赖失效被禁用" >> $CHECK_LOG

          echo -e "\n=====================================" >> $CHECK_LOG
          echo "【Kconfig预校验日志 结束】 $(date '+%Y-%m-%d %H:%M:%S')" >> $CHECK_LOG
          echo "=====================================" >> $CHECK_LOG

          echo "校验完成，日志路径：$CHECK_LOG"
          cat $CHECK_LOG
          echo "check_status=pass" >> $GITHUB_OUTPUT

      - name: 上传Kconfig校验日志制品
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Kconfig校验日志文件
          path: ${{ env.WORK_DIR }}/openwrt/kconfig_check_result.log

  # ========== 原有固件编译任务，依赖校验任务成功才执行 ==========
  build:
    needs: kconfig-check
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      actions: write

    steps:
    - name: 检出源码
      uses: actions/checkout@v6.0.3

    - name: 调整磁盘空间
      run: |
        sudo mkdir -p $WORK_DIR
        sudo chown -R $USER:$USER $WORK_DIR
        
        sudo swapoff -a || true
        sudo dd if=/dev/zero of=/swapfile bs=1M count=5120
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        sudo sysctl vm.swappiness=10
        echo "✅ Swap 扩容至 5GB 且 swappiness=10 校准完毕！"
        echo "📊 扩容系统全局 /tmp 至 10G"
        sudo umount /tmp || true
        sudo mount -t tmpfs tmpfs /tmp -o size=10G,nr_inodes=0
        echo "✅ /tmp 扩容至 10GB 完成"
        
        df -h
        df -i /tmp
        echo "WORK_DIR=$WORK_DIR" >> $GITHUB_ENV

    - name: 初始化构建环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev python3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf quilt python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd libyaml-dev zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: 查看编译环境硬件规格 (CPU/内存)
      run: |
        echo "==================== CPU 核心数 ===================="
        echo "逻辑核心数: $(nproc)"
        cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c
        echo -e "\n==================== 内存大小 ===================="
        free -h

    - name: 克隆 OpenWrt 源码到磁盘
      run: |
        cd $WORK_DIR
        df -hT $PWD
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf $WORK_DIR/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 加载自定义软件源
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF ${{ env.WORK_DIR }}/openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd ${{ env.WORK_DIR }}/openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新软件源索引
      run: cd ${{ env.WORK_DIR }}/openwrt && ./scripts/feeds update -a

    - name: 安装软件源组件
      run: cd ${{ env.WORK_DIR }}/openwrt && ./scripts/feeds install -a

    - name: 加载自定义配置文件
      run: |
        if [ -d files ]; then
          mkdir -p ${{ env.WORK_DIR }}/openwrt/files
          cp -r files/* ${{ env.WORK_DIR }}/openwrt/files/
        fi
        [ -e $CONFIG_FILE ] && cp -f $CONFIG_FILE ${{ env.WORK_DIR }}/openwrt/.config
        chmod +x $DIY_P2_SH
        cd ${{ env.WORK_DIR }}/openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: 下载依赖软件
      id: package
      run: |
        cd ${{ env.WORK_DIR }}/openwrt
        make defconfig
        for i in {1..3}; do make download -j8 && break || sleep 5; done
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件镜像
      id: compile
      run: |
        cd ${{ env.WORK_DIR }}/openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: 检查磁盘空间使用情况
      if: (!cancelled())
      run: df -hT

    - name: 上传 bin 目录（使用绝对路径，防止软连接失效导致空包）
      uses: actions/upload-artifact@v7.0.1
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.WORK_DIR }}/openwrt/bin

    - name: 整理固件输出目录
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd ${{ env.WORK_DIR }}/openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件输出目录
      uses: actions/upload-artifact@v7.0.1
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: 生成发布版本标签
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件至 GitHub Release
      uses: softprops/action-gh-release@v3.0.0
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: 清理历史工作流运行记录
      uses: Mattraks/delete-workflow-runs@v2.1.0
      with:
        retain_days: 0
        keep_minimum_runs: 2
