name: 获取真实 Kconfig 配置文件

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: rk3528-hinlink-h29k.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  WORK_DIR: /workdir

jobs:
  build:
    runs-on: ubuntu-22.04
    # 🔥 【强力注入】显式声明工作流 Token 核心权限，踏平所有 403 权限暗礁
    permissions:
      contents: write   # 允许创建、修改、删除 GitHub Release 固件
      actions: write    # 允许清理和删除历史工作流运行记录

    steps:
    - name: 检出源码
      uses: actions/checkout@v6.0.3

    - name: 调整磁盘空间
      run: |
        sudo mkdir -p $WORK_DIR
        sudo chown -R $USER:$USER $WORK_DIR
        
        # 🚨 【针对性物理解决 Swap 核心隐患】 🚨
        echo "⚙️ 正在物理重构编译机 Swap 交换分区技术栈..."
        sudo swapoff -a || true
        sudo dd if=/dev/zero of=/swapfile bs=1M count=5120
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        sudo sysctl vm.swappiness=10
        echo "✅ Swap 扩容至 5GB 且 swappiness=10 校准完毕！"
        
        echo "📊 扩容系统全局 /tmp 至 10G"
        sudo umount /tmp || true
        sudo mount -t tmpfs tmpfs /tmp -o size=10G,nr_inodes=0
        echo "✅ /tmp 扩容至 10GB 完成"
        
        echo "📊 检查当前磁盘空间分布："
        df -h
        df -i /tmp
        echo "WORK_DIR=$WORK_DIR" >> $GITHUB_ENV

    - name: 初始化构建环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev python3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf quilt python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd libyaml-dev zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: 查看编译环境硬件规格 (CPU/内存)
      run: |
        echo "==================== CPU 核心数 ===================="
        echo "逻辑核心数: $(nproc)"
        cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c
        echo -e "\n==================== 内存大小 ===================="
        free -h

    - name: 克隆 OpenWrt 源码到磁盘
      run: |
        cd $WORK_DIR
        df -hT $PWD
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf $WORK_DIR/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 加载自定义软件源
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF ${{ env.WORK_DIR }}/openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd ${{ env.WORK_DIR }}/openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新软件源索引
      run: cd ${{ env.WORK_DIR }}/openwrt && ./scripts/feeds update -a

    - name: 安装软件源组件
      run: cd ${{ env.WORK_DIR }}/openwrt && ./scripts/feeds install -a

    - name: 加载自定义配置文件
      run: |
        if [ -d files ]; then
          mkdir -p ${{ env.WORK_DIR }}/openwrt/files
          cp -r files/* ${{ env.WORK_DIR }}/openwrt/files/
        fi
        [ -e $CONFIG_FILE ] && cp -f $CONFIG_FILE ${{ env.WORK_DIR }}/openwrt/.config
        chmod +x $DIY_P2_SH
        cd ${{ env.WORK_DIR }}/openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: 下载依赖软件
      id: package
      run: |
        cd ${{ env.WORK_DIR }}/openwrt
        make defconfig
        for i in {1..3}; do make download -j8 && break || sleep 5; done
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件镜像
      id: compile
      run: |
        cd ${{ env.WORK_DIR }}/openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    # 👇 ================= 提取三位一体真实 Kconfig 配置 (已修复) ================= 👇
    - name: 提取真实 OpenWrt/Kernel/U-Boot Kconfig 配置 (真理之源)
      if: always()
      run: |
        cd ${{ env.WORK_DIR }}/openwrt
        echo "🔍 正在编译产物中搜寻最终生效的真实 Kconfig ..."
        
        # ========== 1. 提取 OpenWrt 主 .config (插件安装真相) ==========
        if [ -f ".config" ]; then
            cp -f .config real_openwrt_final.config
            sha256sum real_openwrt_final.config | tee real_openwrt_final.config.sha256
            echo "✅ 成功捕获真实 OpenWrt 主配置"
            echo "================ OpenWrt 插件与核心组件真实生效统计 ================"
            echo "📦 已选中 PACKAGE 总数: $(grep -c '^CONFIG_PACKAGE_.*=y' real_openwrt_final.config || echo 0)"
            echo "🔌 LuCI 插件生效数: $(grep -c '^CONFIG_PACKAGE_luci-.*=y' real_openwrt_final.config || echo 0)"
            echo "🐳 Docker 相关生效数: $(grep -c '^CONFIG_PACKAGE_docker\|^CONFIG_PACKAGE_luci-app-dockerman' real_openwrt_final.config || echo 0)"
            echo "🌐 网络工具生效数: $(grep -c '^CONFIG_PACKAGE_curl\|^CONFIG_PACKAGE_wget\|^CONFIG_PACKAGE_iperf3' real_openwrt_final.config || echo 0)"
            echo "⚙️ 内核模块(kmod)生效数: $(grep -c '^CONFIG_PACKAGE_kmod-.*=y' real_openwrt_final.config || echo 0)"
            echo "=================================================="
        else
            echo "⚠️ 警告：未找到 OpenWrt 主 .config（make defconfig 可能未执行）"
            echo "OpenWrt make defconfig did not complete." > real_openwrt_final.config
        fi

        # ========== 2. 提取 Kernel .config (🔧 精确修复版) ==========
        # 使用 linux-[0-9] 强制匹配版本号，排除 backports/mac80211/hostapd 等非内核目录
        KERNEL_CONFIG=$(find build_dir/target-*/linux-rockchip_armv8*/ \
          -maxdepth 2 \
          -name ".config" \
          -path "*/linux-[0-9]*.*/.config" \
          ! -path "*backports*" \
          ! -path "*mac80211*" \
          ! -path "*hostapd*" \
          2>/dev/null | head -n 1)
        
        if [ -n "$KERNEL_CONFIG" ] && [ -f "$KERNEL_CONFIG" ]; then
            cp -f "$KERNEL_CONFIG" real_kernel_final.config
            sha256sum real_kernel_final.config | tee real_kernel_final.config.sha256
            echo "✅ 成功捕获真实内核配置: $KERNEL_CONFIG"
            
            # 🔬 双重验证：真正的内核配置必须包含 CONFIG_ARM64=y
            if grep -q '^CONFIG_ARM64=y' real_kernel_final.config; then
                echo "🔬 验证通过：确认为 Linux 内核主配置"
                echo "================ 内核核心驱动真实生效统计 ================"
                echo "📺 DRM 显示驱动生效数: $(grep -c '^CONFIG_DRM.*=y' real_kernel_final.config || echo 0)"
                echo "🔌 USB 核心与驱动生效数: $(grep -c '^CONFIG_USB.*=y' real_kernel_final.config || echo 0)"
                echo "📡 蓝牙协议栈生效数: $(grep -c '^CONFIG_BT.*=y' real_kernel_final.config || echo 0)"
                echo "🌐 网络与防火墙生效数: $(grep -c '^CONFIG_NETFILTER\|^CONFIG_NF_TABLES' real_kernel_final.config || echo 0)"
                echo "=================================================="
            else
                echo "❌ 严重警告：提取的文件不是有效的 Linux 内核配置！"
                echo "文件头内容如下："
                head -5 real_kernel_final.config
            fi
        else
            echo "⚠️ 警告：未找到最终内核配置（可能在内核编译阶段前就失败了）"
            echo "📂 列出所有候选 .config 文件供调试排查："
            find build_dir/target-*/linux-rockchip_armv8*/ -maxdepth 3 -name ".config" 2>/dev/null | sort || echo "(无候选文件)"
            echo "Kernel compile did not reach final config stage." > real_kernel_final.config
        fi

        # ========== 3. 提取 U-Boot .config ==========
        UBOOT_CONFIG=$(find build_dir/target-*/ -maxdepth 4 -name ".config" -path "*/u-boot-*/.config" 2>/dev/null | head -n 1)
        if [ -n "$UBOOT_CONFIG" ] && [ -f "$UBOOT_CONFIG" ]; then
            cp -f "$UBOOT_CONFIG" real_uboot_final.config
            sha256sum real_uboot_final.config | tee real_uboot_final.config.sha256
            echo "✅ 成功捕获真实 U-Boot 配置: $UBOOT_CONFIG"
            echo "================ U-Boot 核心配置真实生效统计 ================"
            echo "🚀 U-Boot 核心启动配置数: $(grep -c '^CONFIG_.*=y' real_uboot_final.config || echo 0)"
            echo "=================================================="
        else
            echo "⚠️ 警告：未找到最终 U-Boot 配置"
            echo "U-Boot compile did not reach final config stage." > real_uboot_final.config
        fi

    - name: 上传真实 Kconfig 配置文件 (真理日志)
      if: always()
      uses: actions/upload-artifact@v7.0.1
      with:
        name: Real-Kconfig-Truth-Logs-${{ github.run_id }}
        path: |
          ${{ env.WORK_DIR }}/openwrt/real_openwrt_final.config
          ${{ env.WORK_DIR }}/openwrt/real_openwrt_final.config.sha256
          ${{ env.WORK_DIR }}/openwrt/real_kernel_final.config
          ${{ env.WORK_DIR }}/openwrt/real_kernel_final.config.sha256
          ${{ env.WORK_DIR }}/openwrt/real_uboot_final.config
          ${{ env.WORK_DIR }}/openwrt/real_uboot_final.config.sha256
        retention-days: 7
    # 👆 ================= 提取结束 ================= 👆

    - name: 检查磁盘空间使用情况
      if: (!cancelled())
      run: df -hT

    - name: 上传 bin 目录（使用绝对路径，防止软连接失效导致空包）
      uses: actions/upload-artifact@v7.0.1
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.WORK_DIR }}/openwrt/bin

    - name: 整理固件输出目录
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd ${{ env.WORK_DIR }}/openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件输出目录
      uses: actions/upload-artifact@v7.0.1
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: 生成发布版本标签
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件至 GitHub Release
      uses: softprops/action-gh-release@v3.0.0
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: 清理历史工作流运行记录
      uses: Mattraks/delete-workflow-runs@v2.1.0
      with:
        retain_days: 0
        keep_minimum_runs: 2
