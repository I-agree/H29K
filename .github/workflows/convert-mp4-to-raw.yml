name: Build DRM Player & Convert MP4（开机动画）

on:
  workflow_dispatch:

jobs:
  build-and-convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.1

      # --- 1. 转换 MP4 为 RAW (XRGB8888) ---
      - name: Install FFmpeg and tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg xxd

      - name: Download MP4
        run: |
          curl -L -o apple.mp4 "https://raw.githubusercontent.com/I-agree/H29K/main/JPG/apple.mp4"

      - name: Convert MP4 to RAW (XRGB8888, 172x172)
        run: |
          ffmpeg -i apple.mp4 -f rawvideo -pix_fmt bgr0 apple.raw
          ls -lh apple.raw

      - name: Embed RAW into C header
        run: |
          xxd -i apple.raw > apple_raw.h
          head -2 apple_raw.h

      # --- 2. 交叉编译 ARM64 DRM 播放程序 ---
      - name: Install ARM64 Cross-Compiler
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Setup ARM64 libdrm (Sysroot Method)
        run: |
          sudo dpkg --add-architecture arm64
          UBUNTU_CODENAME=$(lsb_release -cs)
          echo "deb [arch=arm64 trusted=yes] http://ports.ubuntu.com/ubuntu-ports $UBUNTU_CODENAME main" | sudo tee /etc/apt/sources.list.d/ubuntu-ports-arm64.list
          sudo apt-get update -o Dir::Etc::sourcelist="/etc/apt/sources.list.d/ubuntu-ports-arm64.list" -o Dir::Etc::sourceparts="-" -o APT::Get::List-Cleanup="0"
          
          mkdir -p /tmp/arm64-sysroot
          cd /tmp/arm64-sysroot
          apt-get download libdrm-dev:arm64 libdrm2:arm64 libdrm-common
          for deb in *.deb; do
            dpkg -x "$deb" .
          done

      - name: Create DRM Player C Source (Final Fix)
        run: |
          cat << 'ENDOFSOURCE' > drm_play.c
          #include <fcntl.h>
          #include <unistd.h>
          #include <signal.h>
          #include <sys/mman.h>
          #include <sys/ioctl.h>
          #include <sys/wait.h>
          #include <sys/stat.h>
          #include <stdio.h>
          #include <stdlib.h>
          #include <string.h>
          #include <time.h>
          #include <errno.h>
          #include <libgen.h>
          #include <limits.h>
          #include <xf86drm.h>
          #include <xf86drmMode.h>
          #include <drm_fourcc.h>

          #include "apple_raw.h"

          #define VIDEO_W  172
          #define VIDEO_H  172
          #define BPP      32
          #define FPS      25
          #define DURATION 36

          static uint32_t screen_w, screen_h;

          /* ===== 全局清理状态（供信号处理使用）===== */
          static int            g_fd = -1;
          static uint32_t       g_crtc_id = 0;
          static drmModeCrtc   *g_orig_crtc = NULL;   /* 开机前原始 CRTC 状态 */
          static uint32_t       g_fb_id[2] = {0, 0};
          static void          *g_map[2] = {MAP_FAILED, MAP_FAILED};
          static struct drm_mode_create_dumb g_dumb[2];
          static drmModeConnector *g_conn = NULL;
          static drmModeRes       *g_res = NULL;
          static volatile sig_atomic_t g_stop = 0;

          static void sig_handler(int sig) { (void)sig; g_stop = 1; }

          static void cleanup(void) {
              /* 1) 把 CRTC 还原成开机前的原始状态，彻底交还屏幕 */
              if (g_fd >= 0 && g_orig_crtc) {
                  drmModeModeInfoPtr m = g_orig_crtc->mode_valid
                                         ? &g_orig_crtc->mode : NULL;
                  drmModeSetCrtc(g_fd, g_orig_crtc->crtc_id,
                                 g_orig_crtc->buffer_id,
                                 g_orig_crtc->x, g_orig_crtc->y,
                                 g_orig_crtc->connectors,
                                 g_orig_crtc->count_connectors,
                                 m);
              }
              /* 2) 释放 fb / mmap / dumb */
              for (int i = 0; i < 2; i++) {
                  if (g_fd >= 0 && g_fb_id[i])
                      drmModeRmFB(g_fd, g_fb_id[i]);
                  if (g_map[i] != MAP_FAILED && g_dumb[i].size)
                      munmap(g_map[i], g_dumb[i].size);
                  if (g_fd >= 0 && g_dumb[i].handle)
                      drmIoctl(g_fd, DRM_IOCTL_MODE_DESTROY_DUMB, &g_dumb[i].handle);
              }
              if (g_orig_crtc) drmModeFreeCrtc(g_orig_crtc);
              if (g_conn)      drmModeFreeConnector(g_conn);
              if (g_res)       drmModeFreeResources(g_res);
              if (g_fd >= 0)   close(g_fd);
              g_fd = -1;
          }

          void sleep_ms(int ms) {
              struct timespec ts = { .tv_sec = ms / 1000, .tv_nsec = (ms % 1000) * 1000000 };
              nanosleep(&ts, NULL);
          }

          void copy_frame_centered(void *dst, const uint8_t *frame_data, uint32_t pitch) {
              uint8_t *buf = (uint8_t *)dst;
              memset(buf, 0, pitch * screen_h);
              int x_offset = (screen_w - VIDEO_W) / 2;
              int y_offset = ((int)screen_h - VIDEO_H) / 2;
              if (x_offset < 0) x_offset = 0;
              if (y_offset < 0) y_offset = 0;
              uint32_t src_row_bytes = VIDEO_W * (BPP / 8);
              for (int y = 0; y < VIDEO_H; y++) {
                  memcpy(buf + (y + y_offset) * pitch + x_offset * (BPP / 8),
                         frame_data + y * src_row_bytes,
                         src_row_bytes);
              }
          }

          const uint8_t* get_frame(long frame_index, long total_frames) {
              frame_index = frame_index % total_frames;
              return apple_raw + (frame_index * VIDEO_W * VIDEO_H * (BPP / 8));
          }

          int get_exe_dir(char *dir_buf, size_t buf_size) {
              ssize_t len = readlink("/proc/self/exe", dir_buf, buf_size - 1);
              if (len > 0) {
                  dir_buf[len] = '\0';
                  char *d = dirname(dir_buf);
                  if (d != dir_buf) memmove(dir_buf, d, strlen(d) + 1);
                  return 0;
              }
              return -1;
          }

          int main(int argc, char *argv[]) {
              const char *drm_device = (argc > 1) ? argv[1] : "/dev/dri/card0";

              /* 注册信号：保证 ^C / kill 也能走 cleanup */
              struct sigaction sa = {0};
              sa.sa_handler = sig_handler;
              sigaction(SIGINT,  &sa, NULL);
              sigaction(SIGTERM, &sa, NULL);
              atexit(cleanup);   /* 正常 return 也走 cleanup */

              char exe_dir[PATH_MAX] = "/tmp";
              get_exe_dir(exe_dir, sizeof(exe_dir));

              size_t frame_size = VIDEO_W * VIDEO_H * (BPP / 8);
              long total_frames = (long)(apple_raw_len / frame_size);
              long total_duration_frames = FPS * DURATION;

              printf("[DEBUG] Opening %s ...\n", drm_device);
              g_fd = open(drm_device, O_RDWR | O_CLOEXEC);
              if (g_fd < 0) { printf("[ERROR] open: %s\n", strerror(errno)); return 1; }

              /* 主动抢占 DRM master，避免被残留 master 卡住 */
              drmSetMaster(g_fd);

              uint64_t has_dumb = 0;
              if (drmGetCap(g_fd, DRM_CAP_DUMB_BUFFER, &has_dumb) < 0 || !has_dumb) {
                  printf("[ERROR] no dumb\n"); return 1;
              }

              g_res = drmModeGetResources(g_fd);
              if (!g_res) { printf("[ERROR] GetResources\n"); return 1; }
              printf("[DEBUG] conn=%d crtc=%d enc=%d\n",
                     g_res->count_connectors, g_res->count_crtcs, g_res->count_encoders);

              uint32_t crtc_id = 0;

              /* 选 connected 的 connector */
              for (int i = 0; i < g_res->count_connectors; i++) {
                  drmModeConnector *c = drmModeGetConnector(g_fd, g_res->connectors[i]);
                  if (!c) continue;
                  if (!g_conn && c->connection == DRM_MODE_CONNECTED && c->count_modes > 0) {
                      g_conn = c;
                      screen_w = c->modes[0].hdisplay;
                      screen_h = c->modes[0].vdisplay;
                  } else {
                      drmModeFreeConnector(c);
                  }
              }
              if (!g_conn) { printf("[ERROR] no connector\n"); return 1; }
              printf("[DEBUG] mode %dx%d conn_id=%d\n", screen_w, screen_h, g_conn->connector_id);

              /* 用 possible_crtcs 正确匹配 CRTC（修复 encoder_id=0 的情况）*/
              uint32_t possible = 0;
              if (g_conn->encoder_id) {
                  drmModeEncoder *enc = drmModeGetEncoder(g_fd, g_conn->encoder_id);
                  if (enc) { possible = enc->possible_crtcs; drmModeFreeEncoder(enc); }
              }
              if (!possible) {
                  /* connector 没 encoder：枚举所有 encoder 找匹配本 connector 的 */
                  for (int i = 0; i < g_res->count_encoders; i++) {
                      drmModeEncoder *enc = drmModeGetEncoder(g_fd, g_res->encoders[i]);
                      if (!enc) continue;
                      /* 没有直接关联信息时，退化为：possible_crtcs 与可用 crtc 取交集 */
                      possible |= enc->possible_crtcs;
                      drmModeFreeEncoder(enc);
                  }
                  if (!possible) possible = 0xFFFFFFFFu; /* 实在没有就允许全部 */
              }
              for (int i = 0; i < g_res->count_crtcs; i++) {
                  if (possible & (1u << i)) { crtc_id = g_res->crtcs[i]; break; }
              }
              if (!crtc_id && g_res->count_crtcs) crtc_id = g_res->crtcs[0];
              g_crtc_id = crtc_id;
              printf("[DEBUG] crtc_id=%u possible=0x%x\n", crtc_id, possible);

              /* 保存开机前原始 CRTC 状态（退出时还原用）*/
              g_orig_crtc = drmModeGetCrtc(g_fd, crtc_id);

              /* 创建双缓冲 */
              for (int i = 0; i < 2; i++) {
                  memset(&g_dumb[i], 0, sizeof(g_dumb[i]));
                  g_dumb[i].width = screen_w; g_dumb[i].height = screen_h; g_dumb[i].bpp = BPP;
                  if (drmIoctl(g_fd, DRM_IOCTL_MODE_CREATE_DUMB, &g_dumb[i]) < 0) {
                      printf("[ERROR] dumb %d: %s\n", i, strerror(errno)); return 1;
                  }
                  uint32_t h[4] = {g_dumb[i].handle,0,0,0};
                  uint32_t p[4] = {g_dumb[i].pitch,0,0,0};
                  uint32_t o[4] = {0,0,0,0};
                  if (drmModeAddFB2(g_fd, screen_w, screen_h, DRM_FORMAT_XRGB8888,
                                    h, p, o, &g_fb_id[i], 0) < 0) {
                      printf("[ERROR] addfb %d: %s\n", i, strerror(errno)); return 1;
                  }
                  struct drm_mode_map_dumb mr = { .handle = g_dumb[i].handle };
                  drmIoctl(g_fd, DRM_IOCTL_MODE_MAP_DUMB, &mr);
                  g_map[i] = mmap(0, g_dumb[i].size, PROT_READ|PROT_WRITE, MAP_SHARED, g_fd, mr.offset);
                  if (g_map[i] == MAP_FAILED) { printf("[ERROR] mmap %d\n", i); return 1; }
                  memset(g_map[i], 0, g_dumb[i].size);
              }

              /* 第一帧 */
              copy_frame_centered(g_map[0], get_frame(0, total_frames), g_dumb[0].pitch);
              if (drmModeSetCrtc(g_fd, crtc_id, g_fb_id[0], 0, 0,
                                 &g_conn->connector_id, 1, &g_conn->modes[0]) < 0) {
                  printf("[ERROR] SetCrtc: %s\n", strerror(errno)); return 1;
              }
              printf("[DEBUG] playing... x_off=%d y_off=%d pitch=%d\n",
                     (screen_w-VIDEO_W)/2, ((int)screen_h-VIDEO_H)/2, g_dumb[0].pitch);

              /* 播放循环：用 g_stop 信号优雅退出 */
              int cur = 1;
              long fc = 1;
              time_t t0 = time(NULL);
              while (fc < total_duration_frames && !g_stop) {
                  if (difftime(time(NULL), t0) >= DURATION) break;
                  copy_frame_centered(g_map[cur], get_frame(fc, total_frames), g_dumb[cur].pitch);
                  drmModeSetCrtc(g_fd, crtc_id, g_fb_id[cur], 0, 0,
                                 &g_conn->connector_id, 1, &g_conn->modes[0]);
                  cur = 1 - cur; fc++;
                  sleep_ms(1000 / FPS);
              }
              printf("[DEBUG] loop end fc=%ld stop=%d\n", fc, (int)g_stop);

              /* 不在这里清屏/塞黑 fb！直接 return，由 cleanup() 还原原始 CRTC */
              return 0;   /* atexit(cleanup) 会自动执行，彻底交还屏幕 */
          }
          ENDOFSOURCE

      - name: Cross Compile for ARM64 (RK3528)
        run: |
          aarch64-linux-gnu-gcc -O2 -static -o drm_play_arm64 drm_play.c \
            -I. \
            -I/tmp/arm64-sysroot/usr/include \
            -I/tmp/arm64-sysroot/usr/include/libdrm \
            -I/tmp/arm64-sysroot/usr/include/drm \
            -I/tmp/arm64-sysroot/usr/include/aarch64-linux-gnu \
            -L/tmp/arm64-sysroot/usr/lib/aarch64-linux-gnu \
            -ldrm
          
          chmod +x drm_play_arm64
          file drm_play_arm64
          ls -lh drm_play_arm64

      # --- 3. 生成 init.d 开机脚本 ---
      - name: Create init.d boot script
        run: |
          cat << 'EOF' > 99-bootanim
          #!/bin/sh /etc/rc.common

          START=11
          STOP=10

          start() {
              PLAYER="/usr/sbin/drm_play_arm64"
              DRM_DEV="/dev/dri/card1"
              
              [ ! -f "$PLAYER" ] && return 1
              
              # 短暂等待 DRM 设备就绪
              [ ! -e "$DRM_DEV" ] && sleep 1
              
              # 静默后台运行，无任何输出，无日志写入
              "$PLAYER" "$DRM_DEV" >/dev/null 2>&1 &
          }

          stop() {
              killall drm_play_arm64 2>/dev/null
          }
          EOF
          chmod +x 99-bootanim

      # --- 4. 生成安装说明 ---
      - name: Create install instructions
        run: |
          cat << 'EOF' > INSTALL.txt
          ============================================
            Boot Animation Installation Guide
          ============================================

          Files:
            drm_play_arm64  - 动画程序（视频数据已嵌入）
            99-bootanim     - OpenWrt init.d 开机脚本

          Step 1: 上传文件
          -------------------------
          scp drm_play_arm64 root@192.168.1.1:/usr/sbin/
          scp 99-bootanim root@192.168.1.1:/etc/init.d/

          Step 2: 设置权限和启用
          -------------------------
          ssh root@192.168.1.1
          chmod +x /usr/sbin/drm_play_arm64
          chmod +x /etc/init.d/99-bootanim
          /etc/init.d/99-bootanim enable

          Step 3: 测试
          -------------------------
          /usr/sbin/drm_play_arm64 /dev/dri/card1

          Step 4: 重启验证
          -------------------------
          reboot

          说明:
          - 程序完全静默运行，无任何日志输出
          - 不会对 eMMC 产生额外读写
          - 如需运行 bo.py，放到 /usr/sbin/bo.py
          - START=99 可改为更小数字以更早启动（修改为START=11）

          卸载:
          /etc/init.d/99-bootanim disable
          rm /usr/sbin/drm_play_arm64
          rm /etc/init.d/99-bootanim
          EOF

      # --- 5. 上传产物 ---
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: H29K-BootAnimation-Pack
          path: |
            drm_play_arm64
            99-bootanim
            INSTALL.txt
