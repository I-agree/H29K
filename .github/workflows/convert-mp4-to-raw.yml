name: Build DRM Player & Convert MP4

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      # --- 1. 转换 MP4 为 RAW (XRGB8888) ---
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Download MP4
        run: |
          curl -L -o apple.mp4 "https://raw.githubusercontent.com/I-agree/H29K/main/JPG/apple.mp4"

      - name: Convert MP4 to RAW (XRGB8888, 172x172)
        run: |
          # 输出 bgr0 = XRGB8888, 4字节/像素
          # 172x172 每帧 118336 字节
          ffmpeg -i apple.mp4 -f rawvideo -pix_fmt bgr0 apple.raw
          ls -lh apple.raw

      # --- 2. 交叉编译 ARM64 DRM 播放程序 ---
      - name: Install ARM64 Cross-Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Setup ARM64 libdrm (Sysroot Method)
        run: |
          sudo dpkg --add-architecture arm64
          UBUNTU_CODENAME=$(lsb_release -cs)
          echo "deb [arch=arm64 trusted=yes] http://ports.ubuntu.com/ubuntu-ports $UBUNTU_CODENAME main" | sudo tee /etc/apt/sources.list.d/ubuntu-ports-arm64.list
          sudo apt-get update -o Dir::Etc::sourcelist="/etc/apt/sources.list.d/ubuntu-ports-arm64.list" -o Dir::Etc::sourceparts="-" -o APT::Get::List-Cleanup="0"
          
          mkdir -p /tmp/arm64-sysroot
          cd /tmp/arm64-sysroot
          apt-get download libdrm-dev:arm64 libdrm2:arm64 libdrm-common
          for deb in *.deb; do
            dpkg -x "$deb" .
          done

      - name: Create DRM Player C Source
        run: |
          cat << 'ENDOFSOURCE' > drm_play.c
          #include <fcntl.h>
          #include <unistd.h>
          #include <sys/mman.h>
          #include <sys/ioctl.h>
          #include <sys/wait.h>
          #include <sys/stat.h>
          #include <stdio.h>
          #include <stdlib.h>
          #include <string.h>
          #include <time.h>
          #include <errno.h>
          #include <libgen.h>
          #include <limits.h>
          #include <xf86drm.h>
          #include <xf86drmMode.h>
          #include <drm_fourcc.h>

          #define VIDEO_W  172
          #define VIDEO_H  172
          #define BPP      32
          #define FPS      25
          #define DURATION 36   /* 播放时长（秒） */

          static uint32_t screen_w, screen_h;

          void sleep_ms(int ms) {
              struct timespec ts = { .tv_sec = ms / 1000, .tv_nsec = (ms % 1000) * 1000000 };
              nanosleep(&ts, NULL);
          }

          /*
           * 把 172x172 的 XRGB8888 帧数据写到屏幕缓冲区的垂直居中位置
           */
          void copy_frame_centered(void *dst, const void *src, uint32_t pitch) {
              uint8_t *buf = (uint8_t *)dst;
              const uint8_t *frame = (const uint8_t *)src;
              
              memset(buf, 0, pitch * screen_h);
              
              int y_offset = ((int)screen_h - VIDEO_H) / 2;
              if (y_offset < 0) y_offset = 0;
              
              uint32_t src_row_bytes = VIDEO_W * (BPP / 8);
              for (int y = 0; y < VIDEO_H; y++) {
                  memcpy(buf + (y + y_offset) * pitch,
                         frame + y * src_row_bytes,
                         src_row_bytes);
              }
          }

          /*
           * 获取可执行文件所在目录
           * argv[0] 可能是 "./drm_play_arm64" 或 "/tmp/drm_play_arm64"
           */
          int get_exe_dir(char *dir_buf, size_t buf_size) {
              /* 优先用 /proc/self/exe 获取真实路径 */
              ssize_t len = readlink("/proc/self/exe", dir_buf, buf_size - 1);
              if (len > 0) {
                  dir_buf[len] = '\0';
                  char *d = dirname(dir_buf);
                  if (d != dir_buf) {
                      memmove(dir_buf, d, strlen(d) + 1);
                  }
                  return 0;
              }
              /* 回退：用 argv[0] */
              return -1;
          }

          int main(int argc, char *argv[]) {
              if (argc < 2) {
                  fprintf(stderr, "Usage: %s <raw_file> [drm_device]\n", argv[0]);
                  return 1;
              }
              const char *raw_file = argv[1];
              const char *drm_device = (argc > 2) ? argv[2] : "/dev/dri/card0";

              /* ========== 记录程序所在目录 ========== */
              char exe_dir[PATH_MAX] = "/tmp";
              if (get_exe_dir(exe_dir, sizeof(exe_dir)) != 0) {
                  /* 回退：从 argv[0] 提取目录 */
                  char tmp[PATH_MAX];
                  strncpy(tmp, argv[0], PATH_MAX - 1);
                  tmp[PATH_MAX - 1] = '\0';
                  char *d = dirname(tmp);
                  if (d && strlen(d) < PATH_MAX) {
                      /* 如果是相对路径，转绝对路径 */
                      if (d[0] != '/') {
                          char cwd[PATH_MAX];
                          if (getcwd(cwd, sizeof(cwd))) {
                              snprintf(exe_dir, sizeof(exe_dir), "%s/%s", cwd, d);
                          }
                      } else {
                          strncpy(exe_dir, d, sizeof(exe_dir) - 1);
                      }
                  }
              }
              printf("Program directory: %s\n", exe_dir);

              /* ========== [1/7] 打开 DRM 设备 ========== */
              printf("[1/7] Opening DRM device: %s\n", drm_device);
              int fd = open(drm_device, O_RDWR | O_CLOEXEC);
              if (fd < 0) { perror("  ERROR: open drm device failed"); return 1; }
              printf("  OK (fd=%d)\n", fd);

              /* ========== [2/7] 检查 DRM 能力 ========== */
              printf("[2/7] Checking DRM capabilities...\n");
              uint64_t has_dumb = 0;
              if (drmGetCap(fd, DRM_CAP_DUMB_BUFFER, &has_dumb) < 0) {
                  printf("  WARNING: DRM_CAP_DUMB_BUFFER query failed\n");
              } else {
                  printf("  DUMB_BUFFER support: %s\n", has_dumb ? "YES" : "NO");
                  if (!has_dumb) {
                      fprintf(stderr, "  ERROR: No dumb buffer support!\n");
                      return 1;
                  }
              }

              /* ========== [3/7] 获取 DRM 资源 ========== */
              printf("[3/7] Getting DRM resources...\n");
              drmModeRes *res = drmModeGetResources(fd);
              if (!res) {
                  fprintf(stderr, "  ERROR: drmModeGetResources() failed\n");
                  return 1;
              }
              printf("  OK: %d connector(s), %d CRTC(s), %d encoder(s)\n",
                     res->count_connectors, res->count_crtcs, res->count_encoders);

              /* ========== [4/7] 查找显示器 ========== */
              drmModeConnector *conn = NULL;
              uint32_t crtc_id = 0;

              printf("[4/7] Finding display...\n");
              for (int i = 0; i < res->count_connectors; i++) {
                  drmModeConnector *c = drmModeGetConnector(fd, res->connectors[i]);
                  if (!c) continue;
                  
                  printf("  Connector[%d]: id=%u, type=%d, status=%d, modes=%d\n",
                         i, c->connector_id, c->connector_type,
                         c->connection, c->count_modes);
                  
                  for (int m = 0; m < c->count_modes; m++) {
                      printf("    Mode[%d]: %dx%d@%dHz\n", m,
                             c->modes[m].hdisplay, c->modes[m].vdisplay,
                             c->modes[m].vrefresh);
                  }

                  if (!conn && c->count_modes > 0) {
                      conn = c;
                      screen_w = c->modes[0].hdisplay;
                      screen_h = c->modes[0].vdisplay;
                      printf("  >>> Selected! Screen: %dx%d\n", screen_w, screen_h);
                  } else {
                      drmModeFreeConnector(c);
                  }
              }

              if (!conn) {
                  fprintf(stderr, "  ERROR: No usable connector found!\n");
                  drmModeFreeResources(res);
                  return 1;
              }

              /* ========== [5/7] 查找 CRTC ========== */
              printf("[5/7] Finding CRTC...\n");
              drmModeCrtc *crtc = NULL;
              
              if (conn->encoder_id) {
                  drmModeEncoder *enc = drmModeGetEncoder(fd, conn->encoder_id);
                  if (enc) {
                      crtc = drmModeGetCrtc(fd, enc->crtc_id);
                      if (crtc) crtc_id = crtc->crtc_id;
                      drmModeFreeEncoder(enc);
                  }
              }
              
              if (!crtc) {
                  printf("  Direct CRTC match...\n");
                  for (int i = 0; i < res->count_crtcs; i++) {
                      crtc = drmModeGetCrtc(fd, res->crtcs[i]);
                      if (crtc) {
                          crtc_id = crtc->crtc_id;
                          break;
                      }
                  }
              }
              
              if (!crtc) {
                  fprintf(stderr, "  ERROR: No CRTC!\n");
                  return 1;
              }
              printf("  CRTC id: %u\n", crtc_id);

              /* ========== [6/7] 创建帧缓冲区 ========== */
              printf("[6/7] Creating XRGB8888 framebuffers (%dx%d)...\n", screen_w, screen_h);
              struct drm_mode_create_dumb dumb[2];
              void *map[2];
              uint32_t fb_id[2];

              for (int i = 0; i < 2; i++) {
                  memset(&dumb[i], 0, sizeof(dumb[i]));
                  dumb[i].width = screen_w;
                  dumb[i].height = screen_h;
                  dumb[i].bpp = BPP;
                  
                  if (drmIoctl(fd, DRM_IOCTL_MODE_CREATE_DUMB, &dumb[i]) < 0) {
                      fprintf(stderr, "  ERROR: CREATE_DUMB[%d] failed: %s\n", i, strerror(errno));
                      return 1;
                  }
                  printf("  Buffer %d: handle=%u, pitch=%u, size=%llu\n",
                         i, dumb[i].handle, dumb[i].pitch, (unsigned long long)dumb[i].size);
                  
                  uint32_t handles[4] = {dumb[i].handle, 0, 0, 0};
                  uint32_t pitches[4] = {dumb[i].pitch, 0, 0, 0};
                  uint32_t offsets[4] = {0, 0, 0, 0};
                  if (drmModeAddFB2(fd, screen_w, screen_h, DRM_FORMAT_XRGB8888,
                                    handles, pitches, offsets, &fb_id[i], 0) < 0) {
                      fprintf(stderr, "  ERROR: AddFB2[%d] failed: %s\n", i, strerror(errno));
                      return 1;
                  }
                  printf("  FB[%d] created: id=%u\n", i, fb_id[i]);

                  struct drm_mode_map_dumb map_req;
                  memset(&map_req, 0, sizeof(map_req));
                  map_req.handle = dumb[i].handle;
                  if (drmIoctl(fd, DRM_IOCTL_MODE_MAP_DUMB, &map_req) < 0) {
                      fprintf(stderr, "  ERROR: MAP_DUMB[%d] failed: %s\n", i, strerror(errno));
                      return 1;
                  }
                  
                  map[i] = mmap(0, dumb[i].size, PROT_READ | PROT_WRITE, MAP_SHARED, fd, map_req.offset);
                  if (map[i] == MAP_FAILED) {
                      fprintf(stderr, "  ERROR: mmap[%d] failed: %s\n", i, strerror(errno));
                      return 1;
                  }
                  memset(map[i], 0, dumb[i].size);
              }

              /* ========== [7/7] 播放动画 ========== */
              printf("[7/7] Opening RAW file and starting playback...\n");
              FILE *fp = fopen(raw_file, "rb");
              if (!fp) { perror("  ERROR: open raw file failed"); return 1; }
              
              fseek(fp, 0, SEEK_END);
              long file_size = ftell(fp);
              fseek(fp, 0, SEEK_SET);
              
              size_t frame_size = VIDEO_W * VIDEO_H * (BPP / 8);  /* 118336 */
              long total_frames = file_size / frame_size;
              long total_duration_frames = FPS * DURATION;  /* 25 * 36 = 900 */
              
              printf("  File: %ld bytes, Frame: %zu bytes, Total frames: %ld\n",
                     file_size, frame_size, total_frames);
              printf("  Duration: %d seconds = %ld frames at %d FPS\n",
                     DURATION, total_duration_frames, FPS);

              void *tmp_frame = malloc(frame_size);
              if (!tmp_frame) { perror("  ERROR: malloc"); return 1; }

              /* 显示第一帧 */
              size_t read_bytes = fread(tmp_frame, 1, frame_size, fp);
              if (read_bytes < frame_size) {
                  fprintf(stderr, "  WARNING: First frame incomplete\n");
              }
              copy_frame_centered(map[0], tmp_frame, dumb[0].pitch);

              int ret = drmModeSetCrtc(fd, crtc_id, fb_id[0], 0, 0,
                                       &conn->connector_id, 1, &conn->modes[0]);
              if (ret < 0) {
                  fprintf(stderr, "  ERROR: SetCrtc failed: %s\n", strerror(errno));
                  free(tmp_frame); fclose(fp); return 1;
              }
              printf("  First frame displayed! Starting %d-second loop...\n", DURATION);

              /* ========== 循环播放 36 秒 ========== */
              int cur = 1;
              long frame_count = 1;
              time_t start_time = time(NULL);

              while (frame_count < total_duration_frames) {
                  /* 检查是否超过 36 秒（双重保险） */
                  if (difftime(time(NULL), start_time) >= DURATION) {
                      printf("  Time limit reached (%d seconds).\n", DURATION);
                      break;
                  }

                  read_bytes = fread(tmp_frame, 1, frame_size, fp);
                  if (read_bytes < frame_size) {
                      /* 文件播完，从头循环 */
                      fseek(fp, 0, SEEK_SET);
                      read_bytes = fread(tmp_frame, 1, frame_size, fp);
                      if (read_bytes == 0) break;
                  }
                  
                  copy_frame_centered(map[cur], tmp_frame, dumb[cur].pitch);
                  drmModeSetCrtc(fd, crtc_id, fb_id[cur], 0, 0,
                                 &conn->connector_id, 1, &conn->modes[0]);
                  cur = 1 - cur;
                  frame_count++;
                  
                  if (frame_count % 100 == 0) {
                      long elapsed = (long)difftime(time(NULL), start_time);
                      printf("  Frame %ld/%ld (%ld seconds elapsed)\n",
                             frame_count, total_duration_frames, elapsed);
                  }
                  
                  sleep_ms(1000 / FPS);
              }

              printf("Animation finished. Played %ld frames.\n", frame_count);
              
              /* ========== 清理 DRM 资源 ========== */
              free(tmp_frame);
              fclose(fp);

              /* 清空屏幕（黑色） */
              memset(map[0], 0, dumb[0].size);
              drmModeSetCrtc(fd, crtc_id, fb_id[0], 0, 0,
                             &conn->connector_id, 1, &conn->modes[0]);

              for (int i = 0; i < 2; i++) {
                  drmModeRmFB(fd, fb_id[i]);
                  munmap(map[i], dumb[i].size);
                  drmIoctl(fd, DRM_IOCTL_MODE_DESTROY_DUMB, &dumb[i]);
              }

              drmModeFreeCrtc(crtc);
              drmModeFreeConnector(conn);
              drmModeFreeResources(res);

              /* ========== 检查并运行 bo.py ========== */
              char bo_path[PATH_MAX];
              snprintf(bo_path, sizeof(bo_path), "%s/bo.py", exe_dir);
              
              struct stat st;
              if (stat(bo_path, &st) == 0) {
                  printf("Found bo.py at: %s\n", bo_path);
                  printf("Launching bo.py in background...\n");
                  
                  /* fork 子进程运行 bo.py，父进程继续退出 */
                  pid_t pid = fork();
                  if (pid == 0) {
                      /* 子进程：运行 bo.py */
                      execlp("python3", "python3", bo_path, NULL);
                      /* 如果 python3 不存在，尝试 python */
                      execlp("python", "python", bo_path, NULL);
                      /* 都失败了 */
                      fprintf(stderr, "  ERROR: Failed to exec bo.py: %s\n", strerror(errno));
                      _exit(1);
                  } else if (pid > 0) {
                      printf("bo.py launched (pid=%d). Animation exiting.\n", pid);
                  } else {
                      fprintf(stderr, "  ERROR: fork() failed: %s\n", strerror(errno));
                  }
              } else {
                  printf("No bo.py found at: %s\n", bo_path);
                  printf("Animation exiting normally.\n");
              }

              close(fd);
              return 0;
          }
          ENDOFSOURCE

      - name: Cross Compile for ARM64 (RK3528)
        run: |
          aarch64-linux-gnu-gcc -O3 -static -o drm_play_arm64 drm_play.c \
            -I/tmp/arm64-sysroot/usr/include \
            -I/tmp/arm64-sysroot/usr/include/libdrm \
            -I/tmp/arm64-sysroot/usr/include/drm \
            -I/tmp/arm64-sysroot/usr/include/aarch64-linux-gnu \
            -L/tmp/arm64-sysroot/usr/lib/aarch64-linux-gnu \
            -ldrm
          
          chmod +x drm_play_arm64
          file drm_play_arm64
          ldd drm_play_arm64 || true

      # --- 3. 上传产物 ---
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: H29K-DRM-Animation-Pack
          path: |
            apple.raw
            drm_play_arm64
