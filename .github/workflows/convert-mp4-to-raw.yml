name: Build DRM Player & Convert MP4（开机动画）

on:
  workflow_dispatch:

jobs:
  build-and-convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.1

      # --- 1. 转换 MP4 为 RAW (XRGB8888) ---
      - name: Install FFmpeg and tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg xxd

      - name: Download MP4
        run: |
          curl -L -o apple.mp4 "https://raw.githubusercontent.com/I-agree/H29K/main/JPG/apple.mp4"

      - name: Convert MP4 to RAW (XRGB8888, 172x172)
        run: |
          ffmpeg -i apple.mp4 -f rawvideo -pix_fmt bgr0 apple.raw
          ls -lh apple.raw

      - name: Embed RAW into C header
        run: |
          xxd -i apple.raw > apple_raw.h
          head -2 apple_raw.h

      # --- 2. 交叉编译 ARM64 DRM 播放程序 ---
      - name: Install ARM64 Cross-Compiler
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Setup ARM64 libdrm (Sysroot Method)
        run: |
          sudo dpkg --add-architecture arm64
          UBUNTU_CODENAME=$(lsb_release -cs)
          echo "deb [arch=arm64 trusted=yes] http://ports.ubuntu.com/ubuntu-ports $UBUNTU_CODENAME main" | sudo tee /etc/apt/sources.list.d/ubuntu-ports-arm64.list
          sudo apt-get update -o Dir::Etc::sourcelist="/etc/apt/sources.list.d/ubuntu-ports-arm64.list" -o Dir::Etc::sourceparts="-" -o APT::Get::List-Cleanup="0"
          
          mkdir -p /tmp/arm64-sysroot
          cd /tmp/arm64-sysroot
          apt-get download libdrm-dev:arm64 libdrm2:arm64 libdrm-common
          for deb in *.deb; do
            dpkg -x "$deb" .
          done

      - name: Create DRM Player C Source (Silent Mode, No Logs)
        run: |
          cat << 'ENDOFSOURCE' > drm_play.c
          #include <fcntl.h>
          #include <unistd.h>
          #include <sys/mman.h>
          #include <sys/ioctl.h>
          #include <sys/wait.h>
          #include <sys/stat.h>
          #include <stdio.h>
          #include <stdlib.h>
          #include <string.h>
          #include <time.h>
          #include <errno.h>
          #include <libgen.h>
          #include <limits.h>
          #include <xf86drm.h>
          #include <xf86drmMode.h>
          #include <drm_fourcc.h>

          #include "apple_raw.h"

          #define VIDEO_W  172
          #define VIDEO_H  172
          #define BPP      32
          #define FPS      25
          #define DURATION 36

          static uint32_t screen_w, screen_h;

          void sleep_ms(int ms) {
              struct timespec ts = { .tv_sec = ms / 1000, .tv_nsec = (ms % 1000) * 1000000 };
              nanosleep(&ts, NULL);
          }

          void copy_frame_centered(void *dst, const uint8_t *frame_data, uint32_t pitch) {
              uint8_t *buf = (uint8_t *)dst;
              memset(buf, 0, pitch * screen_h);
              int x_offset = (screen_w - VIDEO_W) / 2;
              int y_offset = ((int)screen_h - VIDEO_H) / 2;
              if (y_offset < 0) y_offset = 0;
              uint32_t src_row_bytes = VIDEO_W * (BPP / 8);
              for (int y = 0; y < VIDEO_H; y++) {
                  memcpy(buf + (y + y_offset) * pitch + x_offset * (BPP / 8),
                         frame_data + y * src_row_bytes,
                         src_row_bytes);
              }
          }

          const uint8_t* get_frame(long frame_index, long total_frames) {
              frame_index = frame_index % total_frames;
              return apple_raw + (frame_index * VIDEO_W * VIDEO_H * (BPP / 8));
          }

          int get_exe_dir(char *dir_buf, size_t buf_size) {
              ssize_t len = readlink("/proc/self/exe", dir_buf, buf_size - 1);
              if (len > 0) {
                  dir_buf[len] = '\0';
                  char *d = dirname(dir_buf);
                  if (d != dir_buf) memmove(dir_buf, d, strlen(d) + 1);
                  return 0;
              }
              return -1;
          }

          int main(int argc, char *argv[]) {
              const char *drm_device = (argc > 1) ? argv[1] : "/dev/dri/card0";

              char exe_dir[PATH_MAX] = "/tmp";
              get_exe_dir(exe_dir, sizeof(exe_dir));

              size_t frame_size = VIDEO_W * VIDEO_H * (BPP / 8);
              long total_frames = (long)(apple_raw_len / frame_size);
              long total_duration_frames = FPS * DURATION;

              int fd = open(drm_device, O_RDWR | O_CLOEXEC);
              if (fd < 0) return 1;

              uint64_t has_dumb = 0;
              if (drmGetCap(fd, DRM_CAP_DUMB_BUFFER, &has_dumb) < 0 || !has_dumb) {
                  close(fd);
                  return 1;
              }

              drmModeRes *res = drmModeGetResources(fd);
              if (!res) { close(fd); return 1; }

              drmModeConnector *conn = NULL;
              uint32_t crtc_id = 0;

              for (int i = 0; i < res->count_connectors; i++) {
                  drmModeConnector *c = drmModeGetConnector(fd, res->connectors[i]);
                  if (!c) continue;
                  if (!conn && c->count_modes > 0) {
                      conn = c;
                      screen_w = c->modes[0].hdisplay;
                      screen_h = c->modes[0].vdisplay;
                  } else {
                      drmModeFreeConnector(c);
                  }
              }
              if (!conn) { drmModeFreeResources(res); close(fd); return 1; }

              drmModeCrtc *crtc = NULL;
              if (conn->encoder_id) {
                  drmModeEncoder *enc = drmModeGetEncoder(fd, conn->encoder_id);
                  if (enc) {
                      crtc = drmModeGetCrtc(fd, enc->crtc_id);
                      if (crtc) crtc_id = crtc->crtc_id;
                      drmModeFreeEncoder(enc);
                  }
              }
              if (!crtc) {
                  for (int i = 0; i < res->count_crtcs; i++) {
                      crtc = drmModeGetCrtc(fd, res->crtcs[i]);
                      if (crtc) { crtc_id = crtc->crtc_id; break; }
                  }
              }
              if (!crtc) { drmModeFreeResources(res); close(fd); return 1; }

              struct drm_mode_create_dumb dumb[2];
              void *map[2];
              uint32_t fb_id[2];

              for (int i = 0; i < 2; i++) {
                  memset(&dumb[i], 0, sizeof(dumb[i]));
                  dumb[i].width = screen_w;
                  dumb[i].height = screen_h;
                  dumb[i].bpp = BPP;
                  if (drmIoctl(fd, DRM_IOCTL_MODE_CREATE_DUMB, &dumb[i]) < 0) {
                      drmModeFreeResources(res); close(fd); return 1;
                  }
                  uint32_t handles[4] = {dumb[i].handle, 0, 0, 0};
                  uint32_t pitches[4] = {dumb[i].pitch, 0, 0, 0};
                  uint32_t offsets[4] = {0, 0, 0, 0};
                  if (drmModeAddFB2(fd, screen_w, screen_h, DRM_FORMAT_XRGB8888,
                                    handles, pitches, offsets, &fb_id[i], 0) < 0) {
                      drmModeFreeResources(res); close(fd); return 1;
                  }
                  struct drm_mode_map_dumb map_req;
                  memset(&map_req, 0, sizeof(map_req));
                  map_req.handle = dumb[i].handle;
                  if (drmIoctl(fd, DRM_IOCTL_MODE_MAP_DUMB, &map_req) < 0) {
                      drmModeFreeResources(res); close(fd); return 1;
                  }
                  map[i] = mmap(0, dumb[i].size, PROT_READ | PROT_WRITE, MAP_SHARED, fd, map_req.offset);
                  if (map[i] == MAP_FAILED) {
                      drmModeFreeResources(res); close(fd); return 1;
                  }
                  memset(map[i], 0, dumb[i].size);
              }

              /* 显示第一帧 */
              copy_frame_centered(map[0], get_frame(0, total_frames), dumb[0].pitch);
              if (drmModeSetCrtc(fd, crtc_id, fb_id[0], 0, 0,
                                 &conn->connector_id, 1, &conn->modes[0]) < 0) {
                  drmModeFreeResources(res); close(fd); return 1;
              }

              /* 循环播放 36 秒 */
              int cur = 1;
              long frame_count = 1;
              time_t start_time = time(NULL);

              while (frame_count < total_duration_frames) {
                  if (difftime(time(NULL), start_time) >= DURATION) break;

                  copy_frame_centered(map[cur], get_frame(frame_count, total_frames), dumb[cur].pitch);
                  drmModeSetCrtc(fd, crtc_id, fb_id[cur], 0, 0,
                                 &conn->connector_id, 1, &conn->modes[0]);
                  cur = 1 - cur;
                  frame_count++;
                  sleep_ms(1000 / FPS);
              }

              /* === 关键修改：不清屏，不释放 DRM 资源 === */
              /* 保持最后一帧显示在屏幕上，直接 fork 运行 bo.py */
              /* 进程退出时内核会自动回收 fd 和 DRM 资源 */

              char bo_path[PATH_MAX];
              snprintf(bo_path, sizeof(bo_path), "%s/bo.py", exe_dir);
              struct stat st;
              if (stat(bo_path, &st) == 0) {
                  pid_t pid = fork();
                  if (pid == 0) {
                      /* 子进程：关闭继承的 fd */
                      close(fd);
                      /* 等待一小段时间让父进程退出释放 DRM */
                      usleep(1000000);  /* 1秒 */
                      execlp("python3", "python3", bo_path, NULL);
                      execlp("python", "python", bo_path, NULL);
                      _exit(1);
                  }
              }

              close(fd);
              return 0;
          }
          ENDOFSOURCE

      - name: Cross Compile for ARM64 (RK3528)
        run: |
          aarch64-linux-gnu-gcc -O2 -static -o drm_play_arm64 drm_play.c \
            -I. \
            -I/tmp/arm64-sysroot/usr/include \
            -I/tmp/arm64-sysroot/usr/include/libdrm \
            -I/tmp/arm64-sysroot/usr/include/drm \
            -I/tmp/arm64-sysroot/usr/include/aarch64-linux-gnu \
            -L/tmp/arm64-sysroot/usr/lib/aarch64-linux-gnu \
            -ldrm
          
          chmod +x drm_play_arm64
          file drm_play_arm64
          ls -lh drm_play_arm64

      # --- 3. 交叉编译 drm_show_arm64（供 bo.py 调用显示图片） ---
      - name: Create DRM Show C Source (stdin pipe mode, zero file IO)
        run: |
          cat << 'ENDOFSOURCE' > drm_show.c
          #include <fcntl.h>
          #include <unistd.h>
          #include <sys/mman.h>
          #include <sys/ioctl.h>
          #include <stdio.h>
          #include <stdlib.h>
          #include <string.h>
          #include <stdint.h>
          #include <xf86drm.h>
          #include <xf86drmMode.h>
          #include <drm_fourcc.h>

          /*
           * Usage:
           *   drm_show_arm64 <drm_device> <raw_file> [width] [height]
           *   drm_show_arm64 <drm_device> - [width] [height] < raw_data
           *
           * When raw_file is "-", reads pixel data from stdin (pipe mode).
           * Pixel format: XRGB8888 (BGRX in memory order).
           */

          int main(int argc, char *argv[]) {
              if (argc < 3) {
                  fprintf(stderr, "Usage: %s <drm_device> <raw_file|-> [width] [height]\n", argv[0]);
                  return 1;
              }

              const char *drm_device = argv[1];
              const char *raw_file = argv[2];
              uint32_t img_w = (argc > 3) ? (uint32_t)atoi(argv[3]) : 320;
              uint32_t img_h = (argc > 4) ? (uint32_t)atoi(argv[4]) : 172;

              size_t expected_size = (size_t)img_w * img_h * 4;
              uint8_t *img_data = malloc(expected_size);
              if (!img_data) return 1;

              /* Read pixel data: from file or stdin */
              if (strcmp(raw_file, "-") == 0) {
                  size_t total_read = 0;
                  while (total_read < expected_size) {
                      ssize_t n = read(STDIN_FILENO, img_data + total_read,
                                       expected_size - total_read);
                      if (n <= 0) break;
                      total_read += n;
                  }
                  if (total_read < expected_size) {
                      fprintf(stderr, "stdin: expected %zu bytes, got %zu\n",
                              expected_size, total_read);
                      free(img_data);
                      return 1;
                  }
              } else {
                  FILE *fp = fopen(raw_file, "rb");
                  if (!fp) { perror("fopen"); free(img_data); return 1; }
                  size_t rd = fread(img_data, 1, expected_size, fp);
                  fclose(fp);
                  if (rd < expected_size) {
                      fprintf(stderr, "file: expected %zu bytes, got %zu\n",
                              expected_size, rd);
                      free(img_data);
                      return 1;
                  }
              }

              /* Open DRM device */
              int fd = open(drm_device, O_RDWR | O_CLOEXEC);
              if (fd < 0) { perror("open drm"); free(img_data); return 1; }

              uint64_t has_dumb = 0;
              if (drmGetCap(fd, DRM_CAP_DUMB_BUFFER, &has_dumb) < 0 || !has_dumb) {
                  close(fd); free(img_data); return 1;
              }

              drmModeRes *res = drmModeGetResources(fd);
              if (!res) { close(fd); free(img_data); return 1; }

              /* Find connector */
              drmModeConnector *conn = NULL;
              uint32_t screen_w = 0, screen_h = 0;
              for (int i = 0; i < res->count_connectors; i++) {
                  drmModeConnector *c = drmModeGetConnector(fd, res->connectors[i]);
                  if (!c) continue;
                  if (c->connection == DRM_MODE_CONNECTED && c->count_modes > 0) {
                      conn = c;
                      screen_w = c->modes[0].hdisplay;
                      screen_h = c->modes[0].vdisplay;
                      break;
                  }
                  drmModeFreeConnector(c);
              }
              if (!conn) { drmModeFreeResources(res); close(fd); free(img_data); return 1; }

              /* Find CRTC */
              uint32_t crtc_id = 0;
              if (conn->encoder_id) {
                  drmModeEncoder *enc = drmModeGetEncoder(fd, conn->encoder_id);
                  if (enc) { crtc_id = enc->crtc_id; drmModeFreeEncoder(enc); }
              }
              if (!crtc_id && res->count_crtcs > 0) crtc_id = res->crtcs[0];
              if (!crtc_id) {
                  drmModeFreeConnector(conn);
                  drmModeFreeResources(res);
                  close(fd); free(img_data); return 1;
              }

              /* Create dumb buffer */
              struct drm_mode_create_dumb dumb;
              memset(&dumb, 0, sizeof(dumb));
              dumb.width = screen_w;
              dumb.height = screen_h;
              dumb.bpp = 32;
              if (drmIoctl(fd, DRM_IOCTL_MODE_CREATE_DUMB, &dumb) < 0) goto cleanup;

              /* Create framebuffer */
              uint32_t fb_id;
              uint32_t handles[4] = {dumb.handle, 0, 0, 0};
              uint32_t pitches[4] = {dumb.pitch, 0, 0, 0};
              uint32_t offsets[4] = {0, 0, 0, 0};
              if (drmModeAddFB2(fd, screen_w, screen_h, DRM_FORMAT_XRGB8888,
                                handles, pitches, offsets, &fb_id, 0) < 0) goto cleanup;

              /* mmap framebuffer */
              struct drm_mode_map_dumb map_req;
              memset(&map_req, 0, sizeof(map_req));
              map_req.handle = dumb.handle;
              if (drmIoctl(fd, DRM_IOCTL_MODE_MAP_DUMB, &map_req) < 0) goto cleanup;

              void *map = mmap(0, dumb.size, PROT_READ | PROT_WRITE,
                               MAP_SHARED, fd, map_req.offset);
              if (map == MAP_FAILED) goto cleanup;

              /* Clear screen */
              memset(map, 0, dumb.size);

              /* Copy image centered */
              int x_off = ((int)screen_w - (int)img_w) / 2;
              int y_off = ((int)screen_h - (int)img_h) / 2;
              if (x_off < 0) x_off = 0;
              if (y_off < 0) y_off = 0;
              uint32_t cw = (img_w > screen_w) ? screen_w : img_w;
              uint32_t ch = (img_h > screen_h) ? screen_h : img_h;

              for (uint32_t y = 0; y < ch; y++) {
                  memcpy((uint8_t *)map + (y + y_off) * dumb.pitch + x_off * 4,
                         img_data + y * img_w * 4,
                         cw * 4);
              }

              /* Display */
              drmModeSetCrtc(fd, crtc_id, fb_id, 0, 0,
                             &conn->connector_id, 1, &conn->modes[0]);

              munmap(map, dumb.size);

          cleanup:
              drmModeFreeConnector(conn);
              drmModeFreeResources(res);
              close(fd);
              free(img_data);
              return 0;
          }
          ENDOFSOURCE

      - name: Cross Compile drm_show for ARM64
        run: |
          aarch64-linux-gnu-gcc -O2 -static -o drm_show_arm64 drm_show.c \
            -I/tmp/arm64-sysroot/usr/include \
            -I/tmp/arm64-sysroot/usr/include/libdrm \
            -I/tmp/arm64-sysroot/usr/include/drm \
            -I/tmp/arm64-sysroot/usr/include/aarch64-linux-gnu \
            -L/tmp/arm64-sysroot/usr/lib/aarch64-linux-gnu \
            -ldrm
          
          chmod +x drm_show_arm64
          file drm_show_arm64
          ls -lh drm_show_arm64

      # --- 4. 生成 init.d 开机脚本 ---
      - name: Create init.d boot script
        run: |
          cat << 'EOF' > 99-bootanim
          #!/bin/sh /etc/rc.common

          START=11
          STOP=10

          start() {
              PLAYER="/usr/sbin/drm_play_arm64"
              DRM_DEV="/dev/dri/card1"
              
              [ ! -f "$PLAYER" ] && return 1
              
              # 短暂等待 DRM 设备就绪
              [ ! -e "$DRM_DEV" ] && sleep 1
              
              # 静默后台运行，无任何输出，无日志写入
              "$PLAYER" "$DRM_DEV" >/dev/null 2>&1 &
          }

          stop() {
              killall drm_play_arm64 2>/dev/null
          }
          EOF
          chmod +x 99-bootanim

      # --- 5. 生成安装说明 ---
      - name: Create install instructions
        run: |
          cat << 'EOF' > INSTALL.txt
          ============================================
            Boot Animation Installation Guide
          ============================================

          Files:
            drm_play_arm64  - 开机动画程序（视频数据已嵌入）
            drm_show_arm64  - 图片显示程序（供 bo.py 调用）
            99-bootanim     - OpenWrt init.d 开机脚本

          Step 1: 上传文件
          -------------------------
          scp drm_play_arm64 root@192.168.1.1:/usr/sbin/
          scp drm_show_arm64 root@192.168.1.1:/usr/sbin/
          scp 99-bootanim root@192.168.1.1:/etc/init.d/

          Step 2: 设置权限和启用
          -------------------------
          ssh root@192.168.1.1
          chmod +x /usr/sbin/drm_play_arm64
          chmod +x /usr/sbin/drm_show_arm64
          chmod +x /etc/init.d/99-bootanim
          /etc/init.d/99-bootanim enable

          Step 3: 测试
          -------------------------
          /usr/sbin/drm_play_arm64 /dev/dri/card1

          Step 4: 重启验证
          -------------------------
          reboot

          说明:
          - 程序完全静默运行，无任何日志输出
          - 不会对 eMMC 产生额外读写
          - bo.py 通过管道调用 drm_show_arm64 显示图片，零文件IO
          - 如需运行 bo.py，放到 /usr/sbin/bo.py
          - START=11 修改数字以调整启动顺序

          卸载:
          /etc/init.d/99-bootanim disable
          rm /usr/sbin/drm_play_arm64
          rm /usr/sbin/drm_show_arm64
          rm /etc/init.d/99-bootanim
          EOF

      # --- 6. 上传产物 ---
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: H29K-BootAnimation-Pack
          path: |
            drm_play_arm64
            drm_show_arm64
            99-bootanim
            INSTALL.txt
