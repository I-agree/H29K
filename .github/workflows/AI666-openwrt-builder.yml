name: OpenWrt 固件生成脚本

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: rk3528-hinlink-h29k.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  # 固定用 /mnt 大盘，不写死 sdb1
  WORK_DIR: /mnt/workdir
  CCACHE_DIR: /mnt/ccache

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 检出源码
      uses: actions/checkout@main

    - name: 准备大盘工作目录（强制Go/Docker全走大盘，永不卡死）
      run: |
        sudo mkdir -p $WORK_DIR $CCACHE_DIR /mnt/tmp
        sudo chown -R $USER:$USER $WORK_DIR $CCACHE_DIR /mnt/tmp
        sudo mount --bind /mnt/tmp /tmp
        sudo mount --bind /mnt/tmp /var/tmp
        
        # 🌟【核心修复】强制恢复系统标准临时目录权限，防止底层安全组件权限不足导致构建死锁
        sudo chmod 1777 /tmp
        sudo chmod 1777 /var/tmp
        
        # 🌟【核心修复】关闭 Git 密码终端交互，如果遇到坏包凭证错误立刻弹回报错，绝不后台死等
        echo "GIT_TERMINAL_PROMPT=0" >> $GITHUB_ENV
        
        # 🌟【核心修复】限制 Go 编译器内部最大线程并发，防止其霸占 4 核导致虚拟机 I/O 锁死
        echo "GOMAXPROCS=2" >> $GITHUB_ENV
        
        export TMPDIR=/mnt/tmp
        export TEMP=/mnt/tmp
        export TMP=/mnt/tmp
        export GO_TMPDIR=/mnt/tmp
        export CGO_TMPDIR=/mnt/tmp
        df -h
        echo "WORK_DIR=$WORK_DIR" >> $GITHUB_ENV
        echo "CCACHE_DIR=$CCACHE_DIR" >> $GITHUB_ENV
        echo "TMPDIR=/mnt/tmp" >> $GITHUB_ENV
        echo "GO_TMPDIR=/mnt/tmp" >> $GITHUB_ENV
        echo "CGO_TMPDIR=/mnt/tmp" >> $GITHUB_ENV

    - name: 初始化构建环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev python3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: 恢复/持久化 ccache 缓存
      uses: actions/cache@v4
      with:
        path: ${{ env.CCACHE_DIR }}
        key: ${{ runner.os }}-openwrt-ccache-${{ env.REPO_BRANCH }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-openwrt-ccache-${{ env.REPO_BRANCH }}-

    - name: 克隆 OpenWrt 源码到大盘
      run: |
        cd $WORK_DIR
        df -hT $PWD
        # 🌟【优化】深度为 1 的浅克隆，避免下载官方库数吉字节的无用历史记录
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf $WORK_DIR/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 加载自定义软件源
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新软件源索引
      run: cd openwrt && ./scripts/feeds update -a

    - name: 安装软件源组件
      run: cd openwrt && ./scripts/feeds install -a

    - name: 加载自定义配置文件
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: 启用 ccache 加速（大盘）
      run: |
        cd openwrt
        echo "CONFIG_CCACHE=y" >> .config
        echo "CCACHE_DIR=$CCACHE_DIR" >> $GITHUB_ENV
        mkdir -p $CCACHE_DIR

    - name: 下载依赖软件包
      id: package
      run: |
        cd openwrt
        make defconfig
        # 🌟【优化】引入3次下载重试逻辑，防止因国外源码站单次网络波动导致流程断头卡死
        for i in {1..3}; do make download -j8 && break || sleep 5; done
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件镜像
      id: compile
      run: |
        cd openwrt
        ccache -M 9G
        echo -e "$(nproc) thread compile"
        # 🌟【核心修复】优先全核编译。若失败，直接降级到双核（充分利用16G内存和4核）并打印详细日志（V=s）查错，决不单核憋死
        make -j$(nproc) || make -j2 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: 检查磁盘空间使用情况
      if: (!cancelled())
      run: df -hT

    - name: 上传 bin 目录（含全部构建产物）
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: 整理固件输出目录
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件输出目录
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: 生成发布版本标签
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件至 GitHub Release
      uses: softprops/action-gh-release@master
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: 清理历史工作流运行记录
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 2

    - name: 清理旧版 GitHub Release
      uses: dev-drprasad/delete-older-releases@master
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
