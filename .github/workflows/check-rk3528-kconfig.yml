name: Check RK3528 Kconfig Consistency (Source-Only)

on:
  push:
    paths:
      - 'config'
      - 'target/linux/rockchip/**'
      - 'package/kernel/linux/**'
      - 'include/kernel-version.mk'
  pull_request:
    paths:
      - 'config'
      - 'target/linux/rockchip/**'
      - 'package/kernel/linux/**'
      - 'include/kernel-version.mk'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Run in debug mode? (true/false)'
        required: false
        default: 'false'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-22.04
    timeout-minutes: 3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 1

      - name: Install minimal dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libncurses5-dev \
            gawk \
            flex \
            bison \
            python3 \
            bc \
            device-tree-compiler

      - name: Verify Rockchip target exists in source tree
        run: |
          if [ ! -d "target/linux/rockchip" ]; then
            echo "❌ target/linux/rockchip/ directory missing" >&2
            exit 1
          fi
          echo "✅ target/linux/rockchip/ exists"

      - name: Verify RK3528 DTS support is present
        run: |
          if ! find target/linux/rockchip/files/arch/arm64/boot/dts/rockchip/ -name "*rk3528*" -o -name "*RK3528*" | head -1 >/dev/null; then
            echo "❌ No RK3528 DTS files found in target/linux/rockchip/" >&2
            exit 1
          fi
          echo "✅ RK3528 DTS files detected"

      - name: Validate mandatory symbols in config file
        run: |
          if [ ! -f "config" ]; then
            echo "❌ config file missing from repository root" >&2
            exit 1
          fi
          REQUIRED_SYMBOLS=(
            "CONFIG_ROCKCHIP_RK3528=y"
            "CONFIG_ARM64_PA_BITS_40=y"
            "CONFIG_SPARSEMEM_VMEMMAP=n"
            "CONFIG_ARM64_VA_BITS_48=y"
          )
          for sym in "${REQUIRED_SYMBOLS[@]}"; do
            if ! grep -q "^$sym$" config; then
              echo "❌ Missing in config: $sym" >&2
              echo "💡 Hint: Add it manually or run 'make menuconfig' and enable RK3528 support" >&2
              exit 1
            fi
          done
          echo "✅ All mandatory symbols found in config"

      - name: Validate Kconfig dependency graph (source-only)
        if: ${{ github.event.inputs.debug != 'true' }}
        run: |
          cd target/linux/rockchip/
          # Use 'make help' to verify Kconfig is parseable (no need for build_dir)
          if ! make -s ARCH=arm64 help 2>/dev/null | grep -q "menuconfig"; then
            echo "❌ Rockchip Kconfig structure broken" >&2
            exit 1
          fi
          # Test basic Kconfig parsing without building
          if ! scripts/kconfig/conf --listnewconfig Kconfig 2>/dev/null >/dev/null; then
            echo "❌ Kconfig syntax error in target/linux/rockchip/" >&2
            exit 1
          fi
          echo "✅ Rockchip Kconfig syntax valid"

      - name: Debug mode — dump config & DTS
        if: ${{ github.event.inputs.debug == 'true' }}
        run: |
          echo "🔍 DEBUG MODE"
          echo "=== config file (first 15 lines) ==="
          head -15 config || echo "(config missing)"
          echo ""
          echo "=== RK3528 DTS files ==="
          find target/linux/rockchip/files/arch/arm64/boot/dts/rockchip/ -name "*rk3528*" 2>/dev/null || echo "(none found)"
