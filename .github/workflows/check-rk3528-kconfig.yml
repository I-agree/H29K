name: Check RK3528 Kconfig Consistency

on:
  push:
    paths:
      - 'config'
      - 'target/linux/rockchip/**'
      - 'package/kernel/linux/**'
      - 'include/kernel-version.mk'
  pull_request:
    paths:
      - 'config'
      - 'target/linux/rockchip/**'
      - 'package/kernel/linux/**'
      - 'include/kernel-version.mk'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Skip validation and just echo config? (true/false)'
        required: false
        default: 'false'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libncurses5-dev \
            gawk \
            zlib1g-dev \
            flex \
            bison \
            python3 \
            bc \
            libssl-dev \
            liblz4-tool \
            device-tree-compiler \
            rsync

      - name: Initialize OpenWrt build environment
        run: |
          make defconfig >/dev/null 2>&1 || true
          # Pre-compile rockchip target to ensure kernel source is fetched
          make target/linux/rockchip/compile -j1 >/dev/null 2>&1 || true

      - name: Locate Rockchip Linux kernel source directory
        id: find-kernel
        run: |
          # Match linux-* pattern used in OpenWrt (e.g., linux-6.12.85, linux-6.6.30)
          KERNEL_DIR=$(find build_dir -maxdepth 2 -type d -name "linux-*" -path "build_dir/target-linux-arm64_musl/linux-rockchip/*" | head -n1)
          if [ -z "$KERNEL_DIR" ]; then
            echo "ERROR: Rockchip kernel source not found in build_dir" >&2
            echo "INFO: Available dirs:" >&2
            find build_dir -maxdepth 2 -type d -name "linux-*" -path "build_dir/target-linux-arm64_musl/linux-rockchip/*" 2>/dev/null || echo "(none)" >&2
            exit 1
          fi
          echo "KERNEL_DIR=$KERNEL_DIR" >> "$GITHUB_OUTPUT"
          echo "Found kernel: $(basename $KERNEL_DIR)" >&2

      - name: Validate Kconfig dependency graph
        if: ${{ github.event.inputs.debug != 'true' }}
        run: |
          cd "${{ steps.find-kernel.outputs.KERNEL_DIR }}"
          echo "=== Running syncconfig for RK3528 validation ==="
          echo "Kernel dir: $(pwd)"
          echo "Config file: $(ls -l .config)"
          
          # Force ARCH + CROSS_COMPILE to avoid host arch confusion
          if ! make -s ARCH=arm64 CROSS_COMPILE= HOSTCC="$(command -v gcc)" syncconfig 2>&1 | grep -q "error:"; then
            echo "✅ Kconfig dependency graph is consistent"
          else
            echo "❌ Kconfig validation FAILED:"
            make -s ARCH=arm64 CROSS_COMPILE= HOSTCC="$(command -v gcc)" syncconfig 2>&1
            exit 1
          fi

      - name: Verify mandatory RK3528 symbols
        if: ${{ github.event.inputs.debug != 'true' }}
        run: |
          cd "${{ steps.find-kernel.outputs.KERNEL_DIR }}"
          REQUIRED_SYMBOLS=(
            "CONFIG_ROCKCHIP_RK3528=y"
            "CONFIG_ARM64_PA_BITS_40=y"
            "CONFIG_SPARSEMEM_VMEMMAP=n"
            "CONFIG_ARM64_VA_BITS_48=y"
          )
          for sym in "${REQUIRED_SYMBOLS[@]}"; do
            if ! grep -q "^$sym$" .config; then
              echo "❌ Missing required symbol: $sym" >&2
              exit 1
            fi
          done
          echo "✅ All mandatory RK3528 symbols present"

      - name: Debug mode — echo current config
        if: ${{ github.event.inputs.debug == 'true' }}
        run: |
          echo "🔍 DEBUG MODE ENABLED"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.head_ref || github.ref }}"
          echo "Workflow triggered by: ${{ github.event_name }}"
          echo ""
          echo "=== First 20 lines of config ==="
          head -20 config || echo "(config file missing)"
          echo ""
          echo "=== Kernel source detection result ==="
          ls -ld build_dir/target-linux-arm64_musl/linux-rockchip/* 2>/dev/null || echo "No kernel dir found"

      - name: Cleanup
        if: always()
        run: |
          rm -rf build_dir/
