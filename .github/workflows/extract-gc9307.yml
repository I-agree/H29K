name: Dump fb_gc9307 Raw Hex View
run-name: Binary hex dump of ko file
on:
  workflow_dispatch

jobs:
  hexdump:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y wget vim-common file
          # vim-common自带xxd二进制查看工具

      - name: Download ko binary
        run: |
          wget -O fb_gc9307.ko https://raw.githubusercontent.com/I-agree/H29K/main/DTB/fb_gc9307.ko
          ls -lh fb_gc9307.ko
          file fb_gc9307.ko

      - name: Full standard hex dump（带偏移+ASCII对照）
        run: |
          xxd fb_gc9307.ko > ko_full_hex.txt
          # 纯无偏移十六进制字符串（方便检索字节序列）
          xxd -p fb_gc9307.ko > ko_plain_hex.txt

      - name: Upload hex dump artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: fb_gc9307-hex-output
          path: |
            fb_gc9307.ko
            ko_full_hex.txt
            ko_plain_hex.txt
          retention-days: 14
