name: Extract GC9307 Init Sequence
run-name: Extract init_sequence from fb_gc9307.ko
on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y wget llvm file

      - name: Download fb_gc9307.ko
        run: |
          wget -O fb_gc9307.ko https://raw.githubusercontent.com/I-agree/H29K/main/DTB/fb_gc9307.ko
          ls -l fb_gc9307.ko
          file fb_gc9307.ko

      - name: Dump all sections content
        run: |
          llvm-objdump -s fb_gc9307.ko > all_sections_dump.txt
          grep -n -A250 "gc9307_init_sequence" all_sections_dump.txt > gc9307_init_raw.txt
          cat gc9307_init_raw.txt

      - name: Upload logs
        uses: actions/upload-artifact@v7.0.1
        with:
          name: gc9307-dump-output
          path: |
            all_sections_dump.txt
            gc9307_init_raw.txt
          retention-days: 14
