name: Kconfig审核（完整预构建）

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: rk3528-hinlink-h29k.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai
  WORK_DIR: /workdir

jobs:
  kconfig-audit:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
    - name: 检出源码与配置脚本
      uses: actions/checkout@v6.0.3

    - name: 调整磁盘空间
      run: |
        sudo mkdir -p $WORK_DIR
        sudo chown -R $USER:$USER $WORK_DIR
        sudo swapoff -a || true
        sudo dd if=/dev/zero of=/swapfile bs=1M count=5120
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        sudo sysctl vm.swappiness=10
        sudo umount /tmp || true
        sudo mount -t tmpfs tmpfs /tmp -o size=10G,nr_inodes=0
        echo "WORK_DIR=$WORK_DIR" >> $GITHUB_ENV

    - name: 初始化构建环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev python3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf quilt python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd libyaml-dev zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: 克隆 OpenWrt 源码到磁盘
      run: |
        cd $WORK_DIR
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf $WORK_DIR/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 加载自定义软件源
      run: |
        OPENWRT_DIR=${{ env.WORK_DIR }}/openwrt
        [ -f $FEEDS_CONF ] && cp -f $FEEDS_CONF ${OPENWRT_DIR}/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd ${OPENWRT_DIR}
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新软件源索引
      run: |
        cd ${{ env.WORK_DIR }}/openwrt
        ./scripts/feeds update -a

    - name: 安装软件源组件
      run: |
        cd ${{ env.WORK_DIR }}/openwrt
        ./scripts/feeds install -a

    - name: 加载自定义配置文件与 DIY-P2
      run: |
        OPENWRT_DIR=${{ env.WORK_DIR }}/openwrt
        if [ -d files ]; then
          mkdir -p ${OPENWRT_DIR}/files
          cp -r files/* ${OPENWRT_DIR}/files/
        fi
        [ -f $CONFIG_FILE ] && cp -f $CONFIG_FILE ${OPENWRT_DIR}/.config
        chmod +x $DIY_P2_SH
        cd ${OPENWRT_DIR}
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: 🔄 解决依赖、准备内核并手动生成内核 .config
      run: |
        cd ${{ env.WORK_DIR }}/openwrt
        
        echo "=== 1. 循环 defconfig 收敛 OpenWrt 层依赖 ==="
        CONF_BIN=""
        for i in {1..5}; do
          make defconfig
          # 每次循环重新编译获取conf二进制
          make -C scripts/config conf 2>/dev/null
          if [ -x ./staging_dir/host/bin/conf ]; then
            CONF_BIN=./staging_dir/host/bin/conf
          elif [ -x ./scripts/config/conf ]; then
            CONF_BIN=./scripts/config/conf
          fi

          if [ -n "${CONF_BIN}" ] && ${CONF_BIN} --silentoldconfig Kconfig > /dev/null 2>&1; then
            echo "✅ 第 $i 轮后 OpenWrt 配置已稳定"
            break
          else
            echo "⚠️ 第 $i 轮仍有未满足依赖，继续收敛..."
          fi
        done
        
        echo "=== 2. 最终 OpenWrt 依赖状态 ==="
        # 重新获取conf二进制
        make -C scripts/config conf 2>/dev/null
        if [ -x ./staging_dir/host/bin/conf ]; then
          CONF_BIN=./staging_dir/host/bin/conf
        elif [ -x ./scripts/config/conf ]; then
          CONF_BIN=./scripts/config/conf
        else
          echo "❌ 无法编译获取conf工具，终止配置依赖检查"
          exit 1
        fi
        
        if ${CONF_BIN} --silentoldconfig Kconfig 2> openwrt_unmet_deps_final.txt; then
          echo "✅ OpenWrt 层无未满足依赖"
          > openwrt_unmet_deps_final.txt
        else
          echo "❌ 仍存在未满足依赖："
          cat openwrt_unmet_deps_final.txt
        fi
        
        echo "=== 3. 下载依赖包 ==="
        for i in {1..3}; do make download -j8 && break || sleep 5; done
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;
        
        echo "=== 4. 准备内核源码树 ==="
        make target/linux/prepare V=s 2>&1 | tail -50
        
        echo "=== 5. 🔑 手动生成内核 .config（核心步骤）==="
        KERNEL_SRC=$(find build_dir/target-* -maxdepth 2 -type d -name "linux-*" 2>/dev/null | head -1)
        if [ -z "${KERNEL_SRC}" ]; then
          echo "❌ 未找到内核源码目录"
          find build_dir/target-* -maxdepth 3 -type d 2>/dev/null | head -20
          exit 1
        fi
        echo "📁 内核源码目录: ${KERNEL_SRC}"
        
        TARGET_FRAGMENT=$(find target/linux/rockchip -name "config-*" 2>/dev/null | sort -V | tail -1)
        echo "📄 Target fragment: ${TARGET_FRAGMENT}"
        
        if [ -f scripts/kconfig.pl ] && [ -f "${TARGET_FRAGMENT}" ]; then
          grep -E '^CONFIG_' .config | grep -v '^CONFIG_TARGET_' > /tmp/user_kernel_opts.txt
          perl scripts/kconfig.pl '+' "${TARGET_FRAGMENT}" /tmp/user_kernel_opts.txt > "${KERNEL_SRC}/.config"
          echo "✅ 已合并生成内核 .config ($(wc -l < "${KERNEL_SRC}/.config") 行)"
        else
          cp "${TARGET_FRAGMENT}" "${KERNEL_SRC}/.config"
          echo "⚠️ 仅使用 target fragment 作为内核 .config"
        fi
        
        echo "=== 6. 回到OpenWrt根目录执行内核oldconfig补全配置 ==="
        make target/linux/oldconfig V=s 2>&1 | tail -30
        echo "✅ 内核 .config 最终行数: $(wc -l < "${KERNEL_SRC}/.config")"

    - name: 🔍 生成 Kconfig 诊断文件（含内核弹窗检测）
      run: |
        cd ${{ env.WORK_DIR }}/openwrt
        # 重新加载conf二进制
        make -C scripts/config conf 2>/dev/null
        if [ -x ./staging_dir/host/bin/conf ]; then
          CONF_BIN=./staging_dir/host/bin/conf
        elif [ -x ./scripts/config/conf ]; then
          CONF_BIN=./scripts/config/conf
        else
          CONF_BIN=""
        fi
        
        echo "=== 1. OpenWrt 最小化 defconfig ==="
        ./scripts/diffconfig.sh > audit_defconfig.txt 2>&1
        
        echo "=== 2. Target/Device 信息 ==="
        grep -E '^CONFIG_TARGET_(rockchip|DEVICE)' .config > audit_target_info.txt || true
        
        echo "=== 3. 定位内核源码与 .config ==="
        KERNEL_SRC=$(find build_dir/target-* -maxdepth 2 -type d -name "linux-*" 2>/dev/null | head -1)
        KERNEL_CONFIG="${KERNEL_SRC}/.config"
        
        if [ -n "${KERNEL_SRC}" ] && [ -f "${KERNEL_CONFIG}" ]; then
          cp "${KERNEL_CONFIG}" audit_kernel_full_config.txt
          echo "✅ 内核 .config: ${KERNEL_CONFIG} ($(wc -l < "${KERNEL_CONFIG}") 行)"
          
          echo "=== 4. 🔥 列出所有会触发弹窗的新增配置项 ==="
          make -C "${KERNEL_SRC}" listnewconfig ARCH=arm64 > audit_kernel_new_options.txt 2>&1 || true
          NEW_COUNT=$(grep -cE "^CONFIG_|^# CONFIG_" audit_kernel_new_options.txt 2>/dev/null || echo 0)
          echo "📊 共发现 ${NEW_COUNT} 个新增/缺失配置项（即等效弹窗数）"
          
          echo "=== 5. 内核级未满足依赖检查 ==="
          if [ -n "${CONF_BIN}" ] && [ -f "${KERNEL_SRC}/Kconfig" ]; then
            ${CONF_BIN} --alldefconfig "${KERNEL_SRC}/Kconfig" 2> audit_kernel_unmet_deps.txt || true
          else
            echo "⚠️ 未获取conf工具或内核Kconfig不存在" > audit_kernel_unmet_deps.txt
          fi
        else
          echo "⚠️ 未找到内核 .config" > audit_kernel_full_config.txt
          echo "⚠️ 跳过弹窗检测" > audit_kernel_new_options.txt
          echo "⚠️ 跳过依赖检查" > audit_kernel_unmet_deps.txt
        fi
        
        echo "=== 6. Target fragment ==="
        TARGET_FRAGMENT=$(find target/linux/rockchip -name "config-*" 2>/dev/null | sort -V | tail -1)
        if [ -n "${TARGET_FRAGMENT}" ] && [ -f "${TARGET_FRAGMENT}" ]; then
          cp "${TARGET_FRAGMENT}" audit_target_kernel_fragment.txt
        else
          echo "⚠️ 未找到 target kernel fragment" > audit_target_kernel_fragment.txt
        fi
        
        echo "=== 7. 汇总统计 ==="
        wc -l .config audit_defconfig.txt audit_kernel_full_config.txt \
          audit_kernel_new_options.txt audit_target_kernel_fragment.txt \
          openwrt_unmet_deps_final.txt \
          >> audit_summary.txt 2>&1

    - name: 📦 打包诊断文件
      run: |
        cd ${{ env.WORK_DIR }}/openwrt
        FILE_LIST=(
          .config
          audit_defconfig.txt
          audit_target_info.txt
          audit_kernel_full_config.txt
          audit_kernel_new_options.txt
          audit_kernel_unmet_deps.txt
          audit_target_kernel_fragment.txt
          openwrt_unmet_deps_final.txt
          audit_summary.txt
        )
        # 过滤存在的文件再打包，避免警告
        EXIST_FILES=()
        for f in "${FILE_LIST[@]}"; do
          [ -f "$f" ] && EXIST_FILES+=("$f")
        done
        tar czf $GITHUB_WORKSPACE/kconfig-audit-rk3528.tar.gz "${EXIST_FILES[@]}" logs/ 2>/dev/null || true
        ls -lh $GITHUB_WORKSPACE/kconfig-audit-rk3528.tar.gz

    - name: 上传 Kconfig 诊断包
      uses: actions/upload-artifact@v7.0.1
      with:
        name: kconfig-audit-rk3528-${{ github.run_number }}
        path: kconfig-audit-rk3528.tar.gz
        retention-days: 7
