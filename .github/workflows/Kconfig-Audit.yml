name: Kconfig审核（完整预构建）

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: rk3528-hinlink-h29k.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai
  WORK_DIR: /workdir

jobs:
  kconfig-audit:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
    - name: 检出源码与配置脚本
      uses: actions/checkout@v6.0.3

    - name: 调整磁盘空间
      run: |
        sudo mkdir -p $WORK_DIR
        sudo chown -R $USER:$USER $WORK_DIR
        sudo swapoff -a || true
        sudo dd if=/dev/zero of=/swapfile bs=1M count=5120
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        sudo sysctl vm.swappiness=10
        sudo umount /tmp || true
        sudo mount -t tmpfs tmpfs /tmp -o size=10G,nr_inodes=0
        echo "WORK_DIR=$WORK_DIR" >> $GITHUB_ENV

    - name: 初始化构建环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev python3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf quilt python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd libyaml-dev zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: 克隆 OpenWrt 源码到磁盘
      run: |
        cd $WORK_DIR
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf $WORK_DIR/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 加载自定义软件源
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF ${{ env.WORK_DIR }}/openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd ${{ env.WORK_DIR }}/openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新软件源索引
      run: cd ${{ env.WORK_DIR }}/openwrt && ./scripts/feeds update -a

    - name: 安装软件源组件
      run: cd ${{ env.WORK_DIR }}/openwrt && ./scripts/feeds install -a

    - name: 加载自定义配置文件与 DIY-P2
      run: |
        if [ -d files ]; then
          mkdir -p ${{ env.WORK_DIR }}/openwrt/files
          cp -r files/* ${{ env.WORK_DIR }}/openwrt/files/
        fi
        [ -e $CONFIG_FILE ] && cp -f $CONFIG_FILE ${{ env.WORK_DIR }}/openwrt/.config
        chmod +x $DIY_P2_SH
        cd ${{ env.WORK_DIR }}/openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: 下载依赖并准备内核源码
      run: |
        cd ${{ env.WORK_DIR }}/openwrt
        make defconfig
        for i in {1..3}; do make download -j8 && break || sleep 5; done
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;
        
        echo "=== 准备内核源码树（保留完整构建状态）==="
        make target/linux/prepare V=s 2>&1 | tail -80
        
        echo "=== 诊断：列出 build_dir 下所有内核相关 .config ==="
        find build_dir/target-* -name ".config" 2>/dev/null | grep -i linux || echo "⚠️ build_dir 中未找到任何内核 .config"
        
        echo "=== 诊断：列出 build_dir 顶层目录结构 ==="
        ls -la build_dir/target-*/ 2>/dev/null || echo "⚠️ build_dir/target-* 不存在"

    - name: 🔍 生成 Kconfig 诊断文件（OpenWrt层+内核层）
      run: |
        cd ${{ env.WORK_DIR }}/openwrt
        
        echo "=== 1. 重新展开完整 .config ==="
        make defconfig
        
        echo "=== 2. OpenWrt 最小化 defconfig ==="
        ./scripts/diffconfig.sh > audit_defconfig.txt 2>&1
        
        echo "=== 3. OpenWrt 未满足依赖 ==="
        ./scripts/kconfig/conf --alldefconfig Kconfig 2> audit_unmet_deps.txt || true
        
        echo "=== 4. Target/Device 信息 ==="
        grep -E '^CONFIG_TARGET_(rockchip|DEVICE)' .config > audit_target_info.txt || true
        
        echo "=== 5. 动态定位并导出真实内核 .config ==="
        # 优先精确匹配，回退到宽泛匹配
        KERNEL_CONFIG=$(find build_dir/target-* -maxdepth 3 -name ".config" -path "*/linux-rockchip*" 2>/dev/null | head -1)
        if [ -z "$KERNEL_CONFIG" ]; then
          KERNEL_CONFIG=$(find build_dir/target-* -maxdepth 4 -name ".config" 2>/dev/null | grep -i linux | head -1)
        fi
        
        if [ -n "$KERNEL_CONFIG" ] && [ -f "$KERNEL_CONFIG" ]; then
          cp "$KERNEL_CONFIG" audit_kernel_full_config.txt
          echo "✅ 内核 .config 已导出: $KERNEL_CONFIG ($(wc -l < "$KERNEL_CONFIG") 行)"
          
          echo "=== 6. 内核级未满足依赖检查 ==="
          KERNEL_SRC=$(dirname "$KERNEL_CONFIG")
          if [ -f "$KERNEL_SRC/Kconfig" ]; then
            make -C "$KERNEL_SRC" olddefconfig 2>/dev/null || true
            ./scripts/kconfig/conf --alldefconfig "$KERNEL_SRC/Kconfig" 2> audit_kernel_unmet_deps.txt || true
            echo "✅ 内核依赖检查完成"
          else
            echo "⚠️ 内核源码目录缺少 Kconfig，跳过依赖检查" > audit_kernel_unmet_deps.txt
          fi
        else
          echo "⚠️ 未找到内核 .config，请参考上方诊断输出确认实际路径" > audit_kernel_full_config.txt
          echo "⚠️ 跳过内核依赖检查" > audit_kernel_unmet_deps.txt
        fi
        
        echo "=== 7. 导出 target 内核配置片段（动态匹配）==="
        TARGET_FRAGMENT=$(find target/linux/rockchip -name "config-*" 2>/dev/null | sort -V | tail -1)
        if [ -n "$TARGET_FRAGMENT" ] && [ -f "$TARGET_FRAGMENT" ]; then
          cp "$TARGET_FRAGMENT" audit_target_kernel_fragment.txt
          echo "✅ Target fragment: $TARGET_FRAGMENT ($(wc -l < "$TARGET_FRAGMENT") 行)"
        else
          echo "⚠️ 未找到 target kernel fragment" > audit_target_kernel_fragment.txt
        fi
        
        echo "=== 8. 统计所有 config 规模 ==="
        wc -l .config audit_defconfig.txt \
          audit_kernel_full_config.txt audit_target_kernel_fragment.txt \
          >> audit_summary.txt 2>&1

    - name: 📦 打包诊断文件
      run: |
        cd ${{ env.WORK_DIR }}/openwrt
        tar czf $GITHUB_WORKSPACE/kconfig-audit-rk3528.tar.gz \
          .config \
          audit_defconfig.txt \
          audit_unmet_deps.txt \
          audit_target_info.txt \
          audit_kernel_full_config.txt \
          audit_kernel_unmet_deps.txt \
          audit_target_kernel_fragment.txt \
          audit_summary.txt \
          logs/ 2>/dev/null || true
        ls -lh $GITHUB_WORKSPACE/kconfig-audit-rk3528.tar.gz

    - name: 上传 Kconfig 诊断包
      uses: actions/upload-artifact@v7.0.1
      with:
        name: kconfig-audit-rk3528-${{ github.run_number }}
        path: kconfig-audit-rk3528.tar.gz
        retention-days: 7
