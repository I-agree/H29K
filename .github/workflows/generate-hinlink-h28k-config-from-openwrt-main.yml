# .github/workflows/generate-hinlink-h28k-config.yml
# ✅ OpenWrt main (2026) 兼容 · 解决 olddefconfig Error 1 · 确保 hinlink_h28k 生效

name: Generate hinlink_h28k.config (OpenWrt-main-safe)

on:
  workflow_dispatch:
    inputs:
      openwrt_branch:
        description: 'OpenWrt branch (e.g., main)'
        required: false
        default: 'main'
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 🌐 Clone OpenWrt (shallow)
        run: |
          git clone --depth=1 --branch ${{ github.event.inputs.openwrt_branch }} \
            https://github.com/openwrt/openwrt.git openwrt
        shell: bash

      - name: 🛠️ Install menuconfig deps
        working-directory: openwrt
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libncurses5-dev zlib1g-dev gawk flex gettext libssl-dev xsltproc \
            python3 python3-pip swig || true

      - name: 📦 Init feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: ✅ Generate base config for rockchip_rk35xx
        working-directory: openwrt
        run: |
          # Step 1: Use official target defconfig
          make rockchip_rk35xx_defconfig

          # Step 2: Auto-enable hinlink_h28k via menuconfig (non-interactive)
          # This ensures all dependencies (SOC_RK3528, ARCH_ROCKCHIP, etc.) are auto-set
          yes "" | make menuconfig 2>/dev/null || true

          # Step 3: Force-select hinlink_h28k in the menuconfig tree
          # OpenWrt menuconfig path: Target Profile → Hinlink H28K
          # We use sed to directly patch the .config (safe after menuconfig)
          if ! grep -q "^CONFIG_TARGET_ROCKCHIP_RK35XX_DEVICE_hinlink_h28k=y$" .config; then
            echo "🔧 Enabling hinlink_h28k device..."
            # Ensure parent targets are enabled
            sed -i 's/^CONFIG_TARGET_rockchip=.*$/CONFIG_TARGET_rockchip=y/' .config
            sed -i 's/^CONFIG_TARGET_rockchip_rk35xx=.*$/CONFIG_TARGET_rockchip_rk35xx=y/' .config
            # Add device line (if missing)
            echo "CONFIG_TARGET_ROCKCHIP_RK35XX_DEVICE_hinlink_h28k=y" >> .config
          fi

          # Step 4: Run olddefconfig — now with full dependency context
          make olddefconfig

          # Step 5: Final validation
          if ! grep -q "^CONFIG_TARGET_ROCKCHIP_RK35XX_DEVICE_hinlink_h28k=y$" .config; then
            echo "❌ ERROR: hinlink_h28k not enabled after olddefconfig"
            echo "Available ROCKCHIP devices:"
            grep "^CONFIG_TARGET_ROCKCHIP_RK35XX_DEVICE_" .config || echo "(none)"
            exit 1
          fi
          echo "✅ hinlink_h28k successfully enabled"

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hinlink_h28k.config
          path: openwrt/.config

      - name: 📋 Debug info
        working-directory: openwrt
        run: |
          echo "=== CONFIG TARGET SUMMARY ==="
          grep "^CONFIG_TARGET_ROCKCHIP" .config
          echo "=== KERNEL & SOC ==="
          grep -E "^(CONFIG_LINUX_|CONFIG_SOC_|CONFIG_ARCH_)" .config | head -n 10
          echo "=== End ==="
