# .github/workflows/generate-hinlink-h28k-config-from-openwrt-main.yml
# ✅ Auto-generates a clean, verified hinlink_h28k.config for OpenWrt main branch
# 📌 Trigger: manual dispatch (workflow_dispatch) or push to main
# ⚙️ Requires: openwrt/openwrt@main cloned into ./openwrt/

name: Generate hinlink_h28k.config from OpenWrt main

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'OpenWrt branch to use (default: main)'
        required: false
        default: 'main'
  push:
    branches:
      - main
    paths:
      - 'openwrt/**'

permissions:
  contents: read
  packages: read

jobs:
  generate-config:
    name: ✅ Generate & verify hinlink_h28k.config
    runs-on: ubuntu-22.04
    steps:
      - name: 🚀 Checkout repository
        uses: actions/checkout@v4

      - name: 🌐 Clone OpenWrt main (shallow, fast)
        run: |
          git clone --depth=1 --branch ${{ github.event.inputs.target_branch || 'main' }} \
            https://github.com/openwrt/openwrt.git openwrt
        shell: bash

      - name: 🔍 Verify hinlink_h28k is defined in armv8.mk
        working-directory: openwrt
        run: |
          if ! grep -q "Device/hinlink_h28k" target/linux/rockchip/image/armv8.mk; then
            echo "❌ ERROR: hinlink_h28k NOT found in target/linux/rockchip/image/armv8.mk"
            echo "Please ensure OpenWrt PR #12847 is merged."
            echo "Available Rockchip ARMv8 devices:"
            grep "define Device/" target/linux/rockchip/image/armv8.mk | sed 's/define Device\///' | head -n 10
            exit 1
          fi
          echo "✅ hinlink_h28k confirmed in armv8.mk"

      - name: ✅ Generate CLEAN hinlink_h28k.config
        working-directory: openwrt
        run: |
          # Clean slate — remove any stale .config
          rm -f .config

          # Write minimal, device-specific config (no append, no ambiguity)
          cat > .config << 'EOF'
          # Hinlink H28K config — generated by GitHub Actions (clean write)
          CONFIG_TARGET_rockchip=y
          CONFIG_TARGET_rockchip_armv8=y
          CONFIG_TARGET_MULTI_ARCH=n
          CONFIG_TARGET_ROCKCHIP_ARMV8_DEVICE_hinlink_h28k=y
          EOF

          # Generate full config using OpenWrt's defconfig logic
          make defconfig

          # Critical verification: ensure device is active and exclusive
          if ! grep -q "^CONFIG_TARGET_ROCKCHIP_ARMV8_DEVICE_hinlink_h28k=y$" .config; then
            echo "❌ ERROR: CONFIG_TARGET_ROCKCHIP_ARMV8_DEVICE_hinlink_h28k=y NOT found in .config"
            echo "Full .config preview:"
            head -n 20 .config | sed 's/^/  /'
            exit 1
          fi

          # Ensure NO other DEVICE_* is enabled (prevents conflicts)
          if grep -q "^CONFIG_TARGET_ROCKCHIP_ARMV8_DEVICE_.*=y$" .config | grep -v "hinlink_h28k"; then
            echo "❌ ERROR: Multiple DEVICE_* options enabled — only hinlink_h28k must be y"
            grep "^CONFIG_TARGET_ROCKCHIP_ARMV8_DEVICE_.*=y$" .config
            exit 1
          fi

          echo "✅ SUCCESS: .config is clean, valid, and exclusively for hinlink_h28k"

      - name: 📤 Upload hinlink_h28k.config as artifact
        uses: actions/upload-artifact@v4
        with:
          name: hinlink_h28k.config
          path: openwrt/.config
          if-no-files-found: error

      - name: 📋 Print final config summary
        working-directory: openwrt
        run: |
          echo "=== hinlink_h28k.config SUMMARY ==="
          grep "^CONFIG_TARGET_ROCKCHIP_ARMV8_DEVICE_" .config
          grep "^DEVICE_DTS" .config
          echo "=== END SUMMARY ==="
