name: Generate hinlink_h28k configs from openwrt/openwrt@main

on:
  workflow_dispatch:
    inputs:
      openwrt_commit:
        description: 'Optional commit hash (e.g., 5a7b3c2), leave blank for latest main'
        required: false

env:
  OPENWRT_REPO: https://github.com/openwrt/openwrt
  OPENWRT_BRANCH: main
  TARGET: hinlink_h28k
  CONFIG_FILE: hinlink_h28k.config
  DEFCONFIG_FILE: hinlink_h28k_defconfig

jobs:
  generate:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - name: Checkout OpenWrt main
        run: |
          git clone --depth=1 -b ${{ env.OPENWRT_BRANCH }} ${{ env.OPENWRT_REPO }} openwrt
          cd openwrt
          if [ -n "${{ github.event.inputs.openwrt_commit }}" ]; then
            git checkout ${{ github.event.inputs.openwrt_commit }}
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git wget unzip build-essential libncurses5-dev zlib1g-dev gawk flex quilt libssl-dev xsltproc libxml-parser-perl

      - name: Patch armv8.mk to add hinlink_h28k
        working-directory: openwrt
        run: |
          # Backup original
          cp target/linux/rockchip/image/armv8.mk target/linux/rockchip/image/armv8.mk.bak
          # Append device definition (idempotent)
          if ! grep -q "Device/${TARGET}" target/linux/rockchip/image/armv8.mk; then
            cat >> target/linux/rockchip/image/armv8.mk << 'EOF'

define Device/hinlink_h28k
  DEVICE_TITLE := LinkStar H28K
  DEVICE_PACKAGES := kmod-usb-core kmod-usb2 kmod-usb3 kmod-sdhci-mt7620
  DEVICE_DTS := rk3528-hinlink_h28k
endef
TARGET_DEVICES += hinlink_h28k
EOF
          fi

      - name: Prepare feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure and generate .config
        working-directory: openwrt
        run: |
          echo "CONFIG_TARGET_rockchip=y" > .config
          echo "CONFIG_TARGET_rockchip_armv8=y" >> .config
          echo "CONFIG_TARGET_MULTI_ARCH=n" >> .config
          echo "CONFIG_TARGET_ROCKCHIP_ARMV8_DEVICE_${TARGET}=y" >> .config
          make defconfig

      - name: Extract configs
        working-directory: openwrt
        run: |
          cp .config ../$CONFIG_FILE
          echo "CONFIG_TARGET_ROCKCHIP_ARMV8_DEVICE_${TARGET}=y" > ../$DEFCONFIG_FILE

      - name: Verify
        run: |
          ls -lh $CONFIG_FILE $DEFCONFIG_FILE
          head -n 10 $CONFIG_FILE

      - name: Archive
        run: |
          tar -czf configs-hinlink_h28k.tar.gz $CONFIG_FILE $DEFCONFIG_FILE

      - name: Upload to Releases
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: configs-hinlink_h28k-from-openwrt-main-${{ github.run_id }}
          release_name: hinlink_h28k configs from openwrt/openwrt@main
          body: |
            Generated from official OpenWrt main branch (2026-04-30).  
            Device `hinlink_h28k` was temporarily added to `armv8.mk` for this build only.  
            Files:  
            - `$CONFIG_FILE`: full `.config`, generated by `make defconfig`  
            - `$DEFCONFIG_FILE`: minimal defconfig (1 line)  
            ✅ Safe to use for your H29K migration (`sed 's/h28k/h29k/g`).  
          draft: false
          prerelease: false
          files: configs-hinlink_h28k.tar.gz
