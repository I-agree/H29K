name: Generate hinlink_h28k.config from openwrt/openwrt@main (FIXED — no armsom_sige7 leakage)

on:
  workflow_dispatch:
    inputs:
      openwrt_commit:
        description: 'Optional commit hash (e.g., b7e9a3c), leave blank for latest main'
        required: false

env:
  OPENWRT_REPO: https://github.com/openwrt/openwrt
  OPENWRT_BRANCH: main
  TARGET: hinlink_h28k
  CONFIG_FILE: hinlink_h28k.config

jobs:
  generate:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - name: Checkout OpenWrt main
        run: |
          git clone --depth=1 -b ${{ env.OPENWRT_BRANCH }} ${{ env.OPENWRT_REPO }} openwrt
          cd openwrt
          if [ -n "${{ github.event.inputs.openwrt_commit }}" ]; then
            git checkout ${{ github.event.inputs.openwrt_commit }}
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git wget unzip build-essential libncurses5-dev zlib1g-dev gawk flex quilt libssl-dev xsltproc libxml-parser-perl

      - name: Prepare feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: ✅ Generate CLEAN hinlink_h28k.config (NO armsom_sige7 LEAKAGE)
        working-directory: openwrt
        run: |
          # STEP 1: REMOVE ANY EXISTING .config — CRITICAL!
          rm -f .config

          # STEP 2: WRITE MINIMAL .config WITH ONLY hinlink_h28k — NO APPEND!
          cat > .config << 'EOF'
# Hinlink H28K config — generated by GitHub Actions (clean write)
CONFIG_TARGET_rockchip=y
CONFIG_TARGET_rockchip_armv8=y
CONFIG_TARGET_MULTI_ARCH=n
CONFIG_TARGET_ROCKCHIP_ARMV8_DEVICE_hinlink_h28k=y
EOF

          # STEP 3: RUN make defconfig — now it has NO CHOICE but to use hinlink_h28k
          make defconfig

          # STEP 4: VERIFY — fail fast if wrong device detected
          if ! grep -q "CONFIG_TARGET_ROCKCHIP_ARMV8_DEVICE_hinlink_h28k=y" .config; then
            echo "❌ ERROR: .config does NOT contain hinlink_h28k=y"
            echo "Contents:"
            head -n 20 .config
            exit 1
          fi
          echo "✅ Verified: .config is for hinlink_h28k"

      - name: Export config
        working-directory: openwrt
        run: |
          cp .config ../$CONFIG_FILE
          echo "Generated $CONFIG_FILE ($(wc -l < ../$CONFIG_FILE) lines)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hinlink_h28k.config
          path: $CONFIG_FILE

      - name: Upload to Releases
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: configs-hinlink_h28k-official-${{ github.run_id }}
          release_name: hinlink_h28k.config from openwrt/openwrt@main (CLEAN — no armsom_sige7)
          body: |
            ✅ Generated from official OpenWrt main branch (commit: $(cd openwrt && git rev-parse HEAD)).  
            🔑 Fixed: Uses `rm -f .config && cat > .config` to prevent `armsom_sige7` leakage.  
            📜 Contains exactly:  
            - \`CONFIG_TARGET_ROCKCHIP_ARMV8_DEVICE_hinlink_h28k=y\`  
            - All auto-derived kernel modules, DTS, rootfs settings.  
            ⚠️ To migrate to H29K: replace \`hinlink_h28k\` with \`hinlink_h29k\` in this file **only after** adding H29K to your armv8.mk.  
          draft: false
          prerelease: false
          files: $CONFIG_FILE
