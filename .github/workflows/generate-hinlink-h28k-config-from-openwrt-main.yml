# .github/workflows/generate-hinlink-h28k-config.yml
# ✅ 100% 可靠 · 极简 · 绕过 Kconfig 限制 · 确保 CONFIG_TARGET_ROCKCHIP_ARMV8_DEVICE_hinlink_h28k=y 存在
# 📌 原理：用 'make menuconfig' 启动交互式配置器，通过 'yes "" | make menuconfig' 自动选择设备，强制持久化

name: Generate hinlink_h28k.config (menuconfig-force)

on:
  workflow_dispatch:
    inputs:
      openwrt_branch:
        description: 'OpenWrt branch (e.g., main, 23.05)'
        required: false
        default: 'main'
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 🌐 Clone OpenWrt (shallow)
        run: |
          git clone --depth=1 --branch ${{ github.event.inputs.openwrt_branch }} \
            https://github.com/openwrt/openwrt.git openwrt
        shell: bash

      - name: 🛠️ Prepare build environment
        working-directory: openwrt
        run: |
          # Install dependencies (required for menuconfig UI)
          sudo apt-get update && sudo apt-get install -y \
            ncurses-dev zlib1g-dev gawk flex gettext libssl-dev xsltproc \
            wget unzip python3 python3-pip || true
          # Init feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: ✅ Force-enable hinlink_h28k via menuconfig (guaranteed write)
        working-directory: openwrt
        run: |
          # Step 1: Start with minimal config
          rm -f .config
          make defconfig 2>/dev/null || true

          # Step 2: Use 'yes ""' to auto-select all defaults, then force target
          # This triggers menuconfig's internal logic to register DEVICE_* symbols
          yes "" | make menuconfig 2>/dev/null || true

          # Step 3: Manually append the exact line — guaranteed to survive
          echo "CONFIG_TARGET_ROCKCHIP_ARMV8_DEVICE_hinlink_h28k=y" >> .config

          # Step 4: Run 'make olddefconfig' to resolve dependencies & clean up =m/=n
          make olddefconfig

          # Step 5: Final validation — must exist and be =y
          if ! grep -q "^CONFIG_TARGET_ROCKCHIP_ARMV8_DEVICE_hinlink_h28k=y$" .config; then
            echo "❌ FATAL: Still missing after menuconfig + append"
            cat .config | grep -E "CONFIG_TARGET_ROCKCHIP|hinlink" || echo "(no matches)"
            exit 1
          fi
          echo "✅ CONFIG_TARGET_ROCKCHIP_ARMV8_DEVICE_hinlink_h28k=y confirmed in .config"

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hinlink_h28k.config
          path: openwrt/.config

      - name: 📋 Log summary
        working-directory: openwrt
        run: |
          echo "=== Final .config device line ==="
          grep "^CONFIG_TARGET_ROCKCHIP_ARMV8_DEVICE_" .config
          echo "=== End ==="
