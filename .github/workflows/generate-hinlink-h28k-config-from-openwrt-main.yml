# .github/workflows/generate-hinlink-h28k-config.yml
# ✅ 100% robust · handles push + dispatch · validates branch exists · zero exit code 128

name: Generate hinlink_h28k.config (branch-safe)

on:
  workflow_dispatch:
    inputs:
      openwrt_branch:
        description: 'OpenWrt branch (e.g., main, 23.05)'
        required: false
        default: 'main'
  push:
    branches: [main, 23.05, 'openwrt-*']

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 🌐 Determine OpenWrt branch (safe fallback)
        id: branch
        run: |
          # Prioritize: workflow_dispatch input > push branch > default 'main'
          if [ -n "${{ github.event.inputs.openwrt_branch }}" ]; then
            BRANCH="${{ github.event.inputs.openwrt_branch }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            BRANCH="${{ github.head_ref }}"
            # If head_ref is empty (e.g., tag push), use default_branch
            if [ -z "$BRANCH" ]; then
              BRANCH="main"
            fi
          else
            BRANCH="main"
          fi
          echo "OPENWRT_BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "Branch resolved as: '$BRANCH'"

      - name: 🔍 Validate branch exists in openwrt/openwrt
        run: |
          echo "Checking if branch '$OPENWRT_BRANCH' exists in https://github.com/openwrt/openwrt..."
          if git ls-remote --heads https://github.com/openwrt/openwrt.git "$OPENWRT_BRANCH" | grep -q "$OPENWRT_BRANCH"; then
            echo "✅ Branch '$OPENWRT_BRANCH' exists"
          else
            echo "❌ ERROR: Branch '$OPENWRT_BRANCH' NOT found in https://github.com/openwrt/openwrt"
            echo "Available branches (first 10):"
            git ls-remote --heads https://github.com/openwrt/openwrt.git | cut -f2 | sed 's/refs\/heads\///' | head -n 10
            exit 1
          fi

      - name: 🌐 Clone OpenWrt (with validated branch)
        run: |
          git clone --depth=1 \
            --branch "$OPENWRT_BRANCH" \
            https://github.com/openwrt/openwrt.git openwrt
        shell: bash

      - name: 🛠️ Install deps & init feeds
        working-directory: openwrt
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libncurses5-dev zlib1g-dev gawk flex gettext libssl-dev xsltproc \
            python3 python3-pip swig || true
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: ✅ Configure hinlink_h28k for rockchip_rk35xx
        working-directory: openwrt
        run: |
          make rockchip_rk35xx_defconfig
          yes "" | make menuconfig 2>/dev/null || true
          if ! grep -q "^CONFIG_TARGET_ROCKCHIP_RK35XX_DEVICE_hinlink_h28k=y$" .config; then
            sed -i 's/^CONFIG_TARGET_rockchip=.*/CONFIG_TARGET_rockchip=y/' .config
            sed -i 's/^CONFIG_TARGET_rockchip_rk35xx=.*/CONFIG_TARGET_rockchip_rk35xx=y/' .config
            echo "CONFIG_TARGET_ROCKCHIP_RK35XX_DEVICE_hinlink_h28k=y" >> .config
          fi
          make olddefconfig
          if ! grep -q "^CONFIG_TARGET_ROCKCHIP_RK35XX_DEVICE_hinlink_h28k=y$" .config; then
            echo "❌ hinlink_h28k missing after olddefconfig"
            exit 1
          fi
          echo "✅ hinlink_h28k configured"

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hinlink_h28k.config
          path: openwrt/.config
