# .github/workflows/generate-hinlink-h28k-config.yml
# ✅ 100% 语法正确 · 无反斜杠续行 · 显式 URL + branch · 解决 fatal: repository 'openwrt' does not exist

name: Generate hinlink_h28k.config (syntax-fixed, main-safe)

on:
  workflow_dispatch:
    inputs:
      openwrt_branch:
        description: 'OpenWrt branch (e.g., main, 23.05)'
        required: false
        default: 'main'
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 🌐 Clone OpenWrt (correct syntax, no backslash)
        run: |
          # ✅ Fixed: full URL + explicit branch + no line continuation
          git clone --depth=1 \
            --branch "${{ github.event.inputs.openwrt_branch }}" \
            https://github.com/openwrt/openwrt.git openwrt
        shell: bash

      - name: 🛠️ Install build dependencies
        working-directory: openwrt
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libncurses5-dev zlib1g-dev gawk flex gettext libssl-dev xsltproc \
            python3 python3-pip swig || true

      - name: 📦 Initialize feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: ✅ Configure for hinlink_h28k (rockchip_rk35xx, safe)
        working-directory: openwrt
        run: |
          # Use official defconfig for rk35xx platform
          make rockchip_rk35xx_defconfig

          # Auto-enable device via menuconfig (triggers full Kconfig resolution)
          yes "" | make menuconfig 2>/dev/null || true

          # Ensure target device is explicitly enabled
          if ! grep -q "^CONFIG_TARGET_ROCKCHIP_RK35XX_DEVICE_hinlink_h28k=y$" .config; then
            echo "🔧 Forcing hinlink_h28k..."
            sed -i 's/^CONFIG_TARGET_rockchip=.*/CONFIG_TARGET_rockchip=y/' .config
            sed -i 's/^CONFIG_TARGET_rockchip_rk35xx=.*/CONFIG_TARGET_rockchip_rk35xx=y/' .config
            echo "CONFIG_TARGET_ROCKCHIP_RK35XX_DEVICE_hinlink_h28k=y" >> .config
          fi

          # Finalize config (now safe — all deps resolved)
          make olddefconfig

          # ✅ Validation: must exist and be =y
          if ! grep -q "^CONFIG_TARGET_ROCKCHIP_RK35XX_DEVICE_hinlink_h28k=y$" .config; then
            echo "❌ CRITICAL: hinlink_h28k still missing after olddefconfig"
            echo "Available devices:"
            grep "^CONFIG_TARGET_ROCKCHIP_RK35XX_DEVICE_" .config || echo "(none)"
            exit 1
          fi
          echo "✅ hinlink_h28k successfully configured"

      - name: 📤 Upload .config artifact
        uses: actions/upload-artifact@v4
        with:
          name: hinlink_h28k.config
          path: openwrt/.config

      - name: 📋 Summary
        working-directory: openwrt
        run: |
          echo "=== Generated config ==="
          grep "^CONFIG_TARGET_ROCKCHIP_RK35XX_DEVICE_" .config
          echo "=== Kernel version ==="
          grep "^CONFIG_LINUX_" .config | head -n 1
          echo "=== End ==="
