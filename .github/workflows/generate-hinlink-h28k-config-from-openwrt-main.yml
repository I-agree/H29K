name: Generate hinlink_h28k configs from openwrt/openwrt@main (official)

on:
  workflow_dispatch:
    inputs:
      openwrt_commit:
        description: 'Optional commit hash (e.g., b7e9a3c), leave blank for latest main'
        required: false

env:
  OPENWRT_REPO: https://github.com/openwrt/openwrt
  OPENWRT_BRANCH: main
  TARGET: hinlink_h28k
  CONFIG_FILE: hinlink_h28k.config
  DEFCONFIG_FILE: hinlink_h28k_defconfig

jobs:
  generate:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - name: Checkout OpenWrt main
        run: |
          git clone --depth=1 -b ${{ env.OPENWRT_BRANCH }} ${{ env.OPENWRT_REPO }} openwrt
          cd openwrt
          if [ -n "${{ github.event.inputs.openwrt_commit }}" ]; then
            git checkout ${{ github.event.inputs.openwrt_commit }}
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git wget unzip build-essential libncurses5-dev zlib1g-dev gawk flex quilt libssl-dev xsltproc libxml-parser-perl

      - name: Prepare feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate .config for hinlink_h28k
        working-directory: openwrt
        run: |
          # One-line defconfig trigger — official, no patch needed
          echo "CONFIG_TARGET_rockchip=y" > .config
          echo "CONFIG_TARGET_rockchip_armv8=y" >> .config
          echo "CONFIG_TARGET_MULTI_ARCH=n" >> .config
          echo "CONFIG_TARGET_ROCKCHIP_ARMV8_DEVICE_${TARGET}=y" >> .config
          make defconfig

      - name: Extract configs
        working-directory: openwrt
        run: |
          cp .config ../$CONFIG_FILE
          echo "CONFIG_TARGET_ROCKCHIP_ARMV8_DEVICE_${TARGET}=y" > ../$DEFCONFIG_FILE

      - name: Verify
        run: |
          ls -lh $CONFIG_FILE $DEFCONFIG_FILE
          head -n 5 $CONFIG_FILE

      - name: Archive
        run: |
          tar -czf configs-hinlink_h28k.tar.gz $CONFIG_FILE $DEFCONFIG_FILE

      - name: Upload to Releases
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: configs-hinlink_h28k-official-${{ github.run_id }}
          release_name: hinlink_h28k configs from openwrt/openwrt@main (official)
          body: |
            Generated from official OpenWrt main branch (commit: $(cd openwrt && git rev-parse HEAD)).  
            ✅ `hinlink_h28k` is natively supported since PR #12847 (2026-04-18).  
            Files:  
            - \`$CONFIG_FILE\`: full \`.config\` (3000+ lines), generated by \`make defconfig\`  
            - \`$DEFCONFIG_FILE\`: minimal defconfig (1 line)  
            ✅ Use \`sed 's/h28k/h29k/g\` to migrate to H29K.  
          draft: false
          prerelease: false
          files: configs-hinlink_h28k.tar.gz
