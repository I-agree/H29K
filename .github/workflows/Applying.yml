name: 捕获失败补丁路径

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: rk3528-hinlink-h29k.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 检出源码
      uses: actions/checkout@main

    - name: 初始化构建环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: 克隆 OpenWrt 源码
      working-directory: /workdir
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt

    - name: 加载配置
      working-directory: /workdir/openwrt
      run: |
        cp -f $GITHUB_WORKSPACE/$CONFIG_FILE .config
        make defconfig

    - name: 🔥 只应用内核补丁（干净日志 + 捕获全部失败）
      working-directory: /workdir/openwrt
      run: |
        FAILED="$GITHUB_WORKSPACE/failed_patches.txt"
        rm -f $FAILED
        touch $FAILED

        # 只打内核补丁，不编译任何工具！日志超级干净！
        make target/linux/{clean,prepare} V=sc QUILT_CHECK_PATCHES=1 2>&1 | \
        grep -E '^Applying|^Patch failed!' | while read line; do
          echo "$line"
          if [[ "$line" =~ ^Patch\ failed!\ \ Please\ fix\ (.*)\! ]]; then
            echo "${BASH_REMATCH[1]}" >> $FAILED
          fi
        done || true

    - name: 上传失败补丁列表
      uses: actions/upload-artifact@main
      with:
        name: failed-patches
        path: failed_patches.txt
