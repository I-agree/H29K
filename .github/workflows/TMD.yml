name: 一次性输出所有内核升级 NEW 新增配置

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: rk3528-hinlink-h29k.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  WORK_DIR: /workdir

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      actions: write

    steps:
    - name: 检出源码
      uses: actions/checkout@v6.0.3

    - name: 调整磁盘空间
      run: |
        sudo mkdir -p $WORK_DIR
        sudo chown -R $USER:$USER $WORK_DIR
        
        sudo swapoff -a || true
        sudo dd if=/dev/zero of=/swapfile bs=1M count=5120
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        sudo sysctl vm.swappiness=10
        echo "✅ Swap 扩容至 5GB 且 swappiness=10 校准完毕！"
        echo "📊 扩容系统全局 /tmp 至 10G"
        sudo umount /tmp || true
        sudo mount -t tmpfs tmpfs /tmp -o size=10G,nr_inodes=0
        echo "✅ /tmp 扩容至 10GB 完成"
        
        df -h
        df -i /tmp
        echo "WORK_DIR=$WORK_DIR" >> $GITHUB_ENV

    - name: 初始化构建环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev python3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf quilt python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd libyaml-dev zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: 查看编译环境硬件规格 (CPU/内存)
      run: |
        echo "==================== CPU 核心数 ===================="
        echo "逻辑核心数: $(nproc)"
        cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c
        echo -e "\n==================== 内存大小 ===================="
        free -h

    - name: 克隆 OpenWrt 源码到磁盘
      run: |
        cd $WORK_DIR
        df -hT $PWD
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf $WORK_DIR/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 加载自定义软件源
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF ${{ env.WORK_DIR }}/openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd ${{ env.WORK_DIR }}/openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新软件源索引
      run: cd ${{ env.WORK_DIR }}/openwrt && ./scripts/feeds update -a

    - name: 安装软件源组件
      run: cd ${{ env.WORK_DIR }}/openwrt && ./scripts/feeds install -a

    - name: 加载自定义配置文件
      run: |
        if [ -d files ]; then
          mkdir -p ${{ env.WORK_DIR }}/openwrt/files
          cp -r files/* ${{ env.WORK_DIR }}/openwrt/files/
        fi
        [ -e $CONFIG_FILE ] && cp -f $CONFIG_FILE ${{ env.WORK_DIR }}/openwrt/.config
        chmod +x $DIY_P2_SH
        cd ${{ env.WORK_DIR }}/openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: 全局扫描NEW新增配置（仅统计全局新增项）
      run: |
        cd ${{ env.WORK_DIR }}/openwrt
        cp .config .config.global.bak
        echo "========================================"
        echo "【全局】扫描 NEW 类型新增配置"
        echo "========================================"
        make olddefconfig </dev/null 2>&1 | grep -i "NEW" > kernel_global_new.log || true
        cat kernel_global_new.log
        GLOBAL_NEW=$(wc -l < kernel_global_new.log)
        echo "全局NEW配置数量：${GLOBAL_NEW}"
        diff -u .config.global.bak .config > global_config_change.diff
        cp kernel_global_new.log global_config_change.diff $GITHUB_WORKSPACE/
        rm -f .config.global.bak

    - name: 下载依赖软件
      id: package
      run: |
        cd ${{ env.WORK_DIR }}/openwrt
        make defconfig
        for i in {1..3}; do make download -j8 && break || sleep 5; done
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    # 关键步骤：解压内核+打补丁后再同步配置，此时Kconfig已被补丁修改，才能捕获并应答弹窗
    - name: 内核解压+应用所有补丁，之后非交互固化所有交互式配置
      run: |
        cd ${{ env.WORK_DIR }}/openwrt
        export KCONFIG_NONINTERACTIVE=1
        export DEBIAN_FRONTEND=noninteractive
        cp .config .config.kernel_pre.bak
        # 解压内核源码、应用target下全部补丁
        make -C target/linux prepare V=s
        # 内核目录非交互应答所有[Y/N/?]交互式配置
        make -C target/linux olddefconfig </dev/null || true
        # 全局同步固化内核配置变更
        make olddefconfig </dev/null || true
        # 记录补丁后产生的所有配置变更（包含你编译弹窗的选项）
        diff -u .config.kernel_pre.bak .config > kernel_patch_config_change.diff
        cp kernel_patch_config_change.diff $GITHUB_WORKSPACE/
        rm -f .config.kernel_pre.bak

    - name: 上传全量配置变更日志
      uses: actions/upload-artifact@v7.0.1
      with:
        name: kernel-config-full-log
        path: |
          kernel_global_new.log
          global_config_change.diff
          kernel_patch_config_change.diff

    - name: 编译固件镜像
      id: compile
      run: |
        cd ${{ env.WORK_DIR }}/openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: 检查磁盘空间使用情况
      if: (!cancelled())
      run: df -hT

    - name: 上传 bin 目录（使用绝对路径，防止软连接失效导致空包）
      uses: actions/upload-artifact@v7.0.1
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.WORK_DIR }}/openwrt/bin

    - name: 整理固件输出目录
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd ${{ env.WORK_DIR }}/openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件输出目录
      uses: actions/upload-artifact@v7.0.1
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: 生成发布版本标签
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件至 GitHub Release
      uses: softprops/action-gh-release@v3.0.0
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: 清理历史工作流运行记录
      uses: Mattraks/delete-workflow-runs@v2.1.0
      with:
        retain_days: 0
        keep_minimum_runs: 2
