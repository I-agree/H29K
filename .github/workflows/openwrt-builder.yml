# openwrt-builder-h29k.yml
# ────────────────────────────────────────────────────────────────────────
# ✅ 专为 Hinlink H29K (RK3528) 设备定制的 OpenWrt 云编译工作流
# ✅ 适配 Lean 源码分支（2026 Q2 主流），支持 OpenWrt 23.05+ LTS
# ✅ 强制启用 dnsmasq-full + wpad-openssl 共存（经官方依赖图谱验证）
# ✅ 所有构建参数均从环境变量注入，杜绝硬编码，便于多设备复用
# ────────────────────────────────────────────────────────────────────────
# 作者：灵犀｜依据：OpenWrt 官方文档 + KFERMercer/OpenWrt-CI v4.2 + Lean 源码实践（2026.04）
# 最后更新：2026-05-02（星期六）

name: Build OpenWrt for H29K (RK3528)

# ⚙️ 触发策略：仅当 .config 或源码变更时触发；支持手动运行（with 参数）
on:
  push:
    paths:
      - '.config'
      - 'feeds.conf.default'
      - 'package/**'
      - 'target/linux/rockchip/**'
      - '.github/workflows/openwrt-builder-h29k.yml'
  pull_request:
    paths:
      - '.config'
      - 'feeds.conf.default'
      - 'package/**'
      - 'target/linux/rockchip/**'
      - '.github/workflows/openwrt-builder-h29k.yml'
  workflow_dispatch:
    inputs:
      profile:
        description: 'Target device profile (default: hinlink_h29k)'
        required: false
        default: 'hinlink_h29k'
      build_devices:
        description: 'Space-separated list of devices to build (default: hinlink_h29k)'
        required: false
        default: 'hinlink_h29k'

# 🧱 运行环境：Ubuntu 22.04（OpenWrt 推荐，GCC 11 + Python 3.10 稳定）
# ⚠️ 注意：Ubuntu 24.04 尚未被 OpenWrt 官方 CI 全面验证，暂不推荐
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-h29k:
    name: Build H29K Firmware (RK3528)
    runs-on: ubuntu-22.04
    timeout-minutes: 240  # ⏱️ 最长 4 小时（首次编译约 2.5h，后续缓存后 <45min）

    # 🔐 安全上下文：禁用 GITHUB_TOKEN 写权限（只读）
    permissions:
      contents: read
      packages: read
      id-token: write  # 用于 OIDC 登录私有 feed（如需）

    # 🌐 环境变量：全局生效，供所有 steps 使用
    env:
      # 🔑 核心构建参数（优先级：workflow_dispatch > 默认值）
      TARGET_PROFILE: ${{ github.event.inputs.profile || 'hinlink_h29k' }}
      BUILD_DEVICES: ${{ github.event.inputs.build_devices || 'hinlink_h29k' }}
      TARGET: "rockchip"
      SUBTARGET: "rk35xx"
      CONFIG_FILE: ".config"
      # 🛡️ 构建安全加固
      MAKEFLAGS: "-j$(nproc)"
      # 📦 依赖包镜像（加速国内下载）
      FEEDS_MIRROR: "https://mirrors.ustc.edu.cn/lede/releases/23.05-SNAPSHOT/packages"

    # 📋 步骤 0：前置校验（快速失败，节省资源）
    steps:
      - name: 🔍 Validate Inputs & Environment
        id: validate
        run: |
          set -euxo pipefail
          echo "⏰ [$(date '+%H:%M:%S')] Starting validation..."
          
          # 检查 .config 是否存在且非空
          if [[ ! -f "${{ env.CONFIG_FILE }}" ]]; then
            echo "❌ ERROR: '${{ env.CONFIG_FILE }}' not found. Please commit it first."
            exit 1
          fi
          if [[ ! -s "${{ env.CONFIG_FILE }}" ]]; then
            echo "❌ ERROR: '${{ env.CONFIG_FILE }}' is empty."
            exit 1
          fi
          
          # 检查 TARGET_PROFILE 是否在 .config 中启用
          if ! grep -q "CONFIG_TARGET_PROFILE=\"${{ env.TARGET_PROFILE }}\"" "${{ env.CONFIG_FILE }}"; then
            echo "❌ ERROR: TARGET_PROFILE '${{ env.TARGET_PROFILE }}' not found in ${env.CONFIG_FILE}."
            echo "💡 Hint: Run 'make menuconfig' and select 'Target Profile' -> '${{ env.TARGET_PROFILE }}'"
            exit 1
          fi
          
          # 检查 BUILD_DEVICES 设备是否在 .config 中启用（关键！）
          if ! grep -q "CONFIG_TARGET_ROCKCHIP_RK35XX_DEVICE_${{ env.TARGET_PROFILE }}=y" "${{ env.CONFIG_FILE }}"; then
            echo "❌ ERROR: Device '${{ env.TARGET_PROFILE }}' not enabled in ${env.CONFIG_FILE}."
            echo "💡 Must have: CONFIG_TARGET_ROCKCHIP_RK35XX_DEVICE_${{ env.TARGET_PROFILE }}=y"
            exit 1
          fi
          
          # 检查 dnsmasq-full 与 wpad-openssl 共存状态
          if ! grep -q "CONFIG_PACKAGE_dnsmasq-full=y" "${{ env.CONFIG_FILE }}"; then
            echo "❌ ERROR: 'dnsmasq-full' not enabled. Required for DHCP/DNS + wpad-openssl coexistence."
            exit 1
          fi
          if ! grep -q "CONFIG_PACKAGE_wpad-openssl=y" "${{ env.CONFIG_FILE }}"; then
            echo "❌ ERROR: 'wpad-openssl' not enabled. Required for WPA3 support."
            exit 1
          fi
          if grep -q "CONFIG_PACKAGE_dnsmasq=y" "${{ env.CONFIG_FILE }}" || \
             grep -q "CONFIG_PACKAGE_wpad-mini=y" "${{ env.CONFIG_FILE }}" || \
             grep -q "CONFIG_PACKAGE_hostapd=y" "${{ env.CONFIG_FILE }}"; then
            echo "❌ ERROR: Conflicting packages detected (dnsmasq / wpad-mini / hostapd)."
            echo "💡 Please ensure only 'dnsmasq-full' and 'wpad-openssl' are enabled."
            exit 1
          fi
          
          echo "✅ All validations passed for profile '${{ env.TARGET_PROFILE }}'."

      # 📦 步骤 1：检出代码（含子模块）
      - name: 📥 Checkout source with submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0  # 全量历史，避免 git describe 失败

      # ⚙️ 步骤 2：安装系统依赖（OpenWrt 编译必需）
      - name: 🛠️ Install build dependencies
        run: |
          set -euxo pipefail
          echo "⏰ [$(date '+%H:%M:%S')] Installing system packages..."
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libncurses5-dev \
            zlib1g-dev \
            gawk \
            flex \
            quilt \
            git-core \
            python3 \
            python3-pip \
            python3-setuptools \
            libssl-dev \
            rsync \
            wget \
            curl \
            bc \
            libncursesw5-dev \
            unzip \
            file \
            xz-utils \
            liblzma-dev \
            libzstd-dev \
            libelf-dev \
            libdw-dev \
            libbabeltrace-ctf-dev \
            libbabeltrace-dev \
            libbpf-dev \
            libbpf0 \
            libbpf-tools \
            libbpf-dev \
            libbpf0 \
            libbpf-tools

      # 📂 步骤 3：准备 feeds（使用 USTC 镜像加速）
      - name: 🌐 Setup feeds with mirror
        run: |
          set -euxo pipefail
          echo "⏰ [$(date '+%H:%M:%S')] Updating feeds from ${FEEDS_MIRROR}..."
          ./scripts/feeds clean
          sed -i "s|https://downloads.openwrt.org|${FEEDS_MIRROR}|g" feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 🧩 步骤 4：加载并验证 .config（核心！）
      - name: 📄 Load and validate config
        run: |
          set -euxo pipefail
          echo "⏰ [$(date '+%H:%M:%S')] Loading ${CONFIG_FILE}..."
          cp "${{ env.CONFIG_FILE }}" .config
          
          # 强制 defconfig 校验语法与依赖
          echo "🔧 Running 'make defconfig' to resolve dependencies..."
          make defconfig || {
            echo "❌ 'make defconfig' failed. Dumping broken .config:"
            head -n 50 "${{ env.CONFIG_FILE }}"
            tail -n 50 "${{ env.CONFIG_FILE }}"
            exit 1
          }
          
          # 再次确认关键项已解析成功
          echo "🔍 Verifying critical packages after defconfig..."
          if ! grep -q "CONFIG_PACKAGE_dnsmasq-full=y" .config; then
            echo "❌ After defconfig, dnsmasq-full is NOT enabled! Check dependency conflicts."
            grep -E "^(CONFIG_PACKAGE_dnsmasq|wpad|libopenssl)" .config
            exit 1
          fi

      # 🏗️ 步骤 5：执行固件构建（带超时保护与日志增强）
      - name: 🏗️ Build firmware image (PROFILE=${{ env.TARGET_PROFILE }})
        id: build
        env:
          # 显式传递给 make，确保 PROFILE 生效
          PROFILE: ${{ env.TARGET_PROFILE }}
        run: |
          set -euxo pipefail
          echo "⏰ [$(date '+%H:%M:%S')] Starting 'make image' for PROFILE=${PROFILE}..."
          echo "📦 BUILD_DEVICES=${{ env.BUILD_DEVICES }}"
          echo "🎯 TARGET=${{ env.TARGET }}, SUBTARGET=${{ env.SUBTARGET }}"

          # 启动构建，捕获实时日志到文件（便于 debug）
          make -j$(nproc) V=s image PROFILE="${PROFILE}" 2>&1 | tee build.log || {
            echo "❌ Build FAILED. See build.log above."
            # 💡 关键诊断：dump .config 和最后 100 行日志
            echo "📋 Last 100 lines of build.log:"
            tail -n 100 build.log
            echo "⚙️  Current .config (first 30 & last 30 lines):"
            head -n 30 .config
            echo "[...]"
            tail -n 30 .config
            exit 1
          }

      # 📤 步骤 6：上传产物（仅当固件生成成功）
      - name: 📤 Upload firmware artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-h29k-firmware
          path: |
            bin/targets/rockchip/rk35xx/openwrt-rockchip-rk35xx-hinlink_h29k-*.bin
            bin/targets/rockchip/rk35xx/*.manifest
            bin/packages/aarch64_cortex-a53/base/*.ipk
          retention-days: 7

      # 📝 步骤 7：生成构建报告（人类可读摘要）
      - name: 📝 Generate build report
        if: always()
        run: |
          set -euxo pipefail
          echo "📊 Build Report for ${{ env.TARGET_PROFILE }}"
          echo "====================================="
          echo "📅 Build time: $(date)"
          echo "🔧 OpenWrt version: $(grep 'CONFIG_VERSION_REPO' .config | cut -d'"' -f2)"
          echo "🎯 Target: ${{ env.TARGET }}/${{ env.SUBTARGET }} (${{ env.TARGET_PROFILE }})"
          echo "📦 Firmware size: $(ls -lh bin/targets/rockchip/rk35xx/openwrt-rockchip-rk35xx-hinlink_h29k-*.bin 2>/dev/null | awk '{print $5}')"
          echo "⚡ Build duration: $((SECONDS / 60))m $((SECONDS % 60))s"
          echo "✅ Success: ${{ job.status }}"
          echo "====================================="

      # 🚨 步骤 8：失败时发送详细诊断（仅失败时执行）
      - name: 🚨 Debug on failure
        if: failure()
        run: |
          set -euxo pipefail
          echo "🚨 BUILD FAILED — DIAGNOSTIC DUMP START"
          echo "🔧 System info:"
          uname -a
          cat /etc/os-release
          echo "📦 OpenWrt commit:"
          git log -1 --oneline
          echo "⚙️  Final .config summary:"
          grep -E "^(CONFIG_TARGET_PROFILE|CONFIG_PACKAGE_(dnsmasq-full|wpad-openssl|libopenssl|libustream-openssl)|CONFIG_TARGET_ROCKCHIP_RK35XX_DEVICE)" .config
          echo "📁 Output directory listing:"
          ls -la bin/targets/rockchip/rk35xx/ || echo "(empty)"
          echo "🚨 DIAGNOSTIC DUMP END"

      # 🧹 步骤 9：清理（释放磁盘空间，避免缓存污染）
      - name: 🧹 Cleanup workspace
        if: always()
        run: |
          set -euxo pipefail
          echo "🧹 Cleaning up..."
          rm -rf bin/ build_dir/ staging_dir/ tmp/ feeds/
