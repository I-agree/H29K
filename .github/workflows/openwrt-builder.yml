name: OpenWrt Builder (H29K-RK3528)

on:
  workflow_dispatch:
    inputs:
      REPO_URL:
        description: 'OpenWrt 源码仓库地址（默认官方）'
        required: false
        default: 'https://github.com/openwrt/openwrt'
      REPO_BRANCH:
        description: '分支名（如 main / openwrt-24.10）'
        required: false
        default: 'main'
      CONFIG_FILE:
        description: '配置文件名（如 rk3528-opc-h29k.config）'
        required: false
        default: 'rk3528-opc-h29k.config'
      UPLOAD_FIRMWARE:
        description: '是否上传 firmware 目录（推荐 true）'
        required: false
        default: 'true'
        type: boolean
      UPLOAD_RELEASE:
        description: '是否创建 GitHub Release（推荐 true）'
        required: false
        default: 'true'
        type: boolean

  push:
    paths:
      - 'rk3528-opc-h29k.config'
      - 'diy-part1.sh'
      - 'diy-part2.sh'
      - '.github/workflows/openwrt-builder.yml'

env:
  REPO_URL: ${{ github.event.inputs.REPO_URL || 'https://github.com/openwrt/openwrt' }}
  REPO_BRANCH: ${{ github.event.inputs.REPO_BRANCH || 'main' }}
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: ${{ github.event.inputs.CONFIG_FILE || 'rk3528-opc-h29k.config' }}
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_FIRMWARE: ${{ github.event.inputs.UPLOAD_FIRMWARE || 'true' }}
  UPLOAD_RELEASE: ${{ github.event.inputs.UPLOAD_RELEASE || 'true' }}
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
    - name: 🔍 环境自检（基础工具）
      run: |
        echo "=== OS & Toolchain ==="
        uname -a
        curl --version | head -n1
        sed --version | head -n1
        make --version | head -n1
        git --version

    - name: 📥 获取本仓库代码（含子模块）
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: 🧰 初始化系统环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get -qq update
        sudo apt-get -qq install -y \
          build-essential asciidoc bash bison cmake curl device-tree-compiler \
          flex gawk gettext git libncurses5-dev libssl-dev python3 python3-setuptools \
          rsync subversion unzip wget xz-utils zlib1g-dev \
          u-boot-tools imagemagick fonts-wqy-microhei dos2unix
        sudo apt-get -qq autoremove --purge -y
        sudo apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: 🌐 克隆 OpenWrt 源码
      run: |
        mkdir -p /workdir
        git clone "$REPO_URL" -b "$REPO_BRANCH" /workdir/openwrt
        ln -sf /workdir/openwrt "$GITHUB_WORKSPACE/openwrt"
        cd /workdir/openwrt && git log -n 1 --oneline

    - name: 🧩 加载自定义 feeds（可选）
      run: |
        [ -e "$FEEDS_CONF" ] && mv "$FEEDS_CONF" /workdir/openwrt/feeds.conf.default
        chmod +x "$DIY_P1_SH"
        cd /workdir/openwrt && "$GITHUB_WORKSPACE/$DIY_P1_SH"

    - name: 📦 更新并安装 feeds
      run: cd /workdir/openwrt && ./scripts/feeds update -a && ./scripts/feeds install -a

    - name: ⚙️ 加载配置与 DIY 补丁
      run: |
        [ -e files ] && mv files /workdir/openwrt/files
        [ -e "$CONFIG_FILE" ] && mv "$CONFIG_FILE" /workdir/openwrt/.config
        chmod +x "$DIY_P2_SH"
        cd /workdir/openwrt && "$GITHUB_WORKSPACE/$DIY_P2_SH"

    - name: 📥 下载依赖（带重试）
      run: |
        cd /workdir/openwrt
        make defconfig
        make download -j8 || make download -j4 || {
          echo "❌ 下载失败，请检查网络或手动填充 dl/"
          exit 1
        }
        find dl -size -1024c -delete 2>/dev/null || true

    - name: 🏗️ 编译固件（智能降级）
      run: |
        cd /workdir/openwrt
        echo "使用 $(nproc) 线程编译..."
        if ! make -j$(nproc) V=s; then
          echo "⚠️ 并行失败，降级为单线程..."
          make -j1 V=s || { echo "❌ 编译失败"; exit 1; }
        fi
        echo "✅ 编译完成"
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> "$GITHUB_ENV"
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> "$GITHUB_ENV"

    - name: 💾 检查磁盘空间
      if: always()
      run: df -hT

    - name: 📁 整理 firmware 目录（最小交付）
      if: ${{ env.UPLOAD_FIRMWARE == 'true' }}
      run: |
        cd /workdir/openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> "$GITHUB_ENV"

    - name: 📤 上传 firmware artifact
      uses: actions/upload-artifact@v4
      if: ${{ env.UPLOAD_FIRMWARE == 'true' }}
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}
        retention-days: 7

    - name: 🏷️ 生成 Release 描述
      id: release-info
      if: ${{ env.UPLOAD_RELEASE == 'true' }}
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> "$GITHUB_OUTPUT"
        echo "H29K 固件构建完成（OpenWrt ${REPO_BRANCH}）" > release.txt
        echo "设备型号：HINLINK H29K（RK3528）" >> release.txt
        echo "构建时间：$(date)" >> release.txt
        echo "SHA256：" >> release.txt
        sha256sum ${{ env.FIRMWARE }}/* >> release.txt

    - name: 🚀 发布 GitHub Release
      uses: softprops/action-gh-release@v2
      if: ${{ env.UPLOAD_RELEASE == 'true' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.release-info.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: 🗑️ 清理旧 Release（✅ 已修复：使用 crazy-max/ghaction-cleanup@v6）
      uses: crazy-max/ghaction-cleanup@v6
      if: ${{ env.UPLOAD_RELEASE == 'true' }}
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        releases: true
        keep_latest: 3
        delete_tags: true

    - name: 🧹 清理旧 workflow 运行记录
      uses: Mattraks/delete-workflow-runs@v2
      with:
        retain_days: 0
        keep_minimum_runs: 2
