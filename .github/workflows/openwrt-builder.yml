name: OpenWrt Builder

on:
  repository_dispatch:
  workflow_dispatch:

env:
REPO_URL: https://github.com/openwrt/openwrt
REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: rk3528-hinlink-h29k.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        # ✅【适配增强】双重 chmod 保障 diy-part1.sh 可执行（部分 fork 仓库会丢失 x 权限）
        chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
        # ✅【适配增强】校验 rk3528-hinlink-h29k.config 是否存在且启用 H29K 设备
        if [ ! -f ".config" ]; then
          echo "❌ 错误：未找到 .config 文件，请确认 $CONFIG_FILE 已正确复制到 openwrt/ 目录"
          exit 1
        fi
        if ! grep -q '^CONFIG_TARGET_ROCKCHIP_RK35XX_DEVICE_hinlink_h29k=y' .config; then
          echo "❌ 错误：.config 中未启用 H29K 设备，请确保包含 CONFIG_TARGET_ROCKCHIP_RK35XX_DEVICE_hinlink_h29k=y"
          exit 1
        fi

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件（已启用设备型号参数）
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) 线程编译"
        # ✅【适配增强】PROFILE 名严格匹配 OpenWrt 源码定义：hinlink_h29k（下划线，非短横线）
        make -j$(nproc) image PROFILE=hinlink_h29k || make -j1 image PROFILE=hinlink_h29k || make -j1 V=s image PROFILE=hinlink_h29k
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE_hinlink_h29k=y' .config >/dev/null && echo "DEVICE_NAME=_hinlink_h29k" >> $GITHUB_ENV || { echo "❌ 错误：.config 中未启用 hinlink_h29k 设备"; exit 1; }
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Check space usage
      if: (!cancelled)
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: 整理固件文件（已限定 H29K 路径）
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled
      run: |
        # ✅【适配增强】精确进入 hinlink_h29k 子目录，避免与其他设备固件混淆
        cd openwrt/bin/targets/rockchip/rk35xx/hinlink_h29k
        # ✅【适配增强】校验 H29K 固件是否存在，防止路径错误导致空上传
        if [ ! -f "openwrt-rockchip-rk35xx-hinlink_h29k-*.bin" ]; then
          echo "❌ 错误：未在 openwrt/bin/targets/rockchip/rk35xx/hinlink_h29k/ 下找到 H29K 固件"
          ls -la
          exit 1
        fi
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传 H29K 固件（已精确过滤）
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled
      with:
        name: OpenWrt_firmware_hinlink_h29k${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}/openwrt-rockchip-rk35xx-hinlink_h29k-*.bin

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        [ ${UPLOAD_GOFILE} = true && ${{ steps.gofile.outputs.url }} ] && echo "🔗 [GoFile](${{ steps.gofile.outputs.url }})" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@master
      if: steps.tag.outputs.status == 'success' && !cancelled
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/openwrt-rockchip-rk35xx-hinlink_h29k-*.bin

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 2

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@master
      if: env.UPLOAD_RELEASE == 'true' && !cancelled
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
