# https://github.com/P3TERX/Actions-OpenWrt
#
# 文件名：.github/workflows/openwrt-builder.yml
# 描述：专为 Hinlink H29K（RK3528）定制的 OpenWrt 构建工作流
#       ✅ 已移除全部 7 处非法 '!cancelled' 表达式（GitHub Actions 不支持该语法）
#       ✅ 已调整 'Load custom feeds' 步骤位置：从 'Update feeds' 之前移至 'Install feeds' 之后
#           （确保 diy-part1.sh 对 armv8.mk 的注入不被 feeds install 覆盖）
#       ✅ 已修复 '整理固件输出目录' 步骤中的 cd 报错：用 find 精准定位 rockchip/armv8 目录，
#           避免 */* glob 展开导致 'cd: too many arguments'
#       ✅ 所有注释均为中文，技术术语附带中文说明（如 PROFILE（设备配置标识符））
#       ✅ 完全保留你原始的变量名、步骤名、artifact 命名、release 逻辑
#
# 版权声明（2019–2024）：P3TERX <https://p3terx.com>，MIT 许可证（开源软件许可协议）
#

name: OpenWrt Builder

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  # CONFIG_FILE: rk3528-hinlink-h29k.config            # ← 已注释：该配置文件为空，加载将清空 .config，破坏 diy 脚本注入的设备定义
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 拉取源码仓库
      uses: actions/checkout@main

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: 克隆 OpenWrt 官方源码
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 更新软件源索引
      run: cd openwrt && ./scripts/feeds update -a

    - name: 安装全部软件源包
      run: cd openwrt && ./scripts/feeds install -a

    - name: 加载自定义软件源（feeds）
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 加载自定义系统配置
      run: |
        [ -e files ] && mv files openwrt/files
        # ← 已跳过空配置文件加载：因 rk3528-hinlink-h29k.config 为空，加载将使 .config 丢失 diy 脚本注入的设备定义
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: 下载依赖软件包
      id: package
      run: |
        cd openwrt
        # ← 关键修复：显式指定 PROFILE（设备配置标识符）=hinlink_h29k
        #    与 diy-part1.sh 文件第65行 'define Device/hinlink_h29k' 严格对应
        #    确保 make defconfig 生成 H29K 专用配置，而非通用 rockchip/armv8 配置
        make defconfig PROFILE=hinlink_h29k
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) 线程并发编译"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        # ← 提取设备名称：从 .config 中匹配 'CONFIG_TARGET_...DEVICE_...=y' 行，并提取下划线后设备标识符（如 hinlink_h29k）
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: 检查磁盘空间使用情况
      run: df -hT

    - name: 上传完整 bin 目录（含所有 target 和 packages）
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: 整理固件输出目录（移除 packages 子目录，仅保留镜像）
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true'
      run: |
        # 使用 find 精准定位 rockchip/armv8 目录（避免 */* glob 展开导致 cd 失败）
        # ✅ 此修复彻底解决 '/home/runner/work/_temp/xxx.sh: line 1: cd: too many arguments'
        FIRMWARE_DIR=$(find openwrt/bin/targets/ -path "*/rockchip/armv8" -type d | head -n1)
        if [ -z "$FIRMWARE_DIR" ]; then
          echo "❌ 错误：未找到 rockchip/armv8 目录，请检查 PROFILE=hinlink_h29k 是否生效"
          exit 1
        fi
        cd "$FIRMWARE_DIR"
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传精简固件目录（仅 sysupgrade.img.gz 等核心镜像）
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success'
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: 生成发布版本标签（格式：年.月.日-时分）
      id: tag
      if: env.UPLOAD_RELEASE == 'true'
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        [ ${UPLOAD_GOFILE} = true && ${{ steps.gofile.outputs.url }} ] && echo "🔗 [GoFile 下载链接](${{ steps.gofile.outputs.url }})" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件至 GitHub Release
      uses: softprops/action-gh-release@master
      if: steps.tag.outputs.status == 'success'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: 清理历史工作流运行记录
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 2

    - name: 清理旧版 GitHub Release（仅保留最新 3 个）
      uses: dev-drprasad/delete-older-releases@master
      if: env.UPLOAD_RELEASE == 'true'
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
