name: OpenWrt 固件生成脚本

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: rk3528-hinlink-h29k.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  WORK_DIR: /workdir

jobs:
  build:
    runs-on: ubuntu-22.04
    # 🔥 【强力注入】显式声明工作流 Token 核心权限，踏平所有 403 权限暗礁
    permissions:
      contents: write   # 允许创建、修改、删除 GitHub Release 固件
      actions: write    # 允许清理和删除历史工作流运行记录

    steps:
    - name: 检出源码
      uses: actions/checkout@v6.0.3

    - name: 调整磁盘空间
      run: |
        sudo mkdir -p $WORK_DIR
        sudo chown -R $USER:$USER $WORK_DIR
        
        # 🚨 【针对性物理解决 Swap 核心隐患】 🚨
        echo "⚙️ 正在物理重构编译机 Swap 交换分区技术栈..."
        # 1. 停用系统可能存在的零碎、低效旧交换分区
        sudo swapoff -a || true
        # 2. 划出 5GB 专属全量 Swap 空间
        sudo dd if=/dev/zero of=/swapfile bs=1M count=5120
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        # 3. 强行修改内核虚拟内存激进系数（从默认 60 压榨到 10）
        # 迫使 CPU 优先榨干物理内存，不到最后一刻绝不读写硬盘，从底层物理掐断 Swap 造成的 I/O 假死
        sudo sysctl vm.swappiness=10
        echo "✅ Swap 扩容至 5GB 且 swappiness=10 校准完毕！"
        echo "📊 扩容系统全局 /tmp 至 16G"
        # 扩容系统默认 /tmp 临时分区（关键修复）
        sudo umount /tmp || true
        sudo mount -t tmpfs tmpfs /tmp -o size=16G,nr_inodes=0
        echo "✅ /tmp 扩容至 16GB 完成"
        
        echo "📊 检查当前磁盘空间分布："
        df -h
        # 额外检查inode，防止小文件耗尽节点
        df -i /tmp
        # 写入环境变量以便后续步骤继承
        echo "WORK_DIR=$WORK_DIR" >> $GITHUB_ENV

    - name: 初始化构建环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev python3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf quilt python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd libyaml-dev zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: 查看编译环境硬件规格 (CPU/内存)
      run: |
        echo "==================== CPU 核心数 ===================="
        echo "逻辑核心数: $(nproc)"
        cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c
        echo -e "\n==================== 内存大小 ===================="
        free -h

    - name: 克隆 OpenWrt 源码到大盘
      run: |
        cd $WORK_DIR
        df -hT $PWD
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf $WORK_DIR/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 加载自定义软件源
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF ${{ env.WORK_DIR }}/openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd ${{ env.WORK_DIR }}/openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新软件源索引
      run: cd ${{ env.WORK_DIR }}/openwrt && ./scripts/feeds update -a

    - name: 安装软件源组件
      run: cd ${{ env.WORK_DIR }}/openwrt && ./scripts/feeds install -a

    - name: 加载自定义配置文件
      run: |
        if [ -d files ]; then
          mkdir -p ${{ env.WORK_DIR }}/openwrt/files
          cp -r files/* ${{ env.WORK_DIR }}/openwrt/files/
        fi
        [ -e $CONFIG_FILE ] && cp -f $CONFIG_FILE ${{ env.WORK_DIR }}/openwrt/.config
        chmod +x $DIY_P2_SH
        cd ${{ env.WORK_DIR }}/openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: 主线内核智能补全与下载依赖软件
      id: package
      run: |
        cd ${{ env.WORK_DIR }}/openwrt
        make defconfig
        
        git add target/linux/
        
        echo "🤖 启动内核符号冷启动补全，正在校准 Kconfig 技术栈..."
        make target/linux/refresh V=s KCONFIG_NOTIMEOUT=1 > $GITHUB_WORKSPACE/kconfig_scan.log 2>&1 || true
        cat $GITHUB_WORKSPACE/kconfig_scan.log
        echo "✅ 内核依赖树重构完毕"
        
        git diff target/linux/ > $GITHUB_WORKSPACE/kernel_complements.txt || true
        
        if grep -q "(NEW)" $GITHUB_WORKSPACE/kconfig_scan.log; then
          echo -e "\n❌【重大不完美警告】检测到未来新版内核引入了未决断的 (NEW) 交互选项！" > $GITHUB_WORKSPACE/kernel_complements.txt
          grep "(NEW)" $GITHUB_WORKSPACE/kconfig_scan.log >> $GITHUB_WORKSPACE/kernel_complements.txt
        elif [ ! -s $GITHUB_WORKSPACE/kernel_complements.txt ]; then
          echo "🎉 和内核的 Kconfig 结构树进行比对，既无结构变动，也未发现任何(NEW)隐形交互弹窗，但是无法保证源码构建阶段没有问题！" > $GITHUB_WORKSPACE/kernel_complements.txt
        fi

        for i in {1..3}; do make download -j8 && break || sleep 5; done
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 上传内核自动补全对比清单
      uses: actions/upload-artifact@v7.0.1
      if: always()
      with:
        name: H29K_内核自动补全明细表
        path: ${{ github.workspace }}/kernel_complements.txt

    - name: 编译固件镜像
      id: compile
      run: |
        cd ${{ env.WORK_DIR }}/openwrt
        echo -e "$(nproc) thread compile"
        
        echo "🛠️ [步骤 1/3] 全速轰炸编译交叉编译工具链（此时无内核配置干扰）..."
        make tools/compile -j$(nproc)
        make toolchain/compile -j$(nproc)
        
        echo "🤖 [步骤 2/3] 工具链已就位！使用真实交叉编译器精准校准内核..."
        make target/linux/refresh V=w
        
        echo "🔄 [衔接步骤] 释放校准成果，物理编译内核底座以修复构建树空洞..."
        make target/linux/compile -j1 V=w
        
        # ✅【关键步骤：提前触发核心目录树及底层初始化】
        make target/compile -j$(nproc)
        
        echo "🚀 [专项环境准备] 提前单挑解开 Go 编译器枷锁，确保后续狙击不落空..."
        make package/feeds/packages/golang/compile -j$(nproc) || make package/feeds/packages/golang/compile -j1 V=s
        
        # =================================================================
        # 🚀 [步骤 3/3] 开启满血专项狙击！让六大高负载包排队单挑
        # =================================================================
        
        echo "📦 [专项狙击 1/6] 单独全速编译无线核心架构 mac80211（断开内核符号抢夺）..."
        make package/kernel/mac80211/compile -j$(nproc) || make package/kernel/mac80211/compile -j1 V=s
        
        echo "📦 [专项狙击 2/6] 使用标准单线程详细模式编译 aic8800（彻底规避假死悬空）..."
        timeout 20m env DEBIAN_FRONTEND=noninteractive KCONFIG_NOSILENTUPDATE=1 CONF_COMMAND="oldconfig" make package/kernel/aic8800/compile -j1 V=w || { echo "❌ 警报：aic8800 编译遭遇20分钟超时熔断或致命交互冲突！"; exit 1; }
        
        echo "📦 [专项狙击 3/6] 单独全速编译 dockerd 守护进程核心..."
        make package/feeds/packages/dockerd/compile -j$(nproc) || make package/feeds/packages/dockerd/compile -j1 V=s
        
        echo "📦 [专项狙击 4/6] 单独全速编译 docker 客户端核心..."
        make package/feeds/packages/docker/compile -j$(nproc) || make package/feeds/packages/docker/compile -j1 V=s
        
        echo "📦 [专项狙击 5/6] 单独全速编译重头戏 docker-compose 编排引擎..."
        make package/feeds/packages/docker-compose/compile -j$(nproc) || make package/feeds/packages/docker-compose/compile -j1 V=s
        
        echo "📦 [专项狙击 6/6] 单独全速编译 Docker 面板 luci-app-dockerman（规避并发线程假死）..."
        make package/feeds/luci/luci-app-dockerman/compile -j$(nproc) || make package/feeds/luci/luci-app-dockerman/compile -j1 V=s
        
        # =================================================================
        # 🛡️ 【解耦型：分段全自动断点智能熔断技术 - 4核15G环境专属优化版】
        # =================================================================
        echo "🔥 [总攻阶段 1/3] 开始全包满血总攻残局（常规轻量小包并发编译）..."
        
        if ! timeout 20m make package/compile -j$(nproc); then
            echo -e "\n\n🚨 [自动熔断触发] 检测到常规包并发编译遭遇多线程并发死锁（挂起超时）！"
            echo "🔍 正在强杀卡死的 fakeroot 守护进程、物理清除残留全局锁..."
            
            killall -9 faked fakeroot 2>/dev/null || true
            rm -rf tmp/.root-copy.flock || true
            
            echo "================================================================="
            echo "========= 🔄 正在降级至顶层单线程安全模式 (-j1 V=s) 磨过残局 ========="
            echo "================================================================="
            make package/compile -j1 V=s
            echo "================================================================="
        fi

        # 🚀【核心修复点：将编译好的 ipk 释放安装到 root-rockchip 中】
        echo "📦 [新增关键衔接] 正在解压并铺设所有编译好的组件至目标根文件系统..."
        make package/install -j$(nproc) || make package/install -j1 V=s

        echo "📦 [总攻阶段 2/3] 固件合体：打包并生成最终的系统镜像..."
        if ! make target/install -j$(nproc) > target_install.log 2>&1; then
            echo -e "\n\n❌ [自动熔断] 固件打包或内核安装阶段失败！"
            make target/install -j1 V=s > target_install.log 2>&1
            exit 1
        fi

        echo "🗂️ [总攻阶段 3/3] 建立软件包索引..."
        make package/index -j$(nproc)
        
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        # 复制日志到工作区，方便后续上传
        cp target_install.log $GITHUB_WORKSPACE/

    - name: 上传 target_install.log 日志文件
      uses: actions/upload-artifact@v7.0.1
      if: always()  # 无论编译是否成功都上传日志
      with:
        name: H29K_target_install_日志
        path: ${{ github.workspace }}/target_install.log

    - name: 检查磁盘空间使用情况
      if: (!cancelled())
      run: df -hT

    - name: 上传 bin 目录（使用绝对路径，防止软连接失效导致空包）
      uses: actions/upload-artifact@v7.0.1
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.WORK_DIR }}/openwrt/bin

    - name: 整理固件输出目录
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd ${{ env.WORK_DIR }}/openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件输出目录
      uses: actions/upload-artifact@v7.0.1
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: 生成发布版本标签
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件至 GitHub Release
      uses: softprops/action-gh-release@v3.0.0
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: 清理历史工作流运行记录
      uses: Mattraks/delete-workflow-runs@v2.1.0
      with:
        retain_days: 0
        keep_minimum_runs: 2
