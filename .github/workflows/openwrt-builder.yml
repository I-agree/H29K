jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up environment
        run: |
          echo "BUILD_DEVICES=hinlink_h29k" >> $GITHUB_ENV
          echo "TARGET_PROFILE=hinlink_h29k" >> $GITHUB_ENV
          echo "CONFIG_FILE=.config" >> $GITHUB_ENV

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libncurses5-dev zlib1g-dev gawk flex quilt git-core python3 python3-pip

      - name: Load config
        run: cp "${{ env.CONFIG_FILE }}" .config

      - name: Generate defconfig (validate .config)
        run: make defconfig

      - name: Build firmware
        run: make -j$(nproc) image PROFILE="${{ env.TARGET_PROFILE }}"

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-h29k-firmware
          path: bin/targets/rockchip/rk35xx/openwrt-rockchip-rk35xx-hinlink_h29k-*.bin
