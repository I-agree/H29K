name: Detect Missing Headers & Functions
on: [push, pull_request, workflow_dispatch]
jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: KFERMercer/OpenWrt-CI@main
        with:
          repo_url: https://github.com/coolsnowwolf/lede
          config: config/rockchip_armv8.config
      - run: sudo apt-get install -y grep sed awk curl
      - id: compile
        continue-on-error: true
        run: make -C openwrt -j1 V=s target/linux/rockchip/compile 2>&1 | tee build.log || true
      - id: extract
        run: |
          grep -E "implicit declaration|'[^']+' declared|error:.*not declared" build.log 2>/dev/null | grep -oE "'[a-zA-Z0-9_]+'" | sed "s/'//g" | sort -u | grep -v "^[0-9]" > missing_symbols.txt || echo "" > missing_symbols.txt
          echo "found_symbols=$(wc -l < missing_symbols.txt)" >> "$GITHUB_OUTPUT"
      - if: ${{ steps.extract.outputs.found_symbols != '0' }}
        run: |
          echo "# 🔍 Report" > missing-report.md
          echo "## ❗ Found ${{ steps.extract.outputs.found_symbols }} symbols:" >> missing-report.md
          while IFS= read -r s; do [ -n "$s" ] && echo "- \`$s\`" >> missing-report.md; done < missing_symbols.txt
      - if: ${{ steps.extract.outputs.found_symbols != '0' }}
        uses: actions/upload-artifact@v4
        with:
          name: missing-report
          path: missing-report.md
      - uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
      - name: Fail if symbols found
        if: ${{ steps.extract.outputs.found_symbols != '0' }}
        run: exit 1
