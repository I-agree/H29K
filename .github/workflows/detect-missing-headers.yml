name: Detect Missing Headers & Functions

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up OpenWrt build environment
        uses: KFERMercer/OpenWrt-CI@main
        with:
          repo_url: https://github.com/coolsnowwolf/lede
          config: config/rockchip_armv8.config

      - name: Install parsing tools
        run: sudo apt-get update && sudo apt-get install -y grep sed awk curl

      - name: Compile target (fail-fast)
        id: compile
        continue-on-error: true
        run: make -C openwrt -j1 V=s target/linux/rockchip/compile 2>&1 | tee build.log || true

      - name: Extract undeclared symbols
        id: extract
        run: |
          grep -E "implicit declaration|'[^']+' declared|error:.*not declared" build.log 2>/dev/null | \
            grep -oE "'[a-zA-Z0-9_]+'" | \
            sed "s/'//g" | \
            sort -u | \
            grep -v "^[0-9]" > missing_symbols.txt || echo "" > missing_symbols.txt
          echo "found_symbols=$(wc -l < missing_symbols.txt)" >> "$GITHUB_OUTPUT"

      - name: Generate report
        if: ${{ steps.extract.outputs.found_symbols != '0' }}
        run: |
          echo "# 🔍 Missing Symbols Report" > missing-report.md
          echo "" >> missing-report.md
          echo "Detected ${{ steps.extract.outputs.found_symbols }} undeclared symbols:" >> missing-report.md
          echo "" >> missing-report.md
          cat missing_symbols.txt | sed 's/^/- `/; s/$/`/' >> missing-report.md
          echo "" >> missing-report.md
          echo "💡 Fix: Add required headers to \`target/linux/rockchip/files/include/\`" >> missing-report.md

      - name: Upload report artifact
        if: ${{ steps.extract.outputs.found_symbols != '0' }}
        uses: actions/upload-artifact@v4
        with:
          name: missing-symbol-report
          path: missing-report.md

      - name: Upload full build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Fail job if symbols found
        if: ${{ steps.extract.outputs.found_symbols != '0' }}
        run: |
          echo "❌ Build blocked: undeclared symbols detected."
          echo "📄 See artifact 'missing-symbol-report' for list."
          exit 1
