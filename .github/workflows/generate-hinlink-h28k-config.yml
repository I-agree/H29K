name: Generate hinlink_h28k .config & defconfig

on:
  workflow_dispatch:
    inputs:
      openwrt_branch:
        description: 'OpenWrt branch (e.g., openwrt-24.10)'
        required: true
        default: 'openwrt-24.10'

env:
  OPENWRT_BRANCH: ${{ github.event.inputs.openwrt_branch }}
  TARGET: hinlink_h28k
  CONFIG_FILE: hinlink_h28k.config
  DEFCONFIG_FILE: hinlink_h28k_defconfig

jobs:
  generate:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git wget unzip build-essential libncurses5-dev zlib1g-dev gawk flex quilt libssl-dev xsltproc libxml-parser-perl

      - name: Clone OpenWrt
        run: |
          git clone --depth=1 -b "$OPENWRT_BRANCH" https://github.com/openwrt/openwrt openwrt

      - name: Prepare feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure for hinlink_h28k
        working-directory: openwrt
        run: |
          # Write minimal base config
          echo "CONFIG_TARGET_rockchip=y" > .config
          echo "CONFIG_TARGET_rockchip_armv8=y" >> .config
          echo "CONFIG_TARGET_MULTI_ARCH=n" >> .config
          echo "CONFIG_TARGET_ROCKCHIP_ARMV8_DEVICE_${TARGET}=y" >> .config
          # Generate full .config
          make defconfig

      - name: Extract generated files
        working-directory: openwrt
        run: |
          # Copy .config to workspace
          cp .config ../$CONFIG_FILE
          # Generate minimal defconfig (only device line)
          echo "CONFIG_TARGET_ROCKCHIP_ARMV8_DEVICE_${TARGET}=y" > ../$DEFCONFIG_FILE

      - name: Verify files exist
        run: |
          ls -lh $CONFIG_FILE $DEFCONFIG_FILE

      - name: Archive configs
        run: |
          tar -czf configs-hinlink_h28k.tar.gz $CONFIG_FILE $DEFCONFIG_FILE

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: configs-hinlink_h28k-${{ github.run_id }}
          release_name: hinlink_h28k configs (run ${{ github.run_id }})
          body: |
            Generated by `make defconfig` on OpenWrt ${{ env.OPENWRT_BRANCH }}.
            Contains:
            - `$CONFIG_FILE`: full .config (3000+ lines, ready for `make`)
            - `$DEFCONFIG_FILE`: minimal defconfig (1 line, for `make defconfig`)
          draft: false
          prerelease: false
          files: configs-hinlink_h28k.tar.gz
