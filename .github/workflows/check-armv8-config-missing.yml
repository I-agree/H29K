# 📋 名称：RK3528 armv8/config-6.12 缺失符号诊断器（合规版｜2026-05-08）
# ✅ 严格遵守 GitHub Actions 语法：所有变量在 run: 中用 $VAR 展开，不在 YAML 字段中用 ${{ }}
# ✅ 不依赖本地文件｜自动 fetch openwrt/openwrt@branch config-6.12｜精准匹配 v6.12.85 Kconfig

name: Check armv8/config-6.12 Missing Symbols (Compliant)

on:
  workflow_dispatch:
    inputs:
      openwrt_branch:
        description: 'OpenWrt branch (e.g., openwrt-25.12)'
        required: true
        default: 'openwrt-25.12'
      kernel_version:
        description: 'Linux kernel version (e.g., 6.12.85)'
        required: true
        default: '6.12.85'

jobs:
  diagnose:
    runs-on: ubuntu-22.04

    steps:
    - name: 🚪 Checkout (for context, harmless)
      uses: actions/checkout@v4

    - name: 🌐 Download config-6.12 from openwrt/openwrt
      env:
        OPENWRT_BRANCH: ${{ github.event.inputs.openwrt_branch }}
        KERNEL_VERSION: ${{ github.event.inputs.kernel_version }}
      run: |
        CONFIG_URL="https://raw.githubusercontent.com/openwrt/openwrt/${OPENWRT_BRANCH}/target/linux/rockchip/armv8/config-6.12"
        echo "📥 Fetching config-6.12 from: ${CONFIG_URL}"
        
        mkdir -p /tmp/openwrt-config
        if ! curl -fsSL "${CONFIG_URL}" -o /tmp/openwrt-config/config-6.12; then
          echo "❌ ERROR: Failed to download config-6.12."
          echo "   → Check if branch '${OPENWRT_BRANCH}' exists at:"
          echo "      https://github.com/openwrt/openwrt/tree/${OPENWRT_BRANCH}/target/linux/rockchip/armv8"
          exit 1
        fi
        echo "✅ Downloaded config-6.12 ($(wc -l < /tmp/openwrt-config/config-6.12) lines)"

    - name: 🧩 Clone Linux v${{ github.event.inputs.kernel_version }} Kconfig tree
      env:
        KERNEL_VERSION: ${{ github.event.inputs.kernel_version }}
      run: |
        KERNEL_TAG="v${KERNEL_VERSION}"
        echo "🔧 Cloning linux-stable ${KERNEL_TAG}..."
        git clone --depth=1 --branch="${KERNEL_TAG}" \
          --filter=blob:none \
          --no-checkout \
          https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git /tmp/linux-kernel
        cd /tmp/linux-kernel
        
        # Extract all CONFIG_XXX symbols from ALL Kconfig files
        find . -name 'Kconfig*' -o -name 'Kconfig.*' | head -n 1000 > /tmp/kconfig_files.txt
        grep -rE '^[[:space:]]*(config|menuconfig)[[:space:]]+([A-Z0-9_]+)' . \
          --include="Kconfig*" \
          | sed -E 's/^[[:space:]]*(config|menuconfig)[[:space:]]+([A-Z0-9_]+).*/\2/' \
          | sort -u \
          | grep '^CONFIG_' \
          | sed 's/^CONFIG_//' \
          > /tmp/all_kernel_symbols.txt
        echo "✅ Parsed $(wc -l < /tmp/all_kernel_symbols.txt) symbols from ${KERNEL_TAG}"

    - name: 📜 Parse defined symbols from downloaded config-6.12
      run: |
        grep -E '^CONFIG_[A-Z0-9_]+=(y|m|n)' /tmp/openwrt-config/config-6.12 \
          | sed -E 's/^CONFIG_([A-Z0-9_]+)=(y|m|n)$/\1/' \
          | sort -u \
          > /tmp/defined_symbols.txt
        echo "✅ Found $(wc -l < /tmp/defined_symbols.txt) symbols in config-6.12"

    - name: ❗ Compute missing symbols (kernel has → config lacks)
      id: compute
      run: |
        comm -23 \
          <(sort /tmp/all_kernel_symbols.txt) \
          <(sort /tmp/defined_symbols.txt) \
          | grep -E '^[A-Z0-9_]+$' \
          | sort \
          > /tmp/missing_symbols.txt
        COUNT=$(wc -l < /tmp/missing_symbols.txt)
        echo "count=${COUNT}" >> "$GITHUB_OUTPUT"

    - name: 📋 Report result (copy-paste ready)
      if: ${{ steps.compute.outputs.count != '0' }}
      run: |
        OPENWRT_BRANCH="${{ github.event.inputs.openwrt_branch }}"
        KERNEL_VERSION="${{ github.event.inputs.kernel_version }}"
        KERNEL_TAG="v${KERNEL_VERSION}"
        
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "🔍 DIAGNOSIS REPORT: Missing CONFIG symbols in"
        echo "   openwrt/openwrt@${OPENWRT_BRANCH} → target/linux/rockchip/armv8/config-6.12"
        echo "   Kernel source: linux-stable ${KERNEL_TAG}"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""
        echo "📋 To fix, append these lines to the END of config-6.12:"
        echo ""
        cat /tmp/missing_symbols.txt | while read sym; do
          echo "CONFIG_${sym}=n"
        done | tee /tmp/fixed_lines.txt
        echo ""
        echo "💡 Apply locally with:"
        echo "   curl -sL \"https://raw.githubusercontent.com/openwrt/openwrt/${OPENWRT_BRANCH}/target/linux/rockchip/armv8/config-6.12\" > config-6.12 && \\"
        echo "   cat /tmp/fixed_lines.txt >> config-6.12"
        echo ""
        echo "⚠️  Note: Some symbols may require =y or =m — search them at:"
        echo "   https://elixir.bootlin.com/linux/${KERNEL_TAG}/source"
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    - name: ✅ All good — no missing symbols
      if: ${{ steps.compute.outputs.count == '0' }}
      run: |
        OPENWRT_BRANCH="${{ github.event.inputs.openwrt_branch }}"
        KERNEL_VERSION="${{ github.event.inputs.kernel_version }}"
        echo "✅ PERFECT! Your config-6.12 (from openwrt/openwrt@${OPENWRT_BRANCH})"
        echo "   already defines ALL CONFIG symbols required by Linux v${KERNEL_VERSION}."
        echo "   You are safe to build RK3528 firmware."

    - name: 📤 Upload missing symbols (artifact)
      if: ${{ steps.compute.outputs.count != '0' }}
      uses: actions/upload-artifact@v4
      with:
        name: missing-config-symbols-${{ github.event.inputs.kernel_version }}
        path: /tmp/fixed_lines.txt
