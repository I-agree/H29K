name: Check armv8/config-6.12 Missing Symbols (Kernel-Official)

on:
  workflow_dispatch:
    inputs:
      openwrt_branch:
        description: 'OpenWrt branch (e.g., openwrt-25.12)'
        required: true
        default: 'openwrt-25.12'
      kernel_version:
        description: 'Linux kernel version (e.g., 6.12.85)'
        required: true
        default: '6.12.85'

jobs:
  diagnose:
    runs-on: ubuntu-22.04
    steps:
    - name: 🚪 Checkout
      uses: actions/checkout@v4

    - name: 🌐 Download config-6.12
      env:
        OPENWRT_BRANCH: ${{ github.event.inputs.openwrt_branch }}
      run: |
        curl -fsSL "https://raw.githubusercontent.com/openwrt/openwrt/${OPENWRT_BRANCH}/target/linux/rockchip/armv8/config-6.12" \
          -o /tmp/config-6.12
        echo "✅ Fetched config-6.12"

    - name: 🧩 Download & extract linux-${{ github.event.inputs.kernel_version }}
      env:
        KERNEL_VERSION: ${{ github.event.inputs.kernel_version }}
      run: |
        curl -sLO "https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${KERNEL_VERSION}.tar.xz"
        tar -xf "linux-${KERNEL_VERSION}.tar.xz"
        mv "linux-${KERNEL_VERSION}" /tmp/linux-src
        echo "✅ Extracted kernel source"

    - name: 🔧 Prepare kernel build env
      run: |
        cd /tmp/linux-src
        make ARCH=arm64 defconfig  # generate basic .config
        cp /tmp/config-6.12 .config
        # Ensure ARCH=arm64 is set for all commands
        echo 'export ARCH=arm64' >> $GITHUB_ENV

    - name: 📋 Run kernel's official listnewconfig (truth source)
      id: check
      run: |
        cd /tmp/linux-src
        # This outputs ONLY symbols that are selected/depended but undefined
        MISSING=$(make listnewconfig 2>/dev/null | sed 's/^\(CONFIG_[A-Z0-9_]*\)=.*/\1/' | sort -u | tr '\n' ',' | sed 's/,$//')
        
        if [ -z "$MISSING" ]; then
          echo "✅ PERFECT! No missing symbols per kernel's own checker."
          echo "count=0" >> "$GITHUB_OUTPUT"
        else
          echo "⚠️  KERNEL-TRUTH: Missing: $MISSING"
          make listnewconfig 2>/dev/null | sed 's/^\(CONFIG_[A-Z0-9_]*\)=.*/\1/' | sort -u > /tmp/missing.txt
          echo "count=$(wc -l < /tmp/missing.txt)" >> "$GITHUB_OUTPUT"
        fi

    - name: 📋 Report result (kernel-authoritative)
      if: ${{ steps.check.outputs.count != '0' }}
      run: |
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "🔍 KERNEL-OFFICIAL DIAGNOSIS (via 'make listnewconfig')"
        echo "   → These symbols are SELECTED or DEPENDENT but ABSENT from config-6.12"
        echo "   → Kernel will FAIL at 'make defconfig' or 'make menuconfig'"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""
        echo "📋 Add to config-6.12 (append these lines):"
        echo ""
        cat /tmp/missing.txt | while read sym; do
          echo "$sym=n"
        done
        echo ""
        echo "💡 Example fix:"
        echo "  CONFIG_ROCKCHIP_RK3528=n   ← satisfies 'select ROCKCHIP_RK3528' from CLK_RK3528"
        echo "  CONFIG_SPARSEMEM_VMEMMAP=n ← required by ROCKCHIP_RK3528 memory layout"
        echo ""
        echo "🔗 Run this locally to verify:"
        echo "  cd linux-6.12.85 && make ARCH=arm64 listnewconfig"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    - name: ✅ All good (kernel says so)
      if: ${{ steps.check.outputs.count == '0' }}
      run: |
        echo "✅ CONFIRMED by kernel: config-6.12 satisfies all select/depends constraints."
        echo "   You may safely run 'make defconfig' and build."

    - name: 📤 Upload missing symbols
      if: ${{ steps.check.outputs.count != '0' }}
      uses: actions/upload-artifact@v4
      with:
        name: kernel-official-missing-${{ github.event.inputs.kernel_version }}
        path: /tmp/missing.txt
