name: U-Boot Rockchip 编译日志排查

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: rk3528-hinlink-h29k.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai
  WORK_DIR: /workdir
  UBOOT_BIN_NAME: hinlink-h29k-rk3528-u-boot-rockchip.bin

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      actions: write

    steps:
    - name: 检出源码
      uses: actions/checkout@v6.0.3

    - name: 调整磁盘空间
      run: |
        sudo mkdir -p $WORK_DIR
        sudo chown -R $USER:$USER $WORK_DIR
        
        sudo swapoff -a || true
        sudo dd if=/dev/zero of=/swapfile bs=1M count=5120
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        sudo sysctl vm.swappiness=10
        
        sudo umount /tmp || true
        sudo mount -t tmpfs tmpfs /tmp -o size=10G,nr_inodes=0
        
        df -h
        df -i /tmp
        echo "WORK_DIR=$WORK_DIR" >> $GITHUB_ENV

    - name: 初始化构建环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev python3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf quilt python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd libyaml-dev zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: 查看编译环境硬件规格
      run: |
        echo "==================== CPU 核心数 ===================="
        echo "逻辑核心数: $(nproc)"
        cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c
        echo -e "\n==================== 内存大小 ===================="
        free -h

    - name: 克隆 OpenWrt 源码
      run: |
        cd $WORK_DIR
        df -hT $PWD
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf $WORK_DIR/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 加载自定义软件源
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF ${{ env.WORK_DIR }}/openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd ${{ env.WORK_DIR }}/openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新软件源索引
      run: cd ${{ env.WORK_DIR }}/openwrt && ./scripts/feeds update -a

    - name: 安装软件源组件
      run: cd ${{ env.WORK_DIR }}/openwrt && ./scripts/feeds install -a

    - name: 加载自定义配置与 DIY 补丁
      run: |
        if [ -d files ]; then
          mkdir -p ${{ env.WORK_DIR }}/openwrt/files
          cp -r files/* ${{ env.WORK_DIR }}/openwrt/files/
        fi
        [ -e $CONFIG_FILE ] && cp -f $CONFIG_FILE ${{ env.WORK_DIR }}/openwrt/.config
        chmod +x $DIY_P2_SH
        cd ${{ env.WORK_DIR }}/openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: 生成默认配置并编译宿主工具集
      run: |
        cd ${{ env.WORK_DIR }}/openwrt
        make defconfig
        make tools/compile -j$(nproc)

    - name: 编译目标交叉工具链
      run: |
        cd ${{ env.WORK_DIR }}/openwrt
        make toolchain/compile -j$(nproc)
        
        echo -e "==================== 交叉编译器校验 ===================="
        ls -lh staging_dir/toolchain-aarch64_*/bin/aarch64-openwrt-linux-musl-gcc
        ls -lh staging_dir/toolchain-aarch64_*/lib/libgcc_s.so.*
        echo "✅ 目标工具链编译完成"

    - name: 编译 rkbin 固件包并校验产物
      run: |
        cd ${{ env.WORK_DIR }}/openwrt
        make -j1 package/boot/rkbin/compile V=s 2>&1 | tee rkbin-build.log

    - name: 下载 uboot-rockchip 编译依赖
      run: |
        cd ${{ env.WORK_DIR }}/openwrt
        for i in {1..3}; do make package/boot/uboot-rockchip/download -j8 && break || sleep 5; done

    - name: 编译 uboot-rockchip 并保存完整日志
      id: compile_uboot
      run: |
        cd ${{ env.WORK_DIR }}/openwrt
        
        make -j1 package/boot/uboot-rockchip/compile V=s 2>&1 | tee uboot-rockchip-full.log
        
        echo "status=success" >> $GITHUB_OUTPUT
        
        echo -e "\n==================== 【1】构建目录关键产物检查 ===================="
        find build_dir/target-* -name "*u-boot-rockchip.bin" 2>/dev/null | xargs ls -lh
        
        echo -e "\n==================== 【2】staging 镜像导出 ===================="
        UBOOT_SRC=$(find staging_dir/target-*/image -name "*u-boot-rockchip.bin" | head -n1)
        if [ -f "$UBOOT_SRC" ]; then
          cp "$UBOOT_SRC" $GITHUB_WORKSPACE/${{ env.UBOOT_BIN_NAME }}
          echo "✅ 已复制 U-Boot 固件: $UBOOT_SRC -> ${{ env.UBOOT_BIN_NAME }}"
          echo "UBOOT_BIN_PATH=$UBOOT_SRC" >> $GITHUB_ENV
        else
          echo "❌ 未在 staging 目录发现 U-Boot 一体化镜像"
          echo "UBOOT_BIN_PATH=" >> $GITHUB_ENV
        fi
        
        echo -e "\n==================== 【3】关键日志关键词检索 ===================="
        echo ">>> Binman 一体化打包执行记录:"
        grep -E "binman|binman\.dts|packing image|Output image" uboot-rockchip-full.log || echo "未找到 Binman 一体化打包记录"

        echo -e "\n>>> TPL 编译记录:"
        grep -E "tpl/.*\.bin" uboot-rockchip-full.log || echo "未找到 TPL 编译记录"

        echo -e "\n>>> SPL 编译记录:"
        grep -E "spl/.*\.bin" uboot-rockchip-full.log || echo "未找到 SPL 编译记录"

        echo -e "\n>>> FIT镜像(u-boot.itb)内置打包记录:"
        echo "当前Rockchip binman一体化打包方案不使用u-boot.itb FIT镜像，该记录无需检索"

        echo -e "\n>>> BL31 ATF 固件链接嵌入记录:"
        grep -iE "bl31|rk3528_bl31" uboot-rockchip-full.log || echo "未找到 BL31 相关嵌入记录"

        echo -e "\n>>> 最终一体化固件输出记录:"
        grep -E "u-boot-rockchip\.bin|Writing.*u-boot-rockchip" uboot-rockchip-full.log || echo "未找到一体化BIN生成记录"

    - name: 检查磁盘空间
      if: always()
      run: df -hT

    - name: 上传全部制品(日志+固件+分段解析记录)
      uses: actions/upload-artifact@v7.0.1
      if: always()
      with:
        name: build-full-logs-and-uboot
        path: |
          ${{ env.WORK_DIR }}/openwrt/rkbin-build.log
          ${{ env.WORK_DIR }}/openwrt/uboot-rockchip-full.log
          ${{ env.WORK_DIR }}/openwrt/binman-segments.log
          ${{ env.UBOOT_BIN_NAME }}
          ${{ github.workspace }}/binman

    - name: 清理历史工作流运行记录
      uses: Mattraks/delete-workflow-runs@v2.1.0
      with:
        retain_days: 0
        keep_minimum_runs: 2
